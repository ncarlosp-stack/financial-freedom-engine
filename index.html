/* ============================================================
   FFE SHARED DESIGN SYSTEM v1
   ============================================================ */
:root{
  --ds-space-1:4px;
  --ds-space-2:8px;
  --ds-space-3:12px;
  --ds-space-4:16px;
  --ds-space-5:20px;
  --ds-space-6:24px;
  --ds-space-8:32px;
  --ds-radius-sm:10px;
  --ds-radius-md:16px;
  --ds-radius-lg:22px;
  --ds-control-h:54px;
  --ds-control-h-mobile:58px;
  --ds-focus:0 0 0 3px rgba(56,189,248,.18);
  --ds-success:var(--green);
  --ds-info:var(--blue);
  --ds-warning:var(--amber);
  --ds-danger:var(--rose);
}

/* Global control-width fix — applies to all layouts and field types */
.formgrid,
form,
.card,
.item,
details,
label{
  min-width:0;
}

.formgrid{
  width:100%;
  max-width:100%;
}

.formgrid > label,
form > label{
  width:100%;
  max-width:100%;
  min-width:0;
  box-sizing:border-box;
}

input,
select,
textarea,
button{
  box-sizing:border-box;
  max-width:100%;
}

input:not([type="checkbox"]):not([type="radio"]),
select,
textarea{
  display:block;
  width:100%!important;
  min-width:0!important;
  max-width:100%!important;
}

input[type="date"],
input[type="datetime-local"],
input[type="time"],
input[type="month"],
input[type="week"]{
  inline-size:100%!important;
  width:100%!important;
  min-width:0!important;
  max-width:100%!important;
  -webkit-appearance:none;
  appearance:none;
}

/* Safari/iOS intrinsic sizing fix */
input[type="date"]::-webkit-date-and-time-value,
input[type="datetime-local"]::-webkit-date-and-time-value,
input[type="time"]::-webkit-date-and-time-value,
input[type="month"]::-webkit-date-and-time-value,
input[type="week"]::-webkit-date-and-time-value{
  text-align:left;
  min-width:0;
}

input[type="date"]::-webkit-calendar-picker-indicator,
input[type="datetime-local"]::-webkit-calendar-picker-indicator{
  margin-left:auto;
  flex:0 0 auto;
}

.ds-control,
input:not([type="checkbox"]):not([type="radio"]),
select,
textarea{
  min-height:var(--ds-control-h);
  border-radius:var(--ds-radius-md);
}

textarea{
  min-height:110px;
}

input:focus,
select:focus,
textarea:focus,
button:focus-visible{
  outline:none;
  box-shadow:var(--ds-focus);
  border-color:var(--ds-info);
}

/* Reusable design-system surfaces */
.ds-card{
  border:1px solid var(--border);
  border-radius:var(--ds-radius-md);
  background:rgba(17,24,39,.96);
  padding:var(--ds-space-4);
}
.ds-card-title{font-weight:950}
.ds-card-subtitle{color:var(--muted);font-size:12px;margin-top:4px}
.ds-stack{display:grid;gap:var(--ds-space-3)}
.ds-row{display:flex;align-items:center;gap:var(--ds-space-3);flex-wrap:wrap}
.ds-grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:var(--ds-space-3)}
.ds-grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:var(--ds-space-3)}
.ds-badge{
  display:inline-flex;align-items:center;gap:6px;
  border-radius:999px;padding:6px 10px;font-size:11px;font-weight:900;
  border:1px solid var(--border);background:rgba(30,38,64,.62)
}
.ds-badge.success{color:var(--ds-success)}
.ds-badge.info{color:var(--ds-info)}
.ds-badge.warning{color:var(--ds-warning)}
.ds-badge.danger{color:var(--ds-danger)}

.ds-swatch{
  height:34px;border-radius:10px;border:1px solid var(--border);
}
.ds-type-sample{padding:8px 0;border-bottom:1px solid var(--border)}
.ds-type-sample:last-child{border-bottom:0}
.ds-demo-field{display:grid;gap:6px}
.ds-demo-field span{font-size:11px;color:var(--muted);font-weight:900}

.design-system-panel{
  display:grid;gap:var(--ds-space-4);
}
.design-system-grid{
  display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:var(--ds-space-3);
}
.design-system-wide{
  grid-column:1/-1;
}
.design-system-section{
  border:1px solid var(--border);
  border-radius:var(--ds-radius-lg);
  padding:var(--ds-space-4);
  background:rgba(17,24,39,.96);
}
.design-system-section h3{margin:0 0 10px}

@media(max-width:760px){
  :root{--ds-control-h:var(--ds-control-h-mobile)}
  .design-system-grid,
  .ds-grid-2,
  .ds-grid-3{
    grid-template-columns:1fr;
  }
}


/* ============================================================
   FFE FINANCIAL KNOWLEDGE VAULT
   ============================================================ */
.vault-command{display:grid;gap:var(--ds-space-4)}
.vault-kpis{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:var(--ds-space-3)}
.vault-toolbar{display:grid;grid-template-columns:2fr 1fr 1fr;gap:var(--ds-space-3)}
.vault-grid{display:grid;gap:var(--ds-space-3)}
.vault-card{
  border:1px solid var(--border);
  border-radius:var(--ds-radius-lg);

.vault-card.expiring{border-left:4px solid var(--amber)}
.vault-card.expired{border-left:4px solid var(--rose)}

.vault-heading{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.vault-title-group{display:flex;align-items:center;gap:10px;min-width:0}
.vault-icon{

.vault-meta-box .value{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vault-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.vault-tag{padding:5px 8px;border-radius:999px;background:rgba(56,189,248,.09);border:1px solid rgba(56,189,248,.2);font-size:10px;color:var(--blue);font-weight:850}
.vault-file{

.vault-file-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.vault-empty{padding:26px;text-align:center;border:1px dashed var(--border);border-radius:18px;color:var(--muted)}
.vault-status{font-size:10px;font-weight:950;padding:6px 9px;border-radius:999px}
.vault-status.current{color:var(--green);background:rgba(52,211,153,.1)}
.vault-status.expiring{color:var(--amber);background:rgba(251,191,36,.1)}
.vault-status.expired{color:var(--rose);background:rgba(251,113,133,.1)}
.vault-status.unscheduled{color:var(--blue);background:rgba(56,189,248,.1)}
.vault-category-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.vault-category-card{padding:12px;border:1px solid var(--border);border-radius:14px;background:rgba(30,38,64,.52)}
.vault-category-card .value{font-size:20px}
.vault-privacy{
  border-left:4px solid var(--blue);

@media(min-width:760px){
  .vault-kpis{grid-template-columns:repeat(4,minmax(0,1fr))}
  .vault-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .vault-category-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
}
@media(max-width:760px){
  .vault-toolbar{grid-template-columns:1fr}
  .vault-meta{grid-template-columns:1fr 1fr}
}


/* ============================================================
   FFE FINANCIAL KNOWLEDGE CENTER
   ============================================================ */
.knowledge-center{display:grid;gap:16px}
.knowledge-hero{
  padding:18px;border:1px solid var(--border);border-radius:24px;
  background:radial-gradient(circle at 20% 20%,rgba(56,189,248,.15),transparent 30%),
             linear-gradient(135deg,rgba(17,24,39,.98),rgba(8,16,29,.98));
}
.knowledge-hero-grid{display:grid;gap:14px}
.knowledge-category-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.knowledge-category{
  padding:14px;border:1px solid var(--border);border-radius:18px;
  background:rgba(17,24,39,.96);text-align:left;
}
.knowledge-category:hover{border-color:var(--blue);transform:translateY(-1px)}
.knowledge-category .k-icon{font-size:24px}
.knowledge-category .k-count{font-size:24px;font-weight:950;margin-top:6px}
.knowledge-category .k-label{font-size:11px;color:var(--muted);font-weight:850}
.knowledge-alerts{display:grid;gap:8px}
.knowledge-alert{
  padding:11px;border:1px solid var(--border);border-radius:14px;background:rgba(8,16,29,.52)
}
.knowledge-alert.warning{border-left:4px solid var(--amber)}
.knowledge-alert.danger{border-left:4px solid var(--rose)}
.knowledge-alert.info{border-left:4px solid var(--blue)}

.knowledge-rel{

.knowledge-timeline-mark{position:relative}

.knowledge-quick-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.knowledge-quick{
  padding:14px;border:1px solid var(--border);border-radius:17px;background:rgba(17,24,39,.96)

@media(min-width:760px){
  .knowledge-hero-grid{grid-template-columns:1.2fr .8fr}

.mission-sub{color:var(--muted);margin-top:4px}
.mission-status-row{display:flex;gap:8px;flex-wrap:wrap}
.mission-badge{padding:7px 10px;border:1px solid var(--border);border-radius:999px;font-size:11px;font-weight:900;background:rgba(30,38,64,.58)}

.mission-node .nicon{font-size:21px}.mission-node .nlabel{font-size:11px;font-weight:950;margin-top:3px}.mission-node .nvalue{font-size:15px;font-weight:950;margin-top:4px}
.mn-cash{left:50%;top:12%}.mn-bills{left:84%;top:31%}.mn-credit{left:84%;top:68%}.mn-goals{left:66%;top:90%}.mn-vault{left:34%;top:90%}.mn-travel{left:16%;top:68%}.mn-worth{left:16%;top:31%}

.mini-timeline{display:grid;gap:9px}.mini-event{display:grid;grid-template-columns:18px 1fr;gap:9px}.mini-dot{position:relative}.mini-dot:before{content:"";position:absolute;left:50%;top:5px;transform:translateX(-50%);width:9px;height:9px;border-radius:50%;background:var(--blue)}.mini-dot:after{content:"";position:absolute;left:50%;top:16px;bottom:-12px;transform:translateX(-50%);width:2px;background:var(--border)}.mini-event:last-child .mini-dot:after{display:none}

  .mn-cash{left:50%;top:9%}.mn-bills{left:82%;top:27%}.mn-credit{left:84%;top:65%}.mn-goals{left:66%;top:91%}.mn-vault{left:34%;top:91%}.mn-travel{left:16%;top:65%}.mn-worth{left:18%;top:27%}

/* ============================================================
   FFE DESIGN STANDARD v2.0
   ============================================================ */
:root{
  --ffe-space-1:4px;
  --ffe-space-2:8px;
  --ffe-space-3:12px;
  --ffe-space-4:16px;
  --ffe-space-5:20px;
  --ffe-space-6:24px;
  --ffe-space-8:32px;
  --ffe-radius-sm:10px;
  --ffe-radius-md:16px;
  --ffe-radius-lg:22px;
  --ffe-control-h:54px;
  --ffe-focus:0 0 0 3px rgba(56,189,248,.18);
}
.tabs{
  grid-template-columns:repeat(11,minmax(62px,1fr))!important;
  overflow-x:auto;
  overflow-y:hidden;
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{min-width:62px}
input:not([type="checkbox"]):not([type="radio"]),
select,textarea{
  width:100%!important;
  min-width:0!important;
  max-width:100%!important;
  box-sizing:border-box;
}
input[type="date"],input[type="datetime-local"],input[type="time"],input[type="month"]{
  width:100%!important;
  min-width:0!important;
  max-width:100%!important;
  -webkit-appearance:none;
  appearance:none;
}
input:focus,select:focus,textarea:focus,button:focus-visible{
  outline:none;
  box-shadow:var(--ffe-focus);
  border-color:var(--blue);
}
.ffe-surface{
  border:1px solid var(--border);
  border-radius:var(--ffe-radius-lg);
  padding:var(--ffe-space-4);
  background:rgba(17,24,39,.96)
}
.ffe-stack{display:grid;gap:var(--ffe-space-3)}
.ffe-grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:var(--ffe-space-3)}
.ffe-grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:var(--ffe-space-3)}
.ffe-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;border:1px solid var(--border);font-size:11px;font-weight:900}
.ffe-chip.good{color:var(--green)}.ffe-chip.info{color:var(--blue)}.ffe-chip.watch{color:var(--amber)}.ffe-chip.risk{color:var(--rose)}

/* ============================================================
   FINANCIAL DIGITAL TWIN
   ============================================================ */
.twin-shell{display:grid;gap:14px}
.twin-stage{
  position:relative;min-height:670px;border:1px solid var(--border);
  border-radius:26px;overflow:hidden;
  background:radial-gradient(circle at 50% 50%,rgba(56,189,248,.14),transparent 30%),rgba(8,16,29,.97)
}
.twin-stage svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.twin-link{stroke:rgba(56,189,248,.36);stroke-width:1.8;stroke-dasharray:7 8;animation:twinFlow 10s linear infinite}
@keyframes twinFlow{to{stroke-dashoffset:-120}}
.twin-main{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:190px;height:190px;border-radius:50%;
  display:grid;place-items:center;text-align:center;
  border:2px solid var(--blue);background:rgba(17,24,39,.98);
  box-shadow:0 0 0 12px rgba(56,189,248,.05),0 0 46px rgba(56,189,248,.24)
}
.twin-domain{
  position:absolute;transform:translate(-50%,-50%);
  width:126px;min-height:98px;padding:11px;
  border:1px solid var(--border);border-radius:18px;
  background:rgba(17,24,39,.98);text-align:center
}
.twin-domain .icon{font-size:24px}.twin-domain .value{font-size:17px;font-weight:950;margin-top:4px}
.td-inst{left:50%;top:10%}.td-acct{left:82%;top:26%}.td-txn{left:87%;top:58%}.td-bills{left:69%;top:87%}.td-goals{left:31%;top:87%}.td-vault{left:13%;top:58%}.td-life{left:18%;top:26%}
.twin-inspector{display:grid;gap:10px}
.twin-stat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.scenario-card{border-left:4px solid var(--blue)}
.scenario-result{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}

/* ============================================================
   VERIFIED AI COPILOT
   ============================================================ */
.copilot-layout{display:grid;gap:14px}
.copilot-chat{min-height:360px;max-height:620px;overflow:auto;display:grid;gap:10px;padding:12px;border:1px solid var(--border);border-radius:20px;background:rgba(8,16,29,.62)}
.copilot-msg{max-width:92%;padding:12px;border-radius:17px;border:1px solid var(--border)}
.copilot-msg.user{justify-self:end;background:rgba(56,189,248,.09)}
.copilot-msg.assistant{justify-self:start;background:rgba(30,38,64,.58)}
.copilot-msg .meta{font-size:10px;color:var(--muted);margin-top:7px}
.copilot-input{display:grid;grid-template-columns:1fr auto;gap:10px}
.copilot-evidence{margin-top:9px;padding:9px;border:1px solid var(--border);border-radius:12px;background:rgba(8,16,29,.46)}
.copilot-mode-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.copilot-mode{padding:12px;border:1px solid var(--border);border-radius:15px;background:rgba(17,24,39,.96)}
.provider-card{padding:12px;border:1px solid var(--border);border-radius:16px;background:rgba(17,24,39,.96)}
.provider-card.disabled{opacity:.7}
.trust-meter{height:10px;background:#08101d;border:1px solid var(--border);border-radius:999px;overflow:hidden}
.trust-meter>div{height:100%;background:linear-gradient(90deg,var(--rose),var(--amber),var(--green))}

/* ============================================================
   SECURE CONNECT FOUNDATION
   ============================================================ */
.connect-layout{display:grid;gap:14px}
.connect-banner{border-left:4px solid var(--blue)}
.connect-status-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.connection-card{padding:14px;border:1px solid var(--border);border-radius:18px;background:rgba(17,24,39,.96)}
.connection-card.connected{border-left:4px solid var(--green)}
.connection-card.sandbox{border-left:4px solid var(--blue)}
.connection-card.error{border-left:4px solid var(--rose)}
.consent-row{padding:10px;border:1px solid var(--border);border-radius:13px;background:rgba(8,16,29,.52)}
.arch-diagram{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;align-items:center;gap:10px;text-align:center}
.arch-box{padding:12px;border:1px solid var(--border);border-radius:14px;background:rgba(30,38,64,.5)}
.arch-arrow{font-size:24px;color:var(--blue)}
.sync-log{display:grid;gap:8px;max-height:300px;overflow:auto}
.sync-log-row{padding:9px;border:1px solid var(--border);border-radius:12px;background:rgba(8,16,29,.52)}
.security-check{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.security-check:last-child{border-bottom:0}

@media(min-width:900px){
  .twin-shell{grid-template-columns:minmax(0,1.35fr) minmax(300px,.65fr)}
  .copilot-layout{grid-template-columns:minmax(0,1.3fr) minmax(300px,.7fr)}
  .connect-layout{grid-template-columns:minmax(0,1.25fr) minmax(300px,.75fr)}
  .connect-status-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
}
@media(max-width:760px){
  .ffe-grid-2,.ffe-grid-3,.scenario-result{grid-template-columns:1fr}
  .twin-stage{min-height:760px}
  .twin-main{width:160px;height:160px}
  .twin-domain{width:104px;min-height:88px}
  .td-inst{left:50%;top:8%}.td-acct{left:82%;top:25%}.td-txn{left:86%;top:58%}.td-bills{left:68%;top:89%}.td-goals{left:32%;top:89%}.td-vault{left:14%;top:58%}.td-life{left:18%;top:25%}
  .arch-diagram{grid-template-columns:1fr}.arch-arrow{transform:rotate(90deg)}

:root{

  --ffe-normal:260ms;
  --ffe-shadow:0 16px 38px rgba(0,0,0,.28);
}
html{scroll-behavior:smooth}
body{
  background:
    radial-gradient(circle at 10% 0%,rgba(56,189,248,.08),transparent 28%),
    radial-gradient(circle at 90% 10%,rgba(52,211,153,.06),transparent 28%),
    var(--bg);
}
.card,.item,.mission-panel,.mission-kpi,.vault-card,.knowledge-category,
.forecast-card,.enterprise-card,.verify-card,.connection-card,.ffe-surface{
  transition:transform var(--ffe-fast) var(--ffe-ease),border-color var(--ffe-fast) var(--ffe-ease),box-shadow var(--ffe-fast) var(--ffe-ease);

.card:hover,.mission-panel:hover,.mission-kpi:hover,.knowledge-category:hover,
.forecast-card:hover,.enterprise-card:hover,.verify-card:hover,.connection-card:hover{

}
button{transition:transform var(--ffe-fast) var(--ffe-ease),filter var(--ffe-fast) var(--ffe-ease)}
button:hover{transform:translateY(-1px);filter:brightness(1.06)}
button:active{transform:scale(.99)}
.view{animation:ffeViewIn var(--ffe-normal) var(--ffe-ease)}

var db=null, DB_NAME="FFE_DB_SAFE", DB_VERSION=12;
var STORES=["accounts","transactions","bills","payroll","goals","budgets","documents","rules","settings","trips","institutions","events","connections","consents","copilotLogs","scenarios","verificationRecords","forecasts","workspaces","auditLogs","users","roles","retirementPlans","insurancePlans","taxPlans","lifePlans","nativeDevices","testLabRuns","testLabIssues","investments","timelineEvents","notifications","syncProfiles","syncQueue","changeJournal","devicePairs","syncConflicts","backupVersions","recoveryCodes","revokedDevices","restoreHistory"];
function openDB(){return new Promise(function(resolve,reject){
  var settled=false,req=indexedDB.open(DB_NAME,DB_VERSION);
  req.onupgradeneeded=function(e){
    var d=e.target.result;
    STORES.forEach(function(s){if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:"id"});});
  };
  req.onblocked=function(){
    if(!settled){settled=true;reject(new Error("FFE database upgrade is blocked. Close other FFE tabs and reopen the app."));}
  };
  req.onsuccess=function(){
    db=req.result;
    db.onversionchange=function(){try{db.close();}catch(e){}};
    if(!settled){settled=true;resolve(db);}
  };
  req.onerror=function(){
    if(!settled){settled=true;reject(req.error||new Error("IndexedDB could not be opened."));}
  };
});}
function store(name,mode){return db.transaction(name,mode||"readonly").objectStore(name);}
function all(name){return new Promise(function(resolve,reject){var r=store(name).getAll();r.onsuccess=function(){resolve(r.result||[]);};r.onerror=function(){reject(r.error);};});}
function put(name,obj){return new Promise(function(resolve,reject){
  try{
    var tx=db.transaction(name,"readwrite"),os=tx.objectStore(name),r=os.put(obj),requestDone=false;
    r.onsuccess=function(){requestDone=true;};
    r.onerror=function(){reject(r.error||new Error("Unable to write "+name+" record."));};
    tx.oncomplete=function(){resolve(obj);};
    tx.onerror=function(){reject(tx.error||r.error||new Error("Database transaction failed for "+name+"."));};
    tx.onabort=function(){reject(tx.error||new Error("Database transaction was aborted for "+name+"."));};
  }catch(error){reject(error);}
});}
function getItem(storeName,id){return new Promise(function(resolve,reject){
  try{
    var r=store(storeName).get(id);
    r.onsuccess=function(){resolve(r.result||null);};
    r.onerror=function(){reject(r.error||new Error("Unable to read "+storeName+" record."));};
  }catch(error){reject(error);}
});}
function del(name,id){return new Promise(function(resolve,reject){var r=store(name,"readwrite").delete(id);r.onsuccess=function(){resolve();};r.onerror=function(){reject(r.error);};});}
async function load(){for(var i=0;i<STORES.length;i++){state[STORES[i]]=await all(STORES[i]);}if(!state.settings.some(function(x){return x.id==="seeded";})){await put("accounts",{id:uid(),name:"Checking Account",type:"Checking",balance:0,creditLimit:0,apr:0,minimum:0,due:"",notes:"Starter account"});await put("bills",{id:uid(),name:"Rent",amount:1313.5,due:"1",category:"Housing",frequency:"Monthly"});await put("settings",{id:"seeded",value:true});await put("settings",{id:"version",value:"4.0.1-stable"});for(var j=0;j<STORES.length;j++){state[STORES[j]]=await all(STORES[j]);}}}
async function saveItem(storeName,obj){obj.updatedAt=new Date().toISOString();await put(storeName,obj);await load();}
async function deleteItem(storeName,id){await del(storeName,id);await load();renderAll();toast("Deleted");}
window.deleteItem=deleteItem;

function cashAmount(){return state.accounts.filter(function(a){return ["Checking","Savings","Cash"].indexOf(a.type)>=0;}).reduce(function(s,a){return s+Number(a.balance||0);},0);}
function debtAmount(){return state.accounts.filter(function(a){return ["Credit Card","Loan"].indexOf(a.type)>=0;}).reduce(function(s,a){return s+Number(a.balance||0);},0);}
function assetsAmount(){return state.accounts.filter(function(a){return ["Checking","Savings","Cash","Investment"].indexOf(a.type)>=0;}).reduce(function(s,a){return s+Number(a.balance||0);},0);}
function monthSpendAmount(){var ym=new Date().toISOString().slice(0,7);return state.transactions.filter(function(t){return String(t.date||"").slice(0,7)===ym && t.type==="Expense";}).reduce(function(s,t){return s+Number(t.amount||0);},0);}
function utilization(a){var lim=Number(a.creditLimit||0);return lim>0?Number(a.balance||0)/lim*100:0;}
function suggestedCategory(name){var s=String(name||"").toLowerCase();for(var i=0;i<state.rules.length;i++){var r=state.rules[i]; if(s.indexOf(String(r.contains||"").toLowerCase())>=0)return r.category;}if(/shell|chevron|exxon|mobil|valero/.test(s))return"Fuel";if(/costco|kroger|heb|walmart|grocery/.test(s))return"Food";if(/amazon|target|best buy/.test(s))return"Shopping";if(/netflix|spotify|hulu|disney/.test(s))return"Entertainment";if(/rent|apartment|mortgage/.test(s))return"Housing";return"Other";}

function bindInteractiveWorkspace(){
  if(window.__FFE_INTERACTIVE_BOUND)return;
  window.__FFE_INTERACTIVE_BOUND=true;

  var lastActivationAt=0;
  var lastAction="";

  function routeInteractiveClick(event){
    var closeTarget=event.target&&event.target.closest?event.target.closest("[data-ffe-close]"):null;
    if(closeTarget){
      event.preventDefault();
      event.stopPropagation();
      closeInteractiveDrawers();
      return;
    }

    var target=event.target&&event.target.closest?event.target.closest("[data-ffe-action]"):null;
    if(!target)return;

    var action=target.getAttribute("data-ffe-action");
    if(action!=="copilot"&&action!=="quickadd")return;

    var now=Date.now();
    if(action===lastAction&&now-lastActivationAt<650){
      event.preventDefault();
      event.stopPropagation();
      return;
    }

    lastActivationAt=now;
    lastAction=action;
    event.preventDefault();
    event.stopPropagation();
    openInteractiveDrawer(action);
  }

  document.addEventListener("click",routeInteractiveClick,true);

  document.addEventListener("keydown",function(e){
    if(e.key==="Escape")closeInteractiveDrawers();

    if((e.ctrlKey||e.metaKey)&&e.shiftKey&&String(e.key).toLowerCase()==="a"){
      e.preventDefault();
      openInteractiveDrawer("quickadd");
    }

    if((e.ctrlKey||e.metaKey)&&e.shiftKey&&String(e.key).toLowerCase()==="i"){
      e.preventDefault();
      openInteractiveDrawer("copilot");
    }
  });
}

function osMoney(value){return money(Number(value||0));}
function osPercent(value){return Number(value||0).toFixed(3)+"%";}

function osHealthScores(){
  var intel=financialIntelligenceSnapshot();
  var cashFlow=intel.monthlyIncome>0?Math.max(0,Math.min(100,50+(intel.monthlyCashFlow/intel.monthlyIncome)*50)):40;
  var credit=Math.max(0,Math.min(100,100-intel.creditUtilization));
  var savings=intel.monthlyIncome>0?Math.max(0,Math.min(100,(intel.monthlyCashFlow/intel.monthlyIncome)*100)):20;
  var debt=intel.debt>0?Math.max(0,Math.min(100,100-(intel.debt/Math.max(intel.assets,1))*100)):100;
  var investing=intel.investmentValue>0?Math.max(25,Math.min(100,(intel.investmentValue/Math.max(intel.assets,1))*100)):10;
  var goals=(state.goals||[]).length?Math.min(100,(state.goals||[]).reduce(function(s,g){return s+(Number(g.target||0)>0?Math.min(1,Number(g.current||0)/Number(g.target||0)):0);},0)/(state.goals||[]).length*100):15;
  var risk=Math.max(0,Math.min(100,(credit+debt)/2));
  var overall=(cashFlow+credit+savings+debt+investing+goals+risk)/7;
  return{
    cashFlow:cashFlow,credit:credit,savings:savings,debt:debt,
    investing:investing,goals:goals,risk:risk,overall:overall
  };
}

  if(c.indexOf("subscription")>=0)return "Subscription detection requires recurring merchant history. Current recurring bill count: "+(state.bills||[]).length+".";

function ffe22MonthlyHistory(months){
  var now=new Date(),rows=[];
  for(var i=months-1;i>=0;i--){
    var d=new Date(now.getFullYear(),now.getMonth()-i,1);
    var ym=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    var income=0,expense=0;
    (state.transactions||[]).forEach(function(t){
      if(String(t.date||"").slice(0,7)!==ym)return;
      var amt=Math.abs(Number(t.amount||0));
      if(String(t.type||"").toLowerCase()==="income")income+=amt;
      else expense+=amt;
    });
    rows.push({label:ym,income:income,expense:expense,cashFlow:income-expense});
  }
  return rows;
}

function ffe22Forecast(months){
  var hist=ffe22MonthlyHistory(6);
  var avgIncome=hist.reduce(function(s,x){return s+x.income;},0)/Math.max(hist.length,1);
  var avgExpense=hist.reduce(function(s,x){return s+x.expense;},0)/Math.max(hist.length,1);
  if(avgIncome===0||avgExpense===0){
    var snap=financialIntelligenceSnapshot();
    avgIncome=Math.max(avgIncome,snap.monthlyIncome||0);
    avgExpense=Math.max(avgExpense,snap.monthlyExpense||0);
  }
  var rows=[],balance=financialIntelligenceSnapshot().netWorth;
  for(var i=1;i<=months;i++){
    var seasonal=1+((i%6===0)?0.03:0);
    var income=avgIncome*seasonal;
    var expense=avgExpense*(1+0.0025*i);
    balance+=income-expense;
    rows.push({month:i,income:income,expense:expense,balance:balance});
  }
  return rows;
}

function ffe22SubscriptionCandidates(){
  var groups={};
  (state.transactions||[]).forEach(function(t){
    var name=String(t.name||"").trim();
    if(!name)return;
    var key=name.toLowerCase();
    if(!groups[key])groups[key]=[];
    groups[key].push(Math.abs(Number(t.amount||0)));
  });
  return Object.keys(groups).map(function(k){
    var a=groups[k],avg=a.reduce(function(s,x){return s+x;},0)/a.length;
    var variance=a.reduce(function(s,x){return s+Math.pow(x-avg,2);},0)/a.length;
    return{name:k,count:a.length,average:avg,std:Math.sqrt(variance)};
  }).filter(function(x){return x.count>=2&&x.std<=Math.max(2,x.average*0.10);})
    .sort(function(a,b){return b.count-a.count;});
}

function ffe22RetirementProjection(){
  var plans=state.retirementPlans||[];
  var plan=plans[0]||{};
  var current=Number(plan.current||plan.balance||financialIntelligenceSnapshot().investmentValue||0);
  var monthly=Number(plan.monthlyContribution||plan.contribution||0);
  var rate=Number(plan.annualReturn||7)/100;
  var years=Number(plan.years||30);
  var months=Math.max(1,Math.round(years*12));
  var monthlyRate=rate/12;
  var future=current*Math.pow(1+monthlyRate,months);
  if(monthlyRate>0)future+=monthly*((Math.pow(1+monthlyRate,months)-1)/monthlyRate);
  else future+=monthly*months;
  return{current:current,monthly:monthly,rate:rate*100,years:years,future:future};
}

function ffe22TaxSnapshot(){
  var tx=transactionMonthlySummary();
  var annualIncome=Math.max(tx.income*12,financialIntelligenceSnapshot().monthlyIncome*12);
  var deductions=(state.taxPlans||[]).reduce(function(s,x){return s+Number(x.deductions||x.amount||0);},0);
  var taxable=Math.max(0,annualIncome-deductions);
  var estimated=taxable*0.22;
  return{annualIncome:annualIncome,deductions:deductions,taxable:taxable,estimated:estimated};
}

function ffe22BudgetOptimization(){
  var snap=financialIntelligenceSnapshot(),cats=transactionMonthlySummary().categories;
  var entries=Object.keys(cats).map(function(k){return[k,cats[k]];}).sort(function(a,b){return b[1]-a[1];});
  var target=Math.max(0,snap.monthlyExpense-snap.monthlyIncome*0.80);
  var suggestions=[];
  entries.slice(0,5).forEach(function(x){
    suggestions.push({
      category:x[0],
      current:x[1],
      suggested:Math.max(0,x[1]-target/Math.max(entries.slice(0,5).length,1))
    });
  });
  return suggestions;
}

var FFE245={
  unlocked:false,
  sessionKey:null,
  vaultMeta:null
};

function ffe245Supported(){
  return !!(window.crypto&&window.crypto.subtle&&window.indexedDB);
}
function ffe245TextEncoder(){return new TextEncoder();}
function ffe245TextDecoder(){return new TextDecoder();}

async function ffe245DeriveKey(pin,salt){
  var base=await crypto.subtle.importKey(
    "raw",ffe245TextEncoder().encode(pin),
    {name:"PBKDF2"},false,["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:salt,iterations:210000,hash:"SHA-256"},
    base,
    {name:"AES-GCM",length:256},
    false,
    ["encrypt","decrypt"]
  );
}
function ffe245B64(bytes){
  var s="",arr=new Uint8Array(bytes);
  for(var i=0;i<arr.length;i++)s+=String.fromCharCode(arr[i]);
  return btoa(s);
}
function ffe245FromB64(value){
  var s=atob(value),arr=new Uint8Array(s.length);
  for(var i=0;i<s.length;i++)arr[i]=s.charCodeAt(i);
  return arr;
}
async function ffe245EncryptObject(obj,key){
  var iv=crypto.getRandomValues(new Uint8Array(12));
  var data=ffe245TextEncoder().encode(JSON.stringify(obj));
  var cipher=await crypto.subtle.encrypt({name:"AES-GCM",iv:iv},key,data);
  return{iv:ffe245B64(iv),cipher:ffe245B64(cipher)};
}
async function ffe245DecryptObject(payload,key){
  var plain=await crypto.subtle.decrypt(
    {name:"AES-GCM",iv:ffe245FromB64(payload.iv)},
    key,
    ffe245FromB64(payload.cipher)
  );
  return JSON.parse(ffe245TextDecoder().decode(plain));
}
function ffe245LoadMeta(){
  try{
    FFE245.vaultMeta=JSON.parse(localStorage.getItem("FFE245_SECURE_VAULT")||"null");
  }catch(error){FFE245.vaultMeta=null;}
  return FFE245.vaultMeta;
}
function ffe245SaveMeta(meta){
  localStorage.setItem("FFE245_SECURE_VAULT",JSON.stringify(meta));
  FFE245.vaultMeta=meta;
}
async function ffe245CreateVault(){
  var pin=String(($("ffe245CreatePin")&&$("ffe245CreatePin").value)||"");
  var confirm=String(($("ffe245ConfirmPin")&&$("ffe245ConfirmPin").value)||"");
  if(pin.length<6){toast("Use a PIN with at least 6 characters");return;}
  if(pin!==confirm){toast("PIN confirmation does not match");return;}
  var salt=crypto.getRandomValues(new Uint8Array(16));
  var key=await ffe245DeriveKey(pin,salt);
  var encrypted=await ffe245EncryptObject({secrets:[],createdAt:new Date().toISOString()},key);
  ffe245SaveMeta({
    version:1,
    salt:ffe245B64(salt),
    payload:encrypted,
    updatedAt:new Date().toISOString()
  });
  FFE245.unlocked=true;
  FFE245.sessionKey=key;
  renderAll();show("secure245");toast("Secure vault created");
}
async function ffe245Unlock(){
  var meta=ffe245LoadMeta();
  if(!meta){toast("Create the secure vault first");return;}
  var pin=String(($("ffe245UnlockPin")&&$("ffe245UnlockPin").value)||"");
  try{
    var key=await ffe245DeriveKey(pin,ffe245FromB64(meta.salt));
    await ffe245DecryptObject(meta.payload,key);
    FFE245.sessionKey=key;
    FFE245.unlocked=true;
    renderAll();show("secure245");toast("Secure vault unlocked");
  }catch(error){
    toast("Unable to unlock vault");
  }
}
function ffe245Lock(){
  FFE245.sessionKey=null;
  FFE245.unlocked=false;
  renderAll();show("secure245");toast("Secure vault locked");
}
async function ffe245ReadVault(){
  var meta=ffe245LoadMeta();
  if(!meta||!FFE245.sessionKey)return{secrets:[]};
  return ffe245DecryptObject(meta.payload,FFE245.sessionKey);
}
async function ffe245WriteVault(vault){
  var meta=ffe245LoadMeta();
  if(!meta||!FFE245.sessionKey)throw new Error("Vault locked");
  meta.payload=await ffe245EncryptObject(vault,FFE245.sessionKey);
  meta.updatedAt=new Date().toISOString();
  ffe245SaveMeta(meta);
}
async function ffe245AddSecret(){
  if(!FFE245.unlocked){toast("Unlock the vault first");return;}

   FFE 25.0 ENCRYPTED MULTI-DEVICE SYNC FOUNDATION

var FFE25={
  deviceId:null,
  syncKey:null,
  unlocked:false
};

function ffe25DeviceId(){
  if(FFE25.deviceId)return FFE25.deviceId;
  var existing=localStorage.getItem("FFE25_DEVICE_ID");
  if(!existing){
    existing="ffe-device-"+Date.now()+"-"+Math.random().toString(36).slice(2,10);
    localStorage.setItem("FFE25_DEVICE_ID",existing);
  }
  FFE25.deviceId=existing;
  return existing;
}
function ffe25DeviceName(){
  return (navigator.platform||"Device")+" · "+(navigator.userAgent.indexOf("Mobile")>=0?"Mobile":"Desktop");
}
function ffe25SyncProfile(){
  try{return JSON.parse(localStorage.getItem("FFE25_SYNC_PROFILE")||"null");}
  catch(error){return null;}
}
function ffe25SaveSyncProfile(profile){
  localStorage.setItem("FFE25_SYNC_PROFILE",JSON.stringify(profile));
}
async function ffe25DeriveSyncKey(passphrase,salt){
  var base=await crypto.subtle.importKey(
    "raw",new TextEncoder().encode(passphrase),
    {name:"PBKDF2"},false,["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:salt,iterations:260000,hash:"SHA-256"},
    base,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]
  );
}
function ffe25B64(bytes){
  var s="",a=new Uint8Array(bytes);
  for(var i=0;i<a.length;i++)s+=String.fromCharCode(a[i]);
  return btoa(s);
}
function ffe25FromB64(v){
  var s=atob(v),a=new Uint8Array(s.length);
  for(var i=0;i<s.length;i++)a[i]=s.charCodeAt(i);
  return a;
}
async function ffe25Encrypt(data,key){
  var iv=crypto.getRandomValues(new Uint8Array(12));
  var plain=new TextEncoder().encode(JSON.stringify(data));
  var cipher=await crypto.subtle.encrypt({name:"AES-GCM",iv:iv},key,plain);
  return{iv:ffe25B64(iv),cipher:ffe25B64(cipher)};
}
async function ffe25Decrypt(payload,key){
  var plain=await crypto.subtle.decrypt(
    {name:"AES-GCM",iv:ffe25FromB64(payload.iv)},
    key,ffe25FromB64(payload.cipher)
  );
  return JSON.parse(new TextDecoder().decode(plain));
}
async function ffe25CreateProfile(){
  var name=String(($("ffe25ProfileName")&&$("ffe25ProfileName").value)||"Personal Workspace").trim();
  var pass=String(($("ffe25Passphrase")&&$("ffe25Passphrase").value)||"");
  var confirm=String(($("ffe25PassphraseConfirm")&&$("ffe25PassphraseConfirm").value)||"");
  if(pass.length<8){toast("Use a passphrase with at least 8 characters");return;}
  if(pass!==confirm){toast("Passphrases do not match");return;}
  var salt=crypto.getRandomValues(new Uint8Array(16));
  var key=await ffe25DeriveSyncKey(pass,salt);
  var verifier=await ffe25Encrypt({verified:true,deviceId:ffe25DeviceId()},key);
  var profile={
    id:"sync-"+Date.now(),
    name:name,
    salt:ffe25B64(salt),
    verifier:verifier,
    createdAt:new Date().toISOString(),
    updateChannel:"manual-transfer"
  };
  ffe25SaveSyncProfile(profile);
  FFE25.syncKey=key;
  FFE25.unlocked=true;
  await put("devicePairs",{
    id:ffe25DeviceId(),
    name:ffe25DeviceName(),
    pairedAt:new Date().toISOString(),
    lastSeen:new Date().toISOString(),
    status:"current"
  });
  await load();renderAll();show("sync25");toast("Encrypted sync profile created");
}

  var profile=ffe25SyncProfile();
  if(!profile){toast("Create a sync profile first");return;}
  var pass=String(($("ffe25UnlockPassphrase")&&$("ffe25UnlockPassphrase").value)||"");
  try{
    var key=await ffe25DeriveSyncKey(pass,ffe25FromB64(profile.salt));
    await ffe25Decrypt(profile.verifier,key);
    FFE25.syncKey=key;
    FFE25.unlocked=true;
    renderAll();show("sync25");toast("Sync profile unlocked");
  }catch(error){toast("Unable to unlock sync profile");}
}

  FFE25.syncKey=null;FFE25.unlocked=false;
  renderAll();show("sync25");toast("Sync profile locked");
}
function ffe25TrackedStores(){
  return["accounts","transactions","bills","goals","trips","documents","investments","retirementPlans","taxPlans"];
}
function ffe25Snapshot(){
  var data={};
  ffe25TrackedStores().forEach(function(store){data[store]=state[store]||[];});
  return{
    format:"FFE25-SYNC-PACKAGE",
    version:1,
    deviceId:ffe25DeviceId(),
    deviceName:ffe25DeviceName(),
    exportedAt:new Date().toISOString(),
    data:data
  };
}
async function ffe25CreateTransferPackage(){
  if(!FFE25.unlocked||!FFE25.syncKey){toast("Unlock the sync profile first");return;}
  var encrypted=await ffe25Encrypt(ffe25Snapshot(),FFE25.syncKey);
  var profile=ffe25SyncProfile();
  var packageData={
    format:"FFE25-ENCRYPTED-TRANSFER",
    version:1,
    profileId:profile.id,
    salt:profile.salt,
    payload:encrypted,
    createdAt:new Date().toISOString()
  };
  await put("syncQueue",{
    id:"queue-"+Date.now(),
    direction:"export",
    status:"completed",
    createdAt:new Date().toISOString(),
    deviceId:ffe25DeviceId()
  });
  await put("changeJournal",{

    "application/json"
  );
  await load();renderAll();show("sync25");toast("Encrypted transfer package exported");
}
function ffe25RecordKey(store,item){
  return store+":"+String(item.id||item.name||JSON.stringify(item));
}
function ffe25Conflict(existing,incoming){
  var e=existing.updatedAt||existing.date||existing.createdAt||"";
  var i=incoming.updatedAt||incoming.date||incoming.createdAt||"";
  return JSON.stringify(existing)!==JSON.stringify(incoming)&&e===i;
}
async function ffe25MergePackage(snapshot){
  var conflicts=0,changes=0;
  for(const store of ffe25TrackedStores()){
    var incoming=snapshot.data[store]||[];
    var current=state[store]||[];
    var currentMap={};
    current.forEach(function(x){currentMap[ffe25RecordKey(store,x)]=x;});
    for(const item of incoming){
      var key=ffe25RecordKey(store,item);
      var existing=currentMap[key];
      if(existing&&ffe25Conflict(existing,item)){
        conflicts++;
        await put("syncConflicts",{
          id:"conflict-"+Date.now()+"-"+Math.random().toString(36).slice(2,7),
          store:store,
          recordKey:key,
          local:existing,
          incoming:item,
          status:"unresolved",
          createdAt:new Date().toISOString()
        });
        continue;
      }
      if(!existing||JSON.stringify(existing)!==JSON.stringify(item)){
        await put(store,item);
        changes++;
      }
    }
  }
  await put("changeJournal",{
    id:"journal-"+Date.now(),
    action:"import",
    summary:"Imported "+changes+" change(s), detected "+conflicts+" conflict(s)",
    createdAt:new Date().toISOString(),
    deviceId:snapshot.deviceId||"unknown"
  });
  return{changes:changes,conflicts:conflicts};
}
async function ffe25ImportTransfer(event){
  var file=event.target.files&&event.target.files[0];
  if(!file)return;
  var pass=String(($("ffe25ImportPassphrase")&&$("ffe25ImportPassphrase").value)||"");
  if(!pass){toast("Enter the transfer passphrase first");return;}
  try{
    var pkg=JSON.parse(await file.text());
    if(pkg.format!=="FFE25-ENCRYPTED-TRANSFER")throw new Error("Invalid transfer package");
    var key=await ffe25DeriveSyncKey(pass,ffe25FromB64(pkg.salt));
    var snapshot=await ffe25Decrypt(pkg.payload,key);
    var result=await ffe25MergePackage(snapshot);
    await put("devicePairs",{
      id:snapshot.deviceId||("device-"+Date.now()),
      name:snapshot.deviceName||"Imported Device",
      pairedAt:new Date().toISOString(),
      lastSeen:new Date().toISOString(),
      status:"paired"
    });
    await put("syncQueue",{
      id:"queue-"+Date.now(),
      direction:"import",
      status:result.conflicts?"conflicts":"completed",
      createdAt:new Date().toISOString(),
      deviceId:snapshot.deviceId||"unknown"
    });
    await load();renderAll();show("sync25");
    toast("Imported "+result.changes+" change(s); "+result.conflicts+" conflict(s)");
  }catch(error){toast("Unable to import encrypted transfer package");}
}
async function ffe25ResolveConflict(id,choice){
  var conflict=(state.syncConflicts||[]).find(function(x){return x.id===id;});
  if(!conflict)return;
  if(choice==="incoming")await put(conflict.store,conflict.incoming);
  conflict.status="resolved-"+choice;
  conflict.resolvedAt=new Date().toISOString();
  await put("syncConflicts",conflict);
  await load();renderAll();show("sync25");toast("Conflict resolved");
}

async function ffe28ImportBackup(event){

  if(!pass){toast("Enter the backup passphrase");return;}
  try{
    var pkg=JSON.parse(await file.text());
    if(pkg.format!=="FFE28-ENCRYPTED-BACKUP")throw new Error("Invalid backup package");
    var key=await ffe28DeriveKey(pass,ffe28FromB64(pkg.profileSalt));
    var snapshot=await ffe28Decrypt(pkg.backup.payload,key);
    if(snapshot.owner!=="ncarlosp@gmail.com")throw new Error("Owner mismatch");
    var integrity=await ffe28Sha256(JSON.stringify(snapshot));
    if(integrity!==pkg.backup.integrity)throw new Error("Integrity verification failed");
    pkg.backup.status="imported-verified";
    await put("backupVersions",pkg.backup);
    await load();renderAll();show("recovery28");toast("Encrypted backup verified and imported");

async function ffe28RestoreVersion(id){
  var version=(state.backupVersions||[]).find(function(x){return x.id===id;});
  if(!version||!FFE28.unlocked||!FFE28.key){toast("Unlock the profile before restoring");return;}
  if(!confirm("Replace local FFE data with this backup version?"))return;
  try{
    var snapshot=await ffe28Decrypt(version.payload,FFE28.key);
    var integrity=await ffe28Sha256(JSON.stringify(snapshot));
    if(integrity!==version.integrity)throw new Error("Integrity mismatch");
    for(const store of Object.keys(snapshot.data||{})){
      if(STORES.indexOf(store)<0)continue;
      for(const item of (snapshot.data[store]||[]))await put(store,item);
    }
    await put("restoreHistory",{
      id:"restore-"+Date.now(),
      backupId:id,
      restoredAt:new Date().toISOString(),
      deviceId:ffe25DeviceId(),
      status:"completed"
    });

  }catch(error){toast("Restore failed integrity verification");}
}
function ffe28GenerateRecoveryCodes(){
  var codes=[];
  for(var i=0;i<8;i++){
    codes.push(crypto.getRandomValues(new Uint32Array(2))[0].toString(36).toUpperCase().padStart(7,"0")+"-"+crypto.getRandomValues(new Uint32Array(2))[0].toString(36).toUpperCase().padStart(7,"0"));
  }
  Promise.all(codes.map(function(code,index){
    return ffe28Sha256(code).then(function(hash){
      return put("recoveryCodes",{
        id:"recovery-code-"+Date.now()+"-"+index,
        hash:hash,
        createdAt:new Date().toISOString(),
        used:false
      });
    });
  })).then(function(){
    downloadBlob("FFE_28_Recovery_Codes.txt",codes.join("\n"),"text/plain");
    load().then(function(){renderAll();show("recovery28");toast("Recovery codes generated");});
  });
}

function clampNcc(v,min,max){return Math.max(min,Math.min(max,v))}

function normalizeSyncMeta(obj){
  if(!obj.syncMeta)obj.syncMeta={};
  var m=obj.syncMeta;
  if(m.lastSyncedAt===undefined)m.lastSyncedAt=null;
  if(m.sourceUpdatedAt===undefined)m.sourceUpdatedAt=null;
  if(m.lastImportedAt===undefined)m.lastImportedAt=null;
  if(m.lastManualEditAt===undefined)m.lastManualEditAt=obj.updatedAt||null;
  if(m.nextExpectedUpdateAt===undefined)m.nextExpectedUpdateAt=null;
  if(m.syncStatus===undefined)m.syncStatus="manual";
  if(m.syncSource===undefined)m.syncSource="manual";
  if(m.syncError===undefined)m.syncError="";
  if(!Array.isArray(m.syncHistory))m.syncHistory=[];
  return obj;
}
function syncAgeDays(value){
  if(!value)return null;
  var d=new Date(value);
  if(isNaN(d))return null;
  return (Date.now()-d.getTime())/86400000;
}
function freshnessStatus(obj){
  normalizeSyncMeta(obj);
  var m=obj.syncMeta;
  if(m.syncStatus==="error")return{key:"error",label:"Sync Error",cls:"freshness-error"};
  if(m.syncStatus==="disconnected")return{key:"disconnected",label:"Disconnected",cls:"freshness-disconnected"};
  if(m.syncStatus==="manual")return{key:"manual",label:"Manual Only",cls:"freshness-manual"};
  var age=syncAgeDays(m.lastSyncedAt||m.sourceUpdatedAt||m.lastImportedAt||m.lastManualEditAt);
  if(age===null||age>7)return{key:"stale",label:"Stale",cls:"freshness-stale"};
  if(age>2)return{key:"due",label:"Due Soon",cls:"freshness-due"};
  return{key:"current",label:"Current",cls:"freshness-current"};
}
function freshnessSummary(){
  var records=[].concat(state.accounts||[],state.bills||[],state.documents||[],state.goals||[],state.payroll||[]);
  var counts={current:0,due:0,stale:0,error:0,manual:0,disconnected:0};
  records.forEach(function(r){var s=freshnessStatus(r);counts[s.key]=(counts[s.key]||0)+1;});
  var total=records.length;
  var confidence=total?((counts.current*100+counts.due*70+counts.manual*55+counts.stale*20)/total):35;
  return{counts:counts,total:total,confidence:clampNcc(confidence,0,100),records:records};
}

function syncMetaFromForm(d,obj){
  normalizeSyncMeta(obj);
  function toIso(v){if(!v)return null;var x=new Date(v);return isNaN(x)?null:x.toISOString();}
  obj.syncMeta.lastSyncedAt=toIso(d.get("lastSyncedAt"));
  obj.syncMeta.sourceUpdatedAt=toIso(d.get("sourceUpdatedAt"));
  obj.syncMeta.nextExpectedUpdateAt=toIso(d.get("nextExpectedUpdateAt"));
  obj.syncMeta.syncStatus=d.get("syncStatus")||"manual";
  obj.syncMeta.syncSource=d.get("syncSource")||"manual";
  obj.syncMeta.syncError=d.get("syncError")||"";
  obj.syncMeta.lastManualEditAt=nowIso();
  addSyncEvent(obj,obj.syncMeta.syncStatus==="error"?"error":"update","Record saved or updated.",obj.syncMeta.syncSource);
  return obj;
}

function nccMetrics(){
  var cash=cashAmount();
  var debt=debtAmount();
  var assets=assetsAmount();
  var monthSpend=monthSpendAmount();
  var income=state.transactions.filter(function(t){return t.type==="Income";}).reduce(function(s,t){return s+Number(t.amount||0);},0);
  var cards=state.accounts.filter(function(a){return a.type==="Credit Card";});
  var cardBalance=cards.reduce(function(s,a){return s+Number(a.balance||0);},0);
  var cardLimit=cards.reduce(function(s,a){return s+Number(a.creditLimit||0);},0);
  var utilization=cardLimit>0?cardBalance/cardLimit*100:0;
  var totalBills=state.bills.reduce(function(s,b){return s+Number(b.amount||0);},0);
  var goalsTotal=state.goals.reduce(function(s,g){return s+Number(g.target||0);},0);
  var goalsCurrent=state.goals.reduce(function(s,g){return s+Number(g.current||0);},0);
  var goalProgress=goalsTotal>0?goalsCurrent/goalsTotal*100:0;
  var cashScore=clampNcc(cash>0?55+Math.min(45,cash/5000*45):15,0,100);
  var creditScore=clampNcc(cardLimit===0?55:100-utilization,0,100);
  var debtScore=clampNcc(assets>0?100-(debt/assets*100):debt>0?25:80,0,100);
  var billsScore=clampNcc(totalBills>0&&cash>0?100-(totalBills/cash*35):totalBills===0?65:25,0,100);
  var incomeScore=clampNcc(income>monthSpend&&income>0?85:income>0?60:35,0,100);
  var goalsScore=clampNcc(goalsTotal>0?goalProgress:50,0,100);
  var docsScore=clampNcc(state.documents.length*14,15,100);
  var completenessFields=0,totalFields=7;
  if(state.accounts.length)completenessFields++;
  if(state.transactions.length)completenessFields++;
  if(state.bills.length)completenessFields++;
  if(state.documents.length)completenessFields++;
  if(state.rules.length)completenessFields++;
  if(cards.every(function(a){return Number(a.creditLimit||0)>0})&&cards.length)completenessFields++;
  if(income>0)completenessFields++;
  var completeness=completenessFields/totalFields*100;
  var freshness=freshnessSummary();
  var health=(cashScore*.19+creditScore*.16+debtScore*.15+billsScore*.12+incomeScore*.13+goalsScore*.07+docsScore*.05+completeness*.06+freshness.confidence*.07);
  return {
    cash:cash,debt:debt,assets:assets,netWorth:assets-debt,monthSpend:monthSpend,income:income,
    utilization:utilization,totalBills:totalBills,goalProgress:goalProgress,completeness:completeness,
    health:clampNcc(health,0,100),freshness:freshness,
    scores:{cash:cashScore,credit:creditScore,debt:debtScore,bills:billsScore,income:incomeScore,goals:goalsScore,documents:docsScore}
  };
}
function nccState(score){
  if(score>=75)return{label:"Healthy",cls:"healthy"};
  if(score>=50)return{label:"Watch",cls:"watch"};
  return{label:"Action Needed",cls:"critical"};
}
function nccEvidence(key){
  var m=nccMetrics(),data={
    cash:{title:"Cash Health",value:money(m.cash),score:m.scores.cash,formula:"55 + min(45, cash ÷ $5,000 × 45), when cash is positive",sources:["Cash-type accounts","Current account balances"],path:["Accounts","Cash total","Cash score"]},
    income:{title:"Income Signal",value:money(m.income),score:m.scores.income,formula:"85 when recorded income exceeds monthly expenses; 60 when income exists; otherwise 35",sources:["Income transactions","Monthly expense transactions"],path:["Transactions","Income vs expenses","Income score"]},
    bills:{title:"Bill Coverage",value:money(m.totalBills),score:m.scores.bills,formula:"100 − (monthly bills ÷ cash × 35), constrained from 0 to 100",sources:["Bills","Cash-type accounts"],path:["Bills","Cash coverage","Bill score"]},
    debt:{title:"Debt Position",value:money(m.debt),score:m.scores.debt,formula:"100 − (debt ÷ assets × 100), constrained from 0 to 100",sources:["Credit-card accounts","Loan accounts","Asset accounts"],path:["Accounts","Debt-to-assets","Debt score"]},
    credit:{title:"Credit Utilization",value:m.utilization.toFixed(3)+"%",score:m.scores.credit,formula:"100 − total revolving utilization",sources:["Credit-card balances","Credit limits"],path:["Cards","Utilization","Credit score"]},
    goals:{title:"Goal Progress",value:m.goalProgress.toFixed(3)+"%",score:m.scores.goals,formula:"Current goal savings ÷ total goal targets × 100",sources:["Goals"],path:["Goals","Progress ratio","Goal score"]},
    documents:{title:"Document Coverage",value:String(state.documents.length),score:m.scores.documents,formula:"14 points per stored document, constrained from 15 to 100",sources:["Document Vault"],path:["Documents","Coverage count","Document score"]},
    core:{title:"Overall Financial Health",value:m.health.toFixed(3),score:m.health,formula:"Weighted score: Cash 20% + Credit 17% + Debt 16% + Bills 13% + Income 14% + Goals 8% + Documents 6% + Completeness 6%",sources:["Accounts","Transactions","Bills","Goals","Documents","Rules"],path:["Validated records","Deterministic subsystem scores","Weighted health score"]}
  };
  var e=data[key]||data.core;
  var trust=e.score>=75?"Verified":e.score>=50?"Supported":"Incomplete";
  return '<div class="head"><div><h2 style="margin:0">'+esc(e.title)+'</h2><p class="muted">Deterministic evidence panel</p></div><button class="btn secondary" onclick="closeNccEvidence()">Close</button></div>'+
  '<div class="evidence-grid" style="margin-top:14px"><div class="card"><div class="label">Current Value</div><div class="value">'+esc(e.value)+'</div></div><div class="card"><div class="label">Subsystem Score</div><div class="value">'+Number(e.score).toFixed(3)+'</div></div><div class="card"><div class="label">Trust Class</div><div class="value">'+trust+'</div></div><div class="card"><div class="label">AI Provider</div><div class="value">None</div><div class="muted">FFE calculation engine only</div></div></div>'+
  '<div class="section"><div><h2>Evidence Path</h2></div></div><div class="evidence-path">'+e.path.map(function(x,i){return '<span class="evidence-step">'+esc(x)+'</span>'+(i<e.path.length-1?'<span class="arrow">→</span>':'');}).join("")+'</div>'+
  '<div class="section"><div><h2>Formula</h2></div></div><div class="item"><div class="muted">'+esc(e.formula)+'</div></div>'+
  '<div class="section"><div><h2>Source Records</h2></div></div><div class="list">'+e.sources.map(function(x){return '<div class="item"><div class="title">'+esc(x)+'</div><div class="muted">Read from local IndexedDB records.</div></div>';}).join("")+'</div>';

function nccBrief(m){
  var items=[];
  if(m.utilization>=50)items.push({level:"critical",title:"Credit needs attention",text:"Overall utilization is "+m.utilization.toFixed(3)+"%."});
  else items.push({level:"healthy",title:"Credit utilization",text:"Overall utilization is "+m.utilization.toFixed(3)+"%."});
  if(m.totalBills>m.cash&&m.totalBills>0)items.push({level:"critical",title:"Bill coverage risk",text:"Recorded bills exceed available cash."});
  else items.push({level:"healthy",title:"Bill coverage",text:money(m.cash)+" cash against "+money(m.totalBills)+" recorded bills."});
  if(m.completeness<60)items.push({level:"watch",title:"Data completeness",text:"Add more records to improve confidence. Current completeness: "+m.completeness.toFixed(3)+"%."});
  if(!state.transactions.length)items.push({level:"watch",title:"Import transactions",text:"Transaction data is needed for stronger spending and cash-flow signals."});
  if(!items.length)items.push({level:"healthy",title:"Systems nominal",text:"No immediate deterministic alerts were found."});
  return items;
}


function missionUpcomingBills(){
  var now=new Date();
  var end=new Date(now.getTime()+30*86400000);
  return state.bills.filter(function(b){
    if(!b.due)return false;
    var d=new Date(b.due+"T00:00:00");
    return !isNaN(d)&&d>=new Date(now.getFullYear(),now.getMonth(),now.getDate())&&d<=end;
  }).sort(function(a,b){return new Date(a.due)-new Date(b.due);});
}

function missionPriorities(){
  var m=nccMetrics(),items=[];
  var upcoming=missionUpcomingBills();
  var vault=vaultSummary();
  var travel=travelSummary();

  if(m.totalBills>m.cash&&m.totalBills>0){
    items.push({level:"high",score:95,title:"Bill coverage risk",text:"Recorded bills exceed available cash.",evidence:"Cash accounts and bills"});
  }
  if(m.utilization>=50){
    items.push({level:"high",score:90,title:"High credit utilization",text:"Overall utilization is "+m.utilization.toFixed(3)+"%.",evidence:"Credit-card balances and limits"});
  }
  if(vault.expired>0){
    items.push({level:"high",score:88,title:"Expired knowledge records",text:vault.expired+" record(s) are expired.",evidence:"Knowledge Vault renewal dates"});
  }
  if(vault.expiring>0){
    items.push({level:"medium",score:76,title:"Renewals due soon",text:vault.expiring+" record(s) are due within 60 days.",evidence:"Knowledge Vault renewal dates"});
  }
  if(travel.gap>0){
    items.push({level:"medium",score:72,title:"Travel funding gap",text:"Planned travel has a remaining gap of "+money(travel.gap)+".",evidence:"Travel plans and saved amounts"});
  }
  if(upcoming.length){
    items.push({level:"medium",score:68,title:"Upcoming bills",text:upcoming.length+" bill(s) are due within 30 days.",evidence:"Bill due dates"});
  }
  if(m.freshness&&m.freshness.confidence<60){
    items.push({level:"medium",score:66,title:"Refresh stale records",text:"Data freshness confidence is "+m.freshness.confidence.toFixed(3)+"%.",evidence:"Sync metadata"});
  }
  if(!state.transactions.length){
    items.push({level:"low",score:45,title:"Import transactions",text:"Transaction data is needed for stronger cash-flow insight.",evidence:"Transaction store"});
  }
  if(!items.length){
    items.push({level:"low",score:25,title:"Systems stable",text:"No major rules-based issues were identified.",evidence:"Current FFE records"});
  }
  return items.sort(function(a,b){return b.score-a.score;});
}

function missionEvents(){
  var rows=[];
  missionUpcomingBills().slice(0,4).forEach(function(b){rows.push({date:b.due,title:b.name,type:"Bill",detail:money(b.amount)});});
  state.trips.filter(function(t){return t.startDate;}).slice().sort(function(a,b){return new Date(a.startDate)-new Date(b.startDate);}).slice(0,3).forEach(function(t){rows.push({date:t.startDate,title:t.name,type:"Travel",detail:t.location});});
  state.documents.map(function(d){return{item:d,status:vaultRenewalStatus(d)};}).filter(function(x){return x.status.key==="expiring"||x.status.key==="expired";}).slice(0,3).forEach(function(x){rows.push({date:x.item.expirationDate||x.item.renewalDate,title:x.item.title||x.item.docType,type:"Renewal",detail:x.status.label});});
  return rows.sort(function(a,b){return new Date(a.date||0)-new Date(b.date||0);}).slice(0,8);
}

function missionCashFlowBreakdown(){
  var by={};
  state.transactions.filter(function(t){return t.type==="Expense";}).forEach(function(t){
    by[t.category||"Uncategorized"]=(by[t.category||"Uncategorized"]||0)+Number(t.amount||0);
  });
  return Object.entries(by).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
}

function scrollToExactDestination(id,attempt){
  attempt=attempt||0;
  var target=$(id);
  if(target){
    requestAnimationFrame(function(){target.scrollIntoView({behavior:"smooth",block:"start"});});
    return true;
  }
  if(attempt<15)setTimeout(function(){scrollToExactDestination(id,attempt+1);},80);
  return false;
}
function neuralRoute(view,panel){
  try{
    if(panel)sessionStorage.setItem("FFE_PENDING_MONEY_PANEL",panel);
    location.hash=view;
  }catch(error){}
  show(view);
  if(view==="money"){
    setTimeout(function(){
      var targetPanel=panel||"accounts";
      try{targetPanel=targetPanel||sessionStorage.getItem("FFE_PENDING_MONEY_PANEL")||"accounts";}catch(error){}
      showMoneyPanel(targetPanel);
      try{sessionStorage.removeItem("FFE_PENDING_MONEY_PANEL");}catch(error){}
      scrollToExactDestination("money-target-"+targetPanel,0);
    },120);
    return;
  }
  var destinations={
    travel:"travel-target-main",
    vault:"money-target-vault",
    analytics:"analytics-target-networth",
    home:"home",
    twin:"twin",
    copilot:"copilot",
    more:"more"
  };
  setTimeout(function(){scrollToExactDestination(destinations[view]||view,0);},120);
}

function bindNeuralNavigation(){
  var wrap=document.querySelector(".mission-core-wrap");
  if(!wrap||wrap.dataset.neuralBound==="1")return;
  wrap.dataset.neuralBound="1";
  var lastTap=0;
  function activate(event){
    var node=event.target.closest&&event.target.closest("[data-neural-view]");
    if(!node||!wrap.contains(node))return;
    var now=Date.now();
    if(now-lastTap<350&&event.type==="click")return;
    lastTap=now;
    event.preventDefault();
    event.stopPropagation();
    neuralRoute(node.dataset.neuralView,node.dataset.neuralPanel||"");
  }
  wrap.addEventListener("touchend",activate,{passive:false});
  wrap.addEventListener("pointerup",activate,{passive:false});
  wrap.addEventListener("click",activate,false);
}
window.addEventListener("hashchange",function(){

  }
});

function twinSnapshot(){
  var m=nccMetrics();
  return{
    generatedAt:new Date().toISOString(),
    institutions:(state.institutions||[]).length,
    accounts:(state.accounts||[]).length,
    transactions:(state.transactions||[]).length,
    bills:(state.bills||[]).length,
    goals:(state.goals||[]).length,
    documents:(state.documents||[]).length,
    trips:(state.trips||[]).length,
    assets:m.assets,
    debt:m.debt,
    cash:m.cash,
    netWorth:m.netWorth,
    income:m.income,
    monthSpend:m.monthSpend,
    utilization:m.utilization,
    health:m.health,
    freshness:m.freshness?m.freshness.confidence:0
  };
}

function twinDomainDetails(domain){
  var s=twinSnapshot(),title="",rows=[];
  if(domain==="institutions"){
    title="Institutions";
    rows=(state.institutions||[]).map(function(i){var t=institutionTotals(i.id);return[i.name,i.type,money(t.assets-t.debt)];});
  }else if(domain==="accounts"){
    title="Accounts";
    rows=(state.accounts||[]).map(function(a){return[a.name,a.type,money(a.balance||0)];});
  }else if(domain==="transactions"){
    title="Transactions";
    rows=(state.transactions||[]).slice().reverse().slice(0,25).map(function(t){return[t.name,t.category,money(t.amount||0)];});
  }else if(domain==="bills"){
    title="Bills";
    rows=(state.bills||[]).map(function(b){return[b.name,b.due||"No date",money(b.amount||0)];});
  }else if(domain==="goals"){
    title="Goals";
    rows=(state.goals||[]).map(function(g){return[g.name,money(g.current||0)+" / "+money(g.target||0),g.due||"No date"];});
  }else if(domain==="vault"){
    title="Knowledge Center";
    rows=(state.documents||[]).slice().reverse().slice(0,25).map(function(d){return[d.title||d.docType,d.category||d.docType,vaultRenewalStatus(d).label];});
  }else{
    title="Life Plans";
    rows=(state.trips||[]).map(function(t){var c=calcTripScenario(t,1);return[t.name,t.location,money(c.total)];});
  }
  var target=$("twinInspector");
  if(target){
    target.innerHTML='<div class="section" style="margin-top:0"><div><h2>'+esc(title)+'</h2><p>Digital Twin domain details.</p></div></div>'+
      '<div class="list">'+(rows.length?rows.map(function(r){return'<div class="item"><div class="head"><div><div class="title">'+esc(r[0])+'</div><div class="muted">'+esc(r[1])+'</div></div><strong>'+esc(r[2])+'</strong></div></div>';}).join(""):'<div class="empty">No records in this domain.</div>')+'</div>';
  }
}
