<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b0f19">
<title>Financial Freedom Engine 3.5.2 Safe</title>
<style>
:root{--bg:#0b0f19;--card:#131a2c;--card2:#1e2640;--border:#2e3a5f;--text:#f8fafc;--muted:#94a3b8;--blue:#38bdf8;--green:#34d399;--amber:#fbbf24;--rose:#fb7185;--safe:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 0 0,rgba(56,189,248,.16),transparent 36%),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding-bottom:calc(92px + var(--safe))}
button,input,select,textarea{font:inherit}button{cursor:pointer}.app-shell{max-width:1100px;margin:auto;padding:18px 14px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.brand{display:flex;gap:12px;align-items:center}.logo{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--green));color:#06111c;font-weight:950;display:grid;place-items:center}.pill{border:1px solid var(--border);border-radius:999px;padding:8px 10px;color:var(--muted);font-size:12px;font-weight:800}h1{font-size:18px;margin:0}.brand p{margin:3px 0 0;color:var(--muted);font-size:12px}.tabs{position:fixed;left:0;right:0;bottom:0;z-index:20;display:grid;grid-template-columns:repeat(5,1fr);gap:5px;padding:8px 8px calc(8px + var(--safe));background:rgba(11,15,25,.94);backdrop-filter:blur(14px);border-top:1px solid var(--border)}.tab{display:grid;place-items:center;gap:2px;background:transparent;color:var(--muted);border:1px solid transparent;border-radius:14px;padding:7px 2px;font-weight:900}.tab span{font-size:10px}.tab.active{background:var(--card2);border-color:var(--border);color:var(--text)}.view{display:none}.view.active{display:block}.card,.item,.hero{background:rgba(19,26,44,.96);border:1px solid var(--border);border-radius:18px;box-shadow:0 14px 36px #0005}.card{padding:14px}.hero{padding:16px;margin-bottom:12px;background:linear-gradient(135deg,rgba(56,189,248,.16),rgba(52,211,153,.07))}.hero h2{font-size:24px;margin:0 0 4px}.hero p,.muted{margin:0;color:var(--muted);font-size:12px}.grid{display:grid;gap:12px}.list{display:grid;gap:10px}.item{padding:12px;display:grid;gap:8px}.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.label{font-size:11px;color:var(--muted);font-weight:950;text-transform:uppercase;letter-spacing:.05em}.value{font-size:22px;font-weight:950;margin-top:5px}.big{font-size:34px;font-weight:950;letter-spacing:-.04em}.section{display:flex;justify-content:space-between;align-items:end;margin:18px 0 8px;gap:10px}.section h2{font-size:18px;margin:0}.head{display:flex;justify-content:space-between;align-items:start;gap:10px}.title{font-weight:950}.money{font-weight:950;white-space:nowrap;font-variant-numeric:tabular-nums}.badge{border-radius:999px;padding:4px 8px;font-size:11px;font-weight:950;display:inline-flex}.blue{background:#38bdf824;color:var(--blue)}.green{background:#34d39924;color:var(--green)}.amber{background:#fbbf2424;color:var(--amber)}.rose{background:#fb718524;color:var(--rose)}.empty{border:1px dashed var(--border);border-radius:14px;color:var(--muted);text-align:center;padding:18px}.bar{height:10px;background:#0a1020;border:1px solid var(--border);border-radius:999px;overflow:hidden}.bar>div{height:100%;background:linear-gradient(90deg,var(--blue),var(--green))}
form{display:grid;gap:10px}label{display:grid;gap:5px;color:var(--muted);font-size:12px;font-weight:950}input,select,textarea{width:100%;border:1px solid var(--border);border-radius:12px;background:#0a1020;color:var(--text);padding:11px 12px}textarea{min-height:80px}.formgrid{display:grid;gap:10px}.actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}.btn{border:1px solid transparent;border-radius:12px;padding:10px 12px;font-weight:950;background:var(--blue);color:#06111c}.btn.secondary{background:transparent;color:var(--text);border-color:var(--border)}.btn.green{background:var(--green)}.btn.rose{background:var(--rose);color:white}.toast{position:fixed;left:12px;right:12px;bottom:calc(100px + var(--safe));background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:12px;box-shadow:0 16px 40px #0008;display:none;z-index:30}.toast.show{display:block}.timeline-item{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start}.timeline-dot{width:12px;height:12px;border-radius:999px;background:var(--blue);box-shadow:0 0 0 4px rgba(56,189,248,.14);margin-top:5px}.import-preview-row{border-left:4px solid var(--blue)}.duplicate-row{border-left-color:var(--rose)}
@media(min-width:760px){body{padding-bottom:0}.app-shell{padding:24px}.tabs{position:sticky;top:0;bottom:auto;border:1px solid var(--border);border-radius:18px;margin-bottom:16px;grid-template-columns:repeat(13,auto);justify-content:start}.tab{grid-auto-flow:column;padding:10px 12px}.tab span{font-size:12px}.kpis{grid-template-columns:repeat(4,1fr)}.cols{grid-template-columns:1.05fr .95fr;align-items:start}.formgrid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
(function(){
"use strict";

function $(id){return document.getElementById(id);}
function uid(){return "id_"+Date.now()+"_"+Math.random().toString(16).slice(2);}
function today(){return new Date().toISOString().slice(0,10);}
function money(v){return Number(v||0).toLocaleString(undefined,{style:"currency",currency:"USD",minimumFractionDigits:3,maximumFractionDigits:3});}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c];});}
function toast(m){var t=$("toast"); if(!t)return; t.textContent=m; t.className="toast show"; setTimeout(function(){t.className="toast";},2200);}

var state={accounts:[],transactions:[],bills:[],payroll:[],goals:[],budgets:[],documents:[],rules:[],settings:[]};
var db=null;
var DB_NAME="FFE_DB_SAFE";
var DB_VERSION=1;
var STORES=["accounts","transactions","bills","payroll","goals","budgets","documents","rules","settings"];

function openDB(){
  return new Promise(function(resolve,reject){
    if(!window.indexedDB){reject(new Error("IndexedDB not available"));return;}
    var req=indexedDB.open(DB_NAME,DB_VERSION);
    req.onupgradeneeded=function(e){
      var d=e.target.result;
      STORES.forEach(function(s){if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:"id"});});
    };
    req.onsuccess=function(){db=req.result;resolve(db);};
    req.onerror=function(){reject(req.error||new Error("IndexedDB error"));};
  });
}
function store(name,mode){return db.transaction(name,mode||"readonly").objectStore(name);}
function all(name){
  return new Promise(function(resolve,reject){
    var r=store(name).getAll();
    r.onsuccess=function(){resolve(r.result||[]);};
    r.onerror=function(){reject(r.error);};
  });
}
function put(name,obj){
  return new Promise(function(resolve,reject){
    var r=store(name,"readwrite").put(obj);
    r.onsuccess=function(){resolve(obj);};
    r.onerror=function(){reject(r.error);};
  });
}
function del(name,id){
  return new Promise(function(resolve,reject){
    var r=store(name,"readwrite").delete(id);
    r.onsuccess=function(){resolve();};
    r.onerror=function(){reject(r.error);};
  });
}
async function load(){
  for(var i=0;i<STORES.length;i++){state[STORES[i]]=await all(STORES[i]);}
  if(!state.settings.some(function(x){return x.id==="seeded";})){
    await put("accounts",{id:uid(),name:"Checking Account",type:"Checking",balance:0,creditLimit:0,apr:0,minimum:0,due:"",notes:"Starter account"});
    await put("bills",{id:uid(),name:"Rent",amount:1313.5,due:"1",category:"Housing",frequency:"Monthly"});
    await put("settings",{id:"seeded",value:true});
    await put("settings",{id:"version",value:"3.5.2-safe"});
    for(var j=0;j<STORES.length;j++){state[STORES[j]]=await all(STORES[j]);}
  }
}
async function saveItem(storeName,obj){obj.updatedAt=new Date().toISOString();await put(storeName,obj);await load();}
async function deleteItem(storeName,id){await del(storeName,id);await load();renderAll();toast("Deleted");}

function cashAmount(){return state.accounts.filter(function(a){return ["Checking","Savings","Cash"].indexOf(a.type)>=0;}).reduce(function(s,a){return s+Number(a.balance||0);},0);}
function debtAmount(){return state.accounts.filter(function(a){return ["Credit Card","Loan"].indexOf(a.type)>=0;}).reduce(function(s,a){return s+Number(a.balance||0);},0);}
function assetsAmount(){return state.accounts.filter(function(a){return ["Checking","Savings","Cash","Investment"].indexOf(a.type)>=0;}).reduce(function(s,a){return s+Number(a.balance||0);},0);}
function monthSpendAmount(){var ym=new Date().toISOString().slice(0,7);return state.transactions.filter(function(t){return String(t.date||"").slice(0,7)===ym && t.type==="Expense";}).reduce(function(s,t){return s+Number(t.amount||0);},0);}
function utilization(a){var lim=Number(a.creditLimit||0);return lim>0?Number(a.balance||0)/lim*100:0;}
function suggestedCategory(name){
  var s=String(name||"").toLowerCase();
  for(var i=0;i<state.rules.length;i++){var r=state.rules[i]; if(s.indexOf(String(r.contains||"").toLowerCase())>=0)return r.category;}
  if(/shell|chevron|exxon|mobil|valero/.test(s))return"Fuel";
  if(/costco|kroger|heb|walmart|grocery/.test(s))return"Food";
  if(/amazon|target|best buy/.test(s))return"Shopping";
  if(/netflix|spotify|hulu|disney/.test(s))return"Entertainment";
  if(/rent|apartment|mortgage/.test(s))return"Housing";
  return"Other";
}

var views=["home","accounts","credit","transactions","import","bills","vault","timeline","search","rules","reports","advisor","settings"];
var labels={home:"🏠 Home",accounts:"🏦 Accounts",credit:"💡 Credit",transactions:"💳 Txns",import:"📥 Import",bills:"🧾 Bills",vault:"📄 Vault",timeline:"📅 Timeline",search:"🔍 Search",rules:"⚙️ Rules",reports:"📈 Reports",advisor:"🤖 Advisor",settings:"⚙️ Settings"};

function appShell(){
  return '<div class="app-shell"><header class="topbar"><div class="brand"><div class="logo">FFE</div><div><h1>Financial Freedom Engine</h1><p>3.5.2 Safe Build · Transaction Import</p></div></div><div class="pill">IndexedDB</div></header><nav class="tabs">'+views.map(function(v){var parts=labels[v].split(" ");return '<button class="tab" data-view="'+v+'">'+parts[0]+'<span>'+parts.slice(1).join(" ")+'</span></button>';}).join("")+'</nav><main>'+views.map(function(v){return '<section id="'+v+'" class="view"></section>';}).join("")+'</main></div>';
}
function show(v){
  views.forEach(function(x){var el=$(x); if(el)el.className="view"+(x===v?" active":"");});
  Array.prototype.forEach.call(document.querySelectorAll(".tab"),function(b){b.className="tab"+(b.getAttribute("data-view")===v?" active":"");});
  location.hash=v;
}
function renderHome(){
  var ca=cashAmount(),de=debtAmount(),net=assetsAmount()-de,sp=monthSpendAmount();
  var score=Math.min(100,30+(ca>0?20:0)+(de===0?25:10)+(state.transactions.length?10:0)+(state.documents.length?10:0));
  return '<div class="hero"><h2>Good day, Carlos</h2><p>Your Financial Command Center.</p></div><div class="kpis"><div class="card"><div class="label">Cash</div><div class="value">'+money(ca)+'</div></div><div class="card"><div class="label">Net Worth</div><div class="value">'+money(net)+'</div></div><div class="card"><div class="label">Debt</div><div class="value">'+money(de)+'</div></div><div class="card"><div class="label">Month Spend</div><div class="value">'+money(sp)+'</div></div></div><div class="section"><div><h2>Financial Freedom Score</h2></div></div><div class="card"><div class="big">'+score.toFixed(3)+'</div><div class="bar"><div style="width:'+score+'%"></div></div></div>';
}
function renderAccounts(){
  return '<div class="section"><div><h2>Accounts</h2><p>Add checking, savings, cards, loans, and investments.</p></div></div><div class="grid cols"><div class="card"><form id="accountForm"><div class="formgrid"><label>Name<input name="name" required></label><label>Type<select name="type"><option>Checking</option><option>Savings</option><option>Cash</option><option>Credit Card</option><option>Loan</option><option>Investment</option></select></label><label>Balance<input name="balance" type="number" step="0.001"></label><label>Credit Limit<input name="creditLimit" type="number" step="0.001"></label><label>APR %<input name="apr" type="number" step="0.001"></label><label>Minimum Payment<input name="minimum" type="number" step="0.001"></label><label>Due Date / Day<input name="due"></label></div><button class="btn green">Save Account</button></form></div><div class="list">'+(state.accounts.length?state.accounts.map(function(a){return '<div class="item"><div class="head"><div><div class="title">'+esc(a.name)+'</div><div class="muted">'+esc(a.type)+'</div></div><div class="money">'+money(a.balance)+'</div></div><button class="btn rose" onclick="deleteItem(\'accounts\',\''+a.id+'\')">Delete</button></div>';}).join(""):'<div class="empty">No accounts.</div>')+'</div></div>';
}
function renderCredit(){
  var cards=state.accounts.filter(function(a){return a.type==="Credit Card";});
  var totalBal=cards.reduce(function(s,a){return s+Number(a.balance||0);},0);
  var totalLimit=cards.reduce(function(s,a){return s+Number(a.creditLimit||0);},0);
  var totalUtil=totalLimit>0?totalBal/totalLimit*100:0;
  return '<div class="section"><div><h2>Credit Intelligence</h2><p>Utilization, payment planning, and credit risk.</p></div></div><div class="kpis"><div class="card"><div class="label">Card Balance</div><div class="value">'+money(totalBal)+'</div></div><div class="card"><div class="label">Credit Limit</div><div class="value">'+money(totalLimit)+'</div></div><div class="card"><div class="label">Utilization</div><div class="value">'+totalUtil.toFixed(3)+'%</div></div><div class="card"><div class="label">Cards</div><div class="value">'+cards.length+'</div></div></div><div class="section"><div><h2>Cards</h2></div></div><div class="list">'+(cards.length?cards.map(function(a){var u=utilization(a);return '<div class="item"><div class="head"><div><div class="title">'+esc(a.name)+'</div><div class="muted">APR '+Number(a.apr||0).toFixed(3)+'% · Due '+esc(a.due||"—")+'</div></div><span class="badge '+(u>=50?"amber":"green")+'">'+u.toFixed(3)+'%</span></div><div class="bar"><div style="width:'+Math.min(100,u)+'%"></div></div><div class="muted">Minimum payment: '+money(a.minimum)+'</div></div>';}).join(""):'<div class="empty">Add credit card accounts to activate this dashboard.</div>')+'</div>';
}
function renderTransactions(){
  return '<div class="section"><div><h2>Transactions</h2></div></div><div class="grid cols"><div class="card"><form id="txnForm"><div class="formgrid"><label>Date<input name="date" type="date" value="'+today()+'"></label><label>Type<select name="type"><option>Expense</option><option>Income</option></select></label><label>Name<input name="name" required></label><label>Amount<input name="amount" type="number" step="0.001"></label><label>Category<input name="category" value="Other"></label></div><button class="btn green">Save Transaction</button></form></div><div class="list">'+(state.transactions.length?state.transactions.slice().reverse().map(function(t){return '<div class="item"><div class="head"><div><div class="title">'+esc(t.name)+'</div><div class="muted">'+esc(t.date)+' · '+esc(t.category)+' · '+esc(t.type)+'</div></div><div class="money">'+money(t.amount)+'</div></div><button class="btn rose" onclick="deleteItem(\'transactions\',\''+t.id+'\')">Delete</button></div>';}).join(""):'<div class="empty">No transactions.</div>')+'</div></div>';
}
function renderBills(){
  return '<div class="section"><div><h2>Bills</h2></div></div><div class="grid cols"><div class="card"><form id="billForm"><div class="formgrid"><label>Name<input name="name" required></label><label>Amount<input name="amount" type="number" step="0.001"></label><label>Due Day<input name="due"></label><label>Category<input name="category"></label><label>Frequency<select name="frequency"><option>Monthly</option><option>Weekly</option><option>Yearly</option></select></label></div><button class="btn green">Save Bill</button></form></div><div class="list">'+(state.bills.length?state.bills.map(function(b){return '<div class="item"><div class="head"><div><div class="title">'+esc(b.name)+'</div><div class="muted">Due '+esc(b.due)+' · '+esc(b.category)+'</div></div><div class="money">'+money(b.amount)+'</div></div></div>';}).join(""):'<div class="empty">No bills.</div>')+'</div></div>';
}
function renderVault(){
  return '<div class="section"><div><h2>Document Vault</h2><p>Manual statement review and account update.</p></div></div><div class="grid cols"><div class="card"><form id="docForm"><div class="formgrid"><label>Institution<input name="institution" value="Best Buy / Citi"></label><label>Account Ending<input name="accountEnding"></label><label>New Balance<input name="newBalance" type="number" step="0.001"></label><label>Minimum Payment<input name="minimumPayment" type="number" step="0.001"></label><label>Credit Limit<input name="creditLimit" type="number" step="0.001"></label><label>Payment Due Date<input name="paymentDueDate"></label></div><button class="btn green">Save Statement</button></form></div><div class="list">'+(state.documents.length?state.documents.slice().reverse().map(function(d){return '<div class="item"><div class="title">'+esc(d.institution)+' '+(d.accountEnding?'••••'+esc(d.accountEnding):'')+'</div><div class="muted">'+esc(d.paymentDueDate||"")+' · '+money(d.newBalance)+'</div></div>';}).join(""):'<div class="empty">No documents saved.</div>')+'</div></div>';
}
function renderTimeline(){
  var events=[];
  state.transactions.forEach(function(t){events.push({type:"Transaction",title:t.name,date:t.date,amount:t.amount,detail:t.category});});
  state.documents.forEach(function(d){events.push({type:"Document",title:d.institution,date:d.importedAt,amount:d.newBalance,detail:d.docType});});
  state.bills.forEach(function(b){events.push({type:"Bill",title:b.name,date:b.due,amount:b.amount,detail:b.category});});
  events.sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  return '<div class="section"><div><h2>Financial Timeline</h2></div></div><div class="list">'+(events.length?events.map(function(e){return '<div class="item timeline-item"><span class="timeline-dot"></span><div><div class="title">'+esc(e.title)+'</div><div class="muted">'+esc(e.type)+' · '+esc(e.detail)+' · '+esc(e.date||"")+'</div></div><div class="money">'+money(e.amount)+'</div></div>';}).join(""):'<div class="empty">No timeline events.</div>')+'</div>';
}
function renderSearch(){
  return '<div class="section"><div><h2>Smart Search</h2></div></div><div class="card"><label>Search<input id="searchBox" placeholder="Amazon, Best Buy, rent..."></label></div><div class="list" id="searchResults"><div class="empty">Type to search.</div></div>';
}
function renderRules(){
  return '<div class="section"><div><h2>Rules Engine</h2></div></div><div class="grid cols"><div class="card"><form id="ruleForm"><div class="formgrid"><label>If merchant contains<input name="contains"></label><label>Category<input name="category"></label></div><button class="btn green">Save Rule</button></form></div><div class="list">'+(state.rules.length?state.rules.map(function(r){return '<div class="item"><div class="title">If contains "'+esc(r.contains)+'"</div><div class="muted">Category → '+esc(r.category)+'</div></div>';}).join(""):'<div class="empty">No rules yet.</div>')+'</div></div>';
}
function renderReports(){
  var by={};
  state.transactions.filter(function(t){return t.type==="Expense";}).forEach(function(t){by[t.category]=(by[t.category]||0)+Number(t.amount||0);});
  var vals=Object.keys(by).map(function(k){return by[k];});
  var max=vals.length?Math.max.apply(null,vals):1;
  return '<div class="section"><div><h2>Reports</h2></div></div><div class="card"><div class="grid">'+(Object.keys(by).length?Object.keys(by).map(function(k){return '<div><div class="head"><span>'+esc(k)+'</span><strong>'+money(by[k])+'</strong></div><div class="bar"><div style="width:'+Math.min(100,by[k]/max*100)+'%"></div></div></div>';}).join(""):'<div class="empty">No expense transactions yet.</div>')+'</div></div>';
}
function renderAdvisor(){
  var de=debtAmount(), ca=cashAmount();
  return '<div class="section"><div><h2>AI Advisor</h2><p>Rules-based local guidance.</p></div></div><div class="list"><div class="item"><div class="title">Cash Position</div><div class="muted">'+money(ca)+' available in cash accounts.</div></div><div class="item"><div class="title">Debt Snapshot</div><div class="muted">'+money(de)+' recorded debt.</div></div><div class="item"><div class="title">Import Engine</div><div class="muted">Use CSV import to populate transactions, then reports and advisor become more useful.</div></div></div>';
}
function renderImport(){
  return '<div class="section"><div><h2>Transaction Import Engine</h2><p>CSV import with preview, categories, and duplicate detection.</p></div></div><div class="grid cols"><div class="card"><label>CSV File<input type="file" id="csvFile" accept=".csv,text/csv"></label><div class="formgrid" style="margin-top:12px"><label>Date Column<select id="mapDate"></select></label><label>Name Column<select id="mapName"></select></label><label>Amount Column<select id="mapAmount"></select></label><label>Category Column<select id="mapCategory"></select></label></div><div class="actions" style="justify-content:flex-start;margin-top:12px"><button class="btn secondary" id="autoMap">Auto Map</button><button class="btn green" id="approveImport">Approve Import</button></div></div><div class="card"><h2>Stats</h2><div class="kpis"><div class="card"><div class="label">Rows</div><div class="value" id="statRows">0</div></div><div class="card"><div class="label">New</div><div class="value" id="statNew">0</div></div></div></div></div><div class="section"><div><h2>Preview</h2></div></div><div class="list" id="importPreview"><div class="empty">Choose a CSV.</div></div>';
}
var rawRows=[], previewRows=[], headers=[];
function parseCSV(text){
  var lines=text.trim().split(/\r?\n/); if(!lines.length)return[];
  var h=lines[0].split(",").map(function(x){return x.trim().replace(/^"|"$/g,"");});
  return lines.slice(1).map(function(line){var vals=line.split(",").map(function(x){return x.trim().replace(/^"|"$/g,"");}); var o={}; h.forEach(function(k,i){o[k]=vals[i]||"";}); return o;});
}
function fillSelect(id){var el=$(id); if(!el)return; el.innerHTML='<option value="">-- none --</option>'+headers.map(function(h){return '<option>'+esc(h)+'</option>';}).join("");}
function autoMap(){
  function guess(list){var lower=headers.map(function(h){return h.toLowerCase();}); for(var i=0;i<list.length;i++){var idx=lower.findIndex(function(h){return h.indexOf(list[i])>=0;}); if(idx>=0)return headers[idx];} return "";}
  $("mapDate").value=guess(["date"]);
  $("mapName").value=guess(["description","merchant","name","payee"]);
  $("mapAmount").value=guess(["amount","debit","credit"]);
  $("mapCategory").value=guess(["category"]);
  buildPreview();
}
function txKey(t){return [t.date,t.name,Number(t.amount).toFixed(2)].join("|").toLowerCase();}
function buildPreview(){
  var ex=new Set(state.transactions.map(txKey));
  previewRows=rawRows.map(function(r){
    var name=r[$("mapName").value]||"Imported";
    var amount=Math.abs(Number(String(r[$("mapAmount").value]||"0").replace(/[$,()]/g,""))||0);
    var tx={id:uid(),date:r[$("mapDate").value]||today(),type:"Expense",name:name,amount:amount,category:r[$("mapCategory").value]||suggestedCategory(name),notes:"CSV import"};
    return {tx:tx,duplicate:ex.has(txKey(tx))};
  });
  $("statRows").textContent=previewRows.length;
  $("statNew").textContent=previewRows.filter(function(x){return !x.duplicate;}).length;
  $("importPreview").innerHTML=previewRows.length?previewRows.map(function(r){return '<div class="item import-preview-row '+(r.duplicate?'duplicate-row':'')+'"><div class="head"><div><div class="title">'+esc(r.tx.name)+'</div><div class="muted">'+esc(r.tx.date)+' · '+esc(r.tx.category)+'</div></div><div class="money">'+money(r.tx.amount)+'</div></div><span class="badge '+(r.duplicate?'rose':'green')+'">'+(r.duplicate?'Duplicate':'New')+'</span></div>';}).join(""):'<div class="empty">No rows.</div>';
}
async function approveImport(){
  var rows=previewRows.filter(function(x){return !x.duplicate;}).map(function(x){return x.tx;});
  for(var i=0;i<rows.length;i++){await put("transactions",rows[i]);}
  await load(); renderAll(); toast("Imported "+rows.length+" transactions");
}

function bindForms(){
  var f;
  f=$("accountForm"); if(f)f.onsubmit=async function(e){e.preventDefault();var d=new FormData(f);await saveItem("accounts",{id:uid(),name:d.get("name"),type:d.get("type"),balance:Number(d.get("balance")||0),creditLimit:Number(d.get("creditLimit")||0),apr:Number(d.get("apr")||0),minimum:Number(d.get("minimum")||0),due:d.get("due")});renderAll();toast("Saved");};
  f=$("txnForm"); if(f)f.onsubmit=async function(e){e.preventDefault();var d=new FormData(f);await saveItem("transactions",{id:uid(),date:d.get("date"),type:d.get("type"),name:d.get("name"),amount:Number(d.get("amount")||0),category:d.get("category")});renderAll();toast("Saved");};
  f=$("billForm"); if(f)f.onsubmit=async function(e){e.preventDefault();var d=new FormData(f);await saveItem("bills",{id:uid(),name:d.get("name"),amount:Number(d.get("amount")||0),due:d.get("due"),category:d.get("category"),frequency:d.get("frequency")});renderAll();toast("Saved");};
  f=$("docForm"); if(f)f.onsubmit=async function(e){e.preventDefault();var d=new FormData(f);var doc={id:uid(),institution:d.get("institution"),accountEnding:d.get("accountEnding"),newBalance:Number(d.get("newBalance")||0),minimumPayment:Number(d.get("minimumPayment")||0),creditLimit:Number(d.get("creditLimit")||0),paymentDueDate:d.get("paymentDueDate"),docType:"Statement",importedAt:new Date().toISOString()};await put("documents",doc);var name=doc.institution+(doc.accountEnding?" ••••"+doc.accountEnding:"");await put("accounts",{id:uid(),name:name,type:"Credit Card",balance:doc.newBalance,creditLimit:doc.creditLimit,minimum:doc.minimumPayment,due:doc.paymentDueDate});await load();renderAll();toast("Statement saved");};
  f=$("ruleForm"); if(f)f.onsubmit=async function(e){e.preventDefault();var d=new FormData(f);await saveItem("rules",{id:uid(),contains:d.get("contains"),category:d.get("category")});renderAll();toast("Rule saved");};
  var sb=$("searchBox"); if(sb)sb.oninput=function(){var q=sb.value.toLowerCase(); var rows=[]; function add(type,text){if(String(text).toLowerCase().indexOf(q)>=0)rows.push({type:type,text:text});} if(q){state.accounts.forEach(function(a){add("Account",a.name+" "+a.type);});state.transactions.forEach(function(t){add("Transaction",t.name+" "+t.category);});state.documents.forEach(function(d){add("Document",d.institution+" "+d.accountEnding);});state.bills.forEach(function(b){add("Bill",b.name+" "+b.category);});} $("searchResults").innerHTML=rows.length?rows.map(function(r){return '<div class="item"><div class="title">'+esc(r.type)+'</div><div class="muted">'+esc(r.text)+'</div></div>';}).join(""):'<div class="empty">No matches.</div>';};
  var cf=$("csvFile"); if(cf)cf.onchange=async function(e){var file=e.target.files[0]; if(!file)return; rawRows=parseCSV(await file.text()); headers=rawRows.length?Object.keys(rawRows[0]):[];["mapDate","mapName","mapAmount","mapCategory"].forEach(fillSelect);autoMap();};
  var am=$("autoMap"); if(am)am.onclick=autoMap;
  var ai=$("approveImport"); if(ai)ai.onclick=approveImport;
}

function renderAll(){
  $("app").innerHTML=appShell();
  $("home").innerHTML=renderHome();
  $("accounts").innerHTML=renderAccounts();
  $("credit").innerHTML=renderCredit();
  $("transactions").innerHTML=renderTransactions();
  $("import").innerHTML=renderImport();
  $("bills").innerHTML=renderBills();
  $("vault").innerHTML=renderVault();
  $("timeline").innerHTML=renderTimeline();
  $("search").innerHTML=renderSearch();
  $("rules").innerHTML=renderRules();
  $("reports").innerHTML=renderReports();
  $("advisor").innerHTML=renderAdvisor();
  $("settings").innerHTML='<div class="section"><div><h2>Settings</h2></div></div><div class="card"><h2>FFE 3.5.2 Safe Build</h2><p class="muted">Clean rebuild to fix blue/blank screen. Uses a separate safe database so it will start reliably.</p></div>';
  Array.prototype.forEach.call(document.querySelectorAll(".tab"),function(b){b.onclick=function(){show(b.getAttribute("data-view"));};});
  bindForms();
  show(location.hash.replace("#","")||"home");
}
window.deleteItem=deleteItem;

(async function(){
  try{await openDB(); await load(); renderAll();}
  catch(e){
    console.error(e);
    $("app").innerHTML='<div class="app-shell"><div class="card"><h2>Storage Startup Error</h2><p class="muted">Try normal browser mode and refresh. Private browsing can block storage.</p><pre style="white-space:pre-wrap;color:var(--rose)">'+esc(e.message||String(e))+'</pre></div></div>';
  }
})();
})();
</script>
