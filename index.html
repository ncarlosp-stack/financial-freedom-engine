/* ============================================================
   FFE SHARED DESIGN SYSTEM v1
   ============================================================ */
:root{
  --ds-space-1:4px;
  --ds-space-2:8px;
  --ds-space-3:12px;
  --ds-space-4:16px;
  --ds-space-5:20px;
  --ds-space-6:24px;
  --ds-space-8:32px;
  --ds-radius-sm:10px;
  --ds-radius-md:16px;
  --ds-radius-lg:22px;
  --ds-control-h:54px;
  --ds-control-h-mobile:58px;
  --ds-focus:0 0 0 3px rgba(56,189,248,.18);
  --ds-success:var(--green);
  --ds-info:var(--blue);
  --ds-warning:var(--amber);
  --ds-danger:var(--rose);
}

/* Global control-width fix — applies to all layouts and field types */
.formgrid,
form,
.card,
.item,
details,
label{
  min-width:0;
}

.formgrid{
  width:100%;
  max-width:100%;
}

.formgrid > label,
form > label{
  width:100%;
  max-width:100%;
  min-width:0;
  box-sizing:border-box;
}

input,
select,
textarea,
button{
  box-sizing:border-box;
  max-width:100%;
}

input:not([type="checkbox"]):not([type="radio"]),
select,
textarea{
  display:block;
  width:100%!important;
  min-width:0!important;
  max-width:100%!important;
}

input[type="date"],
input[type="datetime-local"],
input[type="time"],
input[type="month"],
input[type="week"]{
  inline-size:100%!important;
  width:100%!important;
  min-width:0!important;
  max-width:100%!important;
  -webkit-appearance:none;
  appearance:none;
}

/* Safari/iOS intrinsic sizing fix */
input[type="date"]::-webkit-date-and-time-value,
input[type="datetime-local"]::-webkit-date-and-time-value,
input[type="time"]::-webkit-date-and-time-value,
input[type="month"]::-webkit-date-and-time-value,
input[type="week"]::-webkit-date-and-time-value{
  text-align:left;
  min-width:0;
}

input[type="date"]::-webkit-calendar-picker-indicator,
input[type="datetime-local"]::-webkit-calendar-picker-indicator{
  margin-left:auto;
  flex:0 0 auto;
}

.ds-control,
input:not([type="checkbox"]):not([type="radio"]),
select,
textarea{
  min-height:var(--ds-control-h);
  border-radius:var(--ds-radius-md);
}

textarea{
  min-height:110px;
}

input:focus,
select:focus,
textarea:focus,
button:focus-visible{
  outline:none;
  box-shadow:var(--ds-focus);
  border-color:var(--ds-info);
}

/* Reusable design-system surfaces */
.ds-card{
  border:1px solid var(--border);
  border-radius:var(--ds-radius-md);
  background:rgba(17,24,39,.96);
  padding:var(--ds-space-4);
}
.ds-card-title{font-weight:950}
.ds-card-subtitle{color:var(--muted);font-size:12px;margin-top:4px}
.ds-stack{display:grid;gap:var(--ds-space-3)}
.ds-row{display:flex;align-items:center;gap:var(--ds-space-3);flex-wrap:wrap}
.ds-grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:var(--ds-space-3)}
.ds-grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:var(--ds-space-3)}
.ds-badge{
  display:inline-flex;align-items:center;gap:6px;
  border-radius:999px;padding:6px 10px;font-size:11px;font-weight:900;
  border:1px solid var(--border);background:rgba(30,38,64,.62)
}
.ds-badge.success{color:var(--ds-success)}
.ds-badge.info{color:var(--ds-info)}
.ds-badge.warning{color:var(--ds-warning)}
.ds-badge.danger{color:var(--ds-danger)}

.ds-swatch{
  height:34px;border-radius:10px;border:1px solid var(--border);
}
.ds-type-sample{padding:8px 0;border-bottom:1px solid var(--border)}
.ds-type-sample:last-child{border-bottom:0}
.ds-demo-field{display:grid;gap:6px}
.ds-demo-field span{font-size:11px;color:var(--muted);font-weight:900}

.design-system-panel{
  display:grid;gap:var(--ds-space-4);
}
.design-system-grid{
  display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:var(--ds-space-3);
}
.design-system-wide{
  grid-column:1/-1;
}
.design-system-section{
  border:1px solid var(--border);
  border-radius:var(--ds-radius-lg);
  padding:var(--ds-space-4);
  background:rgba(17,24,39,.96);
}
.design-system-section h3{margin:0 0 10px}

@media(max-width:760px){
  :root{--ds-control-h:var(--ds-control-h-mobile)}
  .design-system-grid,
  .ds-grid-2,
  .ds-grid-3{
    grid-template-columns:1fr;
  }
}


/* ============================================================
   FFE FINANCIAL KNOWLEDGE VAULT
   ============================================================ */
.vault-command{display:grid;gap:var(--ds-space-4)}
.vault-kpis{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:var(--ds-space-3)}
.vault-toolbar{display:grid;grid-template-columns:2fr 1fr 1fr;gap:var(--ds-space-3)}
.vault-grid{display:grid;gap:var(--ds-space-3)}
.vault-card{
  border:1px solid var(--border);
  border-radius:var(--ds-radius-lg);
  background:linear-gradient(135deg,rgba(56,189,248,.07),rgba(17,24,39,.98));
  padding:var(--ds-space-4);
  min-width:0;
}
.vault-card.expiring{border-left:4px solid var(--amber)}
.vault-card.expired{border-left:4px solid var(--rose)}
.vault-card.current{border-left:4px solid var(--green)}
.vault-card.unscheduled{border-left:4px solid var(--blue)}
.vault-heading{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.vault-title-group{display:flex;align-items:center;gap:10px;min-width:0}
.vault-icon{
  flex:0 0 auto;width:44px;height:44px;border-radius:14px;
  display:grid;place-items:center;font-size:22px;
  border:1px solid var(--border);background:rgba(30,38,64,.7)
}
.vault-title{font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vault-meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:12px}
.vault-meta-box{padding:9px;border-radius:12px;border:1px solid var(--border);background:rgba(8,16,29,.5);min-width:0}
.vault-meta-box .label{font-size:9px}
.vault-meta-box .value{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vault-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.vault-tag{padding:5px 8px;border-radius:999px;background:rgba(56,189,248,.09);border:1px solid rgba(56,189,248,.2);font-size:10px;color:var(--blue);font-weight:850}
.vault-file{
  margin-top:10px;padding:10px;border:1px dashed var(--border);
  border-radius:13px;background:rgba(8,16,29,.42)
}
.vault-file-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.vault-empty{padding:26px;text-align:center;border:1px dashed var(--border);border-radius:18px;color:var(--muted)}
.vault-status{font-size:10px;font-weight:950;padding:6px 9px;border-radius:999px}
.vault-status.current{color:var(--green);background:rgba(52,211,153,.1)}
.vault-status.expiring{color:var(--amber);background:rgba(251,191,36,.1)}
.vault-status.expired{color:var(--rose);background:rgba(251,113,133,.1)}
.vault-status.unscheduled{color:var(--blue);background:rgba(56,189,248,.1)}
.vault-category-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.vault-category-card{padding:12px;border:1px solid var(--border);border-radius:14px;background:rgba(30,38,64,.52)}
.vault-category-card .value{font-size:20px}
.vault-privacy{
  border-left:4px solid var(--blue);
  background:rgba(56,189,248,.06)
}
@media(min-width:760px){
  .vault-kpis{grid-template-columns:repeat(4,minmax(0,1fr))}
  .vault-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .vault-category-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
}
@media(max-width:760px){
  .vault-toolbar{grid-template-columns:1fr}
  .vault-meta{grid-template-columns:1fr 1fr}
}


/* ============================================================
   FFE FINANCIAL KNOWLEDGE CENTER
   ============================================================ */
.knowledge-center{display:grid;gap:16px}
.knowledge-hero{
  padding:18px;border:1px solid var(--border);border-radius:24px;
  background:radial-gradient(circle at 20% 20%,rgba(56,189,248,.15),transparent 30%),
             linear-gradient(135deg,rgba(17,24,39,.98),rgba(8,16,29,.98));
}
.knowledge-hero-grid{display:grid;gap:14px}
.knowledge-category-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}

  background:rgba(17,24,39,.96);text-align:left;
}
.knowledge-category:hover{border-color:var(--blue);transform:translateY(-1px)}
.knowledge-category .k-icon{font-size:24px}
.knowledge-category .k-count{font-size:24px;font-weight:950;margin-top:6px}
.knowledge-category .k-label{font-size:11px;color:var(--muted);font-weight:850}
.knowledge-alerts{display:grid;gap:8px}
.knowledge-alert{
  padding:11px;border:1px solid var(--border);border-radius:14px;background:rgba(8,16,29,.52)
}
.knowledge-alert.warning{border-left:4px solid var(--amber)}
.knowledge-alert.danger{border-left:4px solid var(--rose)}
.knowledge-alert.info{border-left:4px solid var(--blue)}
.knowledge-rel-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.knowledge-rel{

}
.knowledge-timeline{display:grid;gap:10px}
.knowledge-timeline-row{display:grid;grid-template-columns:18px 1fr;gap:10px}
.knowledge-timeline-mark{position:relative}
.knowledge-timeline-mark:before{

.knowledge-timeline-row:last-child .knowledge-timeline-mark:after{display:none}
.knowledge-search-panel{
  padding:14px;border:1px solid var(--border);border-radius:20px;background:rgba(17,24,39,.96)
}
.knowledge-quick-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.knowledge-quick{
  padding:14px;border:1px solid var(--border);border-radius:17px;background:rgba(17,24,39,.96)
}
.knowledge-quick .value{font-size:22px}
@media(min-width:760px){
  .knowledge-hero-grid{grid-template-columns:1.2fr .8fr}
  .knowledge-category-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
  .knowledge-rel-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
  .knowledge-quick-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
}

<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
(function(){
"use strict";
function $(id){return document.getElementById(id);}
function uid(){return "id_"+Date.now()+"_"+Math.random().toString(16).slice(2);}
function today(){return new Date().toISOString().slice(0,10);}
function money(v){return Number(v||0).toLocaleString(undefined,{style:"currency",currency:"USD",minimumFractionDigits:3,maximumFractionDigits:3});}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c];});}
function toast(m){var t=$("toast"); if(!t)return; t.textContent=m; t.className="toast show"; setTimeout(function(){t.className="toast";},2200);}
var state={accounts:[],transactions:[],bills:[],payroll:[],goals:[],budgets:[],documents:[],rules:[],settings:[],trips:[],institutions:[],events:[]};
var db=null, DB_NAME="FFE_DB_SAFE", DB_VERSION=4;
var STORES=["accounts","transactions","bills","payroll","goals","budgets","documents","rules","settings","trips","institutions","events"];
function openDB(){return new Promise(function(resolve,reject){var req=indexedDB.open(DB_NAME,DB_VERSION);req.onupgradeneeded=function(e){var d=e.target.result;STORES.forEach(function(s){if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:"id"});});};req.onsuccess=function(){db=req.result;resolve(db);};req.onerror=function(){reject(req.error||new Error("IndexedDB error"));};});}
function store(name,mode){return db.transaction(name,mode||"readonly").objectStore(name);}
function all(name){return new Promise(function(resolve,reject){var r=store(name).getAll();r.onsuccess=function(){resolve(r.result||[]);};r.onerror=function(){reject(r.error);};});}
function put(name,obj){return new Promise(function(resolve,reject){var r=store(name,"readwrite").put(obj);r.onsuccess=function(){resolve(obj);};r.onerror=function(){reject(r.error);};});}
function del(name,id){return new Promise(function(resolve,reject){var r=store(name,"readwrite").delete(id);r.onsuccess=function(){resolve();};r.onerror=function(){reject(r.error);};});}
async function load(){for(var i=0;i<STORES.length;i++){state[STORES[i]]=await all(STORES[i]);}if(!state.settings.some(function(x){return x.id==="seeded";})){await put("accounts",{id:uid(),name:"Checking Account",type:"Checking",balance:0,creditLimit:0,apr:0,minimum:0,due:"",notes:"Starter account"});await put("bills",{id:uid(),name:"Rent",amount:1313.5,due:"1",category:"Housing",frequency:"Monthly"});await put("settings",{id:"seeded",value:true});await put("settings",{id:"version",value:"4.0.1-stable"});for(var j=0;j<STORES.length;j++){state[STORES[j]]=await all(STORES[j]);}}}
async function saveItem(storeName,obj){obj.updatedAt=new Date().toISOString();await put(storeName,obj);await load();}
async function deleteItem(storeName,id){await del(storeName,id);await load();renderAll();toast("Deleted");}
window.deleteItem=deleteItem;

function cashAmount(){return state.accounts.filter(function(a){return ["Checking","Savings","Cash"].indexOf(a.type)>=0;}).reduce(function(s,a){return s+Number(a.balance||0);},0);}
function debtAmount(){return state.accounts.filter(function(a){return ["Credit Card","Loan"].indexOf(a.type)>=0;}).reduce(function(s,a){return s+Number(a.balance||0);},0);}
function assetsAmount(){return state.accounts.filter(function(a){return ["Checking","Savings","Cash","Investment"].indexOf(a.type)>=0;}).reduce(function(s,a){return s+Number(a.balance||0);},0);}
function monthSpendAmount(){var ym=new Date().toISOString().slice(0,7);return state.transactions.filter(function(t){return String(t.date||"").slice(0,7)===ym && t.type==="Expense";}).reduce(function(s,t){return s+Number(t.amount||0);},0);}
function utilization(a){var lim=Number(a.creditLimit||0);return lim>0?Number(a.balance||0)/lim*100:0;}
function suggestedCategory(name){var s=String(name||"").toLowerCase();for(var i=0;i<state.rules.length;i++){var r=state.rules[i]; if(s.indexOf(String(r.contains||"").toLowerCase())>=0)return r.category;}if(/shell|chevron|exxon|mobil|valero/.test(s))return"Fuel";if(/costco|kroger|heb|walmart|grocery/.test(s))return"Food";if(/amazon|target|best buy/.test(s))return"Shopping";if(/netflix|spotify|hulu|disney/.test(s))return"Entertainment";if(/rent|apartment|mortgage/.test(s))return"Housing";return"Other";}

var views=["home","money","travel","vault","import","analytics","advisor","more"];
var labels={home:"🏠 Home",money:"💳 Money",travel:"✈️ Travel",vault:"🗄️ Vault",import:"📥 Import",analytics:"📊 Analytics",advisor:"🤖 Advisor",more:"⋯ More"};
function appShell(){return '<div class="app-shell"><header class="topbar"><div class="brand"><div class="logo">FFE</div><div><h1>Financial Freedom Engine</h1><p>6.4 · Knowledge Center</p></div></div><div class="pill">IndexedDB</div></header><nav class="tabs">'+views.map(function(v){var parts=labels[v].split(" ");return '<button class="tab" data-view="'+v+'">'+parts[0]+'<span>'+parts.slice(1).join(" ")+'</span></button>';}).join("")+'</nav><main>'+views.map(function(v){return '<section id="'+v+'" class="view"></section>';}).join("")+'</main></div>';}
function show(v){views.forEach(function(x){var el=$(x); if(el)el.className="view"+(x===v?" active":"");});Array.prototype.forEach.call(document.querySelectorAll(".tab"),function(b){b.className="tab"+(b.getAttribute("data-view")===v?" active":"");});location.hash=v;}
function go(section){show(section);}
window.go=go;


function clampNcc(v,min,max){return Math.max(min,Math.min(max,v))}

function nowIso(){return new Date().toISOString();}
function normalizeSyncMeta(obj){
  if(!obj.syncMeta)obj.syncMeta={};
  var m=obj.syncMeta;
  if(m.lastSyncedAt===undefined)m.lastSyncedAt=null;
  if(m.sourceUpdatedAt===undefined)m.sourceUpdatedAt=null;
  if(m.lastImportedAt===undefined)m.lastImportedAt=null;
  if(m.lastManualEditAt===undefined)m.lastManualEditAt=obj.updatedAt||null;
  if(m.nextExpectedUpdateAt===undefined)m.nextExpectedUpdateAt=null;
  if(m.syncStatus===undefined)m.syncStatus="manual";
  if(m.syncSource===undefined)m.syncSource="manual";
  if(m.syncError===undefined)m.syncError="";
  if(!Array.isArray(m.syncHistory))m.syncHistory=[];
  return obj;
}
function syncAgeDays(value){
  if(!value)return null;
  var d=new Date(value);
  if(isNaN(d))return null;
  return (Date.now()-d.getTime())/86400000;
}
function freshnessStatus(obj){
  normalizeSyncMeta(obj);
  var m=obj.syncMeta;
  if(m.syncStatus==="error")return{key:"error",label:"Sync Error",cls:"freshness-error"};
  if(m.syncStatus==="disconnected")return{key:"disconnected",label:"Disconnected",cls:"freshness-disconnected"};
  if(m.syncStatus==="manual")return{key:"manual",label:"Manual Only",cls:"freshness-manual"};
  var age=syncAgeDays(m.lastSyncedAt||m.sourceUpdatedAt||m.lastImportedAt||m.lastManualEditAt);
  if(age===null||age>7)return{key:"stale",label:"Stale",cls:"freshness-stale"};
  if(age>2)return{key:"due",label:"Due Soon",cls:"freshness-due"};
  return{key:"current",label:"Current",cls:"freshness-current"};
}
function freshnessSummary(){
  var records=[].concat(state.accounts||[],state.bills||[],state.documents||[],state.goals||[],state.payroll||[]);
  var counts={current:0,due:0,stale:0,error:0,manual:0,disconnected:0};
  records.forEach(function(r){var s=freshnessStatus(r);counts[s.key]=(counts[s.key]||0)+1;});
  var total=records.length;
  var confidence=total?((counts.current*100+counts.due*70+counts.manual*55+counts.stale*20)/total):35;
  return{counts:counts,total:total,confidence:clampNcc(confidence,0,100),records:records};
}
function formatSyncDate(v){
  if(!v)return"—";
  var d=new Date(v);
  return isNaN(d)?String(v):d.toLocaleString();
}
function addSyncEvent(obj,type,message,source){
  normalizeSyncMeta(obj);
  obj.syncMeta.syncHistory.unshift({id:uid(),at:nowIso(),type:type,message:message,source:source||"manual"});
  obj.syncMeta.syncHistory=obj.syncMeta.syncHistory.slice(0,50);
}
function syncMetaFromForm(d,obj){
  normalizeSyncMeta(obj);
  function toIso(v){if(!v)return null;var x=new Date(v);return isNaN(x)?null:x.toISOString();}
  obj.syncMeta.lastSyncedAt=toIso(d.get("lastSyncedAt"));
  obj.syncMeta.sourceUpdatedAt=toIso(d.get("sourceUpdatedAt"));
  obj.syncMeta.nextExpectedUpdateAt=toIso(d.get("nextExpectedUpdateAt"));
  obj.syncMeta.syncStatus=d.get("syncStatus")||"manual";
  obj.syncMeta.syncSource=d.get("syncSource")||"manual";
  obj.syncMeta.syncError=d.get("syncError")||"";
  obj.syncMeta.lastManualEditAt=nowIso();
  addSyncEvent(obj,obj.syncMeta.syncStatus==="error"?"error":"update","Record saved or updated.",obj.syncMeta.syncSource);
  return obj;
}
function openFreshnessEvidence(){
  var panel=$("nccEvidencePanel"),sheet=$("nccEvidenceSheet"),f=freshnessSummary();
  if(!panel||!sheet)return;
  sheet.innerHTML='<div class="head"><div><h2 style="margin:0">Data Freshness & Sync History</h2><p class="muted">Tracks syncs, imports, source updates, manual edits, and errors.</p></div><button class="btn secondary" onclick="closeNccEvidence()">Close</button></div>'+
  '<div class="freshness-grid" style="margin-top:14px"><div class="card"><div class="label">Current</div><div class="value">'+f.counts.current+'</div></div><div class="card"><div class="label">Due Soon</div><div class="value">'+f.counts.due+'</div></div><div class="card"><div class="label">Stale</div><div class="value">'+f.counts.stale+'</div></div><div class="card"><div class="label">Errors</div><div class="value">'+f.counts.error+'</div></div></div>'+
  '<div class="section"><div><h2>Freshness Confidence</h2></div></div><div class="item"><div class="big">'+f.confidence.toFixed(3)+'</div><div class="bar"><div style="width:'+f.confidence+'%"></div></div></div>'+
  '<div class="section"><div><h2>Tracked Records</h2></div></div><div class="list">'+(f.records.length?f.records.slice(0,100).map(function(r){var s=freshnessStatus(r);return '<div class="item"><div class="head"><div><div class="title">'+esc(r.name||r.employer||r.docType||"Record")+'</div><div class="muted">Last sync: '+formatSyncDate(r.syncMeta.lastSyncedAt)+' · Source update: '+formatSyncDate(r.syncMeta.sourceUpdatedAt)+'</div></div><span class="'+s.cls+'">'+s.label+'</span></div></div>';}).join(""):'<div class="empty">No tracked records yet.</div>')+'</div>';
  panel.className="evidence-panel open";
}

function nccMetrics(){
  var cash=cashAmount();
  var debt=debtAmount();
  var assets=assetsAmount();
  var monthSpend=monthSpendAmount();
  var income=state.transactions.filter(function(t){return t.type==="Income";}).reduce(function(s,t){return s+Number(t.amount||0);},0);
  var cards=state.accounts.filter(function(a){return a.type==="Credit Card";});
  var cardBalance=cards.reduce(function(s,a){return s+Number(a.balance||0);},0);
  var cardLimit=cards.reduce(function(s,a){return s+Number(a.creditLimit||0);},0);
  var utilization=cardLimit>0?cardBalance/cardLimit*100:0;
  var totalBills=state.bills.reduce(function(s,b){return s+Number(b.amount||0);},0);
  var goalsTotal=state.goals.reduce(function(s,g){return s+Number(g.target||0);},0);
  var goalsCurrent=state.goals.reduce(function(s,g){return s+Number(g.current||0);},0);
  var goalProgress=goalsTotal>0?goalsCurrent/goalsTotal*100:0;
  var cashScore=clampNcc(cash>0?55+Math.min(45,cash/5000*45):15,0,100);
  var creditScore=clampNcc(cardLimit===0?55:100-utilization,0,100);
  var debtScore=clampNcc(assets>0?100-(debt/assets*100):debt>0?25:80,0,100);
  var billsScore=clampNcc(totalBills>0&&cash>0?100-(totalBills/cash*35):totalBills===0?65:25,0,100);
  var incomeScore=clampNcc(income>monthSpend&&income>0?85:income>0?60:35,0,100);
  var goalsScore=clampNcc(goalsTotal>0?goalProgress:50,0,100);
  var docsScore=clampNcc(state.documents.length*14,15,100);
  var completenessFields=0,totalFields=7;
  if(state.accounts.length)completenessFields++;
  if(state.transactions.length)completenessFields++;
  if(state.bills.length)completenessFields++;
  if(state.documents.length)completenessFields++;
  if(state.rules.length)completenessFields++;
  if(cards.every(function(a){return Number(a.creditLimit||0)>0})&&cards.length)completenessFields++;
  if(income>0)completenessFields++;
  var completeness=completenessFields/totalFields*100;
  var freshness=freshnessSummary();
  var health=(cashScore*.19+creditScore*.16+debtScore*.15+billsScore*.12+incomeScore*.13+goalsScore*.07+docsScore*.05+completeness*.06+freshness.confidence*.07);
  return {
    cash:cash,debt:debt,assets:assets,netWorth:assets-debt,monthSpend:monthSpend,income:income,
    utilization:utilization,totalBills:totalBills,goalProgress:goalProgress,completeness:completeness,
    health:clampNcc(health,0,100),freshness:freshness,
    scores:{cash:cashScore,credit:creditScore,debt:debtScore,bills:billsScore,income:incomeScore,goals:goalsScore,documents:docsScore}
  };
}
function nccState(score){
  if(score>=75)return{label:"Healthy",cls:"healthy"};
  if(score>=50)return{label:"Watch",cls:"watch"};
  return{label:"Action Needed",cls:"critical"};
}
function nccEvidence(key){
  var m=nccMetrics(),data={
    cash:{title:"Cash Health",value:money(m.cash),score:m.scores.cash,formula:"55 + min(45, cash ÷ $5,000 × 45), when cash is positive",sources:["Cash-type accounts","Current account balances"],path:["Accounts","Cash total","Cash score"]},
    income:{title:"Income Signal",value:money(m.income),score:m.scores.income,formula:"85 when recorded income exceeds monthly expenses; 60 when income exists; otherwise 35",sources:["Income transactions","Monthly expense transactions"],path:["Transactions","Income vs expenses","Income score"]},
    bills:{title:"Bill Coverage",value:money(m.totalBills),score:m.scores.bills,formula:"100 − (monthly bills ÷ cash × 35), constrained from 0 to 100",sources:["Bills","Cash-type accounts"],path:["Bills","Cash coverage","Bill score"]},
    debt:{title:"Debt Position",value:money(m.debt),score:m.scores.debt,formula:"100 − (debt ÷ assets × 100), constrained from 0 to 100",sources:["Credit-card accounts","Loan accounts","Asset accounts"],path:["Accounts","Debt-to-assets","Debt score"]},
    credit:{title:"Credit Utilization",value:m.utilization.toFixed(3)+"%",score:m.scores.credit,formula:"100 − total revolving utilization",sources:["Credit-card balances","Credit limits"],path:["Cards","Utilization","Credit score"]},
    goals:{title:"Goal Progress",value:m.goalProgress.toFixed(3)+"%",score:m.scores.goals,formula:"Current goal savings ÷ total goal targets × 100",sources:["Goals"],path:["Goals","Progress ratio","Goal score"]},
    documents:{title:"Document Coverage",value:String(state.documents.length),score:m.scores.documents,formula:"14 points per stored document, constrained from 15 to 100",sources:["Document Vault"],path:["Documents","Coverage count","Document score"]},
    core:{title:"Overall Financial Health",value:m.health.toFixed(3),score:m.health,formula:"Weighted score: Cash 20% + Credit 17% + Debt 16% + Bills 13% + Income 14% + Goals 8% + Documents 6% + Completeness 6%",sources:["Accounts","Transactions","Bills","Goals","Documents","Rules"],path:["Validated records","Deterministic subsystem scores","Weighted health score"]}
  };
  var e=data[key]||data.core;
  var trust=e.score>=75?"Verified":e.score>=50?"Supported":"Incomplete";
  return '<div class="head"><div><h2 style="margin:0">'+esc(e.title)+'</h2><p class="muted">Deterministic evidence panel</p></div><button class="btn secondary" onclick="closeNccEvidence()">Close</button></div>'+
  '<div class="evidence-grid" style="margin-top:14px"><div class="card"><div class="label">Current Value</div><div class="value">'+esc(e.value)+'</div></div><div class="card"><div class="label">Subsystem Score</div><div class="value">'+Number(e.score).toFixed(3)+'</div></div><div class="card"><div class="label">Trust Class</div><div class="value">'+trust+'</div></div><div class="card"><div class="label">AI Provider</div><div class="value">None</div><div class="muted">FFE calculation engine only</div></div></div>'+
  '<div class="section"><div><h2>Evidence Path</h2></div></div><div class="evidence-path">'+e.path.map(function(x,i){return '<span class="evidence-step">'+esc(x)+'</span>'+(i<e.path.length-1?'<span class="arrow">→</span>':'');}).join("")+'</div>'+
  '<div class="section"><div><h2>Formula</h2></div></div><div class="item"><div class="muted">'+esc(e.formula)+'</div></div>'+
  '<div class="section"><div><h2>Source Records</h2></div></div><div class="list">'+e.sources.map(function(x){return '<div class="item"><div class="title">'+esc(x)+'</div><div class="muted">Read from local IndexedDB records.</div></div>';}).join("")+'</div>';
}

function nccBrief(m){
  var items=[];
  if(m.utilization>=50)items.push({level:"critical",title:"Credit needs attention",text:"Overall utilization is "+m.utilization.toFixed(3)+"%."});
  else items.push({level:"healthy",title:"Credit utilization",text:"Overall utilization is "+m.utilization.toFixed(3)+"%."});
  if(m.totalBills>m.cash&&m.totalBills>0)items.push({level:"critical",title:"Bill coverage risk",text:"Recorded bills exceed available cash."});
  else items.push({level:"healthy",title:"Bill coverage",text:money(m.cash)+" cash against "+money(m.totalBills)+" recorded bills."});
  if(m.completeness<60)items.push({level:"watch",title:"Data completeness",text:"Add more records to improve confidence. Current completeness: "+m.completeness.toFixed(3)+"%."});
  if(!state.transactions.length)items.push({level:"watch",title:"Import transactions",text:"Transaction data is needed for stronger spending and cash-flow signals."});
  if(!items.length)items.push({level:"healthy",title:"Systems nominal",text:"No immediate deterministic alerts were found."});
  return items;
}

function vaultDateValue(value){
  if(!value)return null;
  var d=new Date(value+"T00:00:00");
  return isNaN(d)?null:d;
}

function vaultRenewalStatus(item){
  var date=vaultDateValue(item.expirationDate||item.renewalDate);
  if(!date)return{key:"unscheduled",label:"No Renewal Date",days:null};
  var todayDate=new Date();
  todayDate.setHours(0,0,0,0);
  var days=Math.ceil((date-todayDate)/86400000);
  if(days<0)return{key:"expired",label:"Expired",days:days};
  if(days<=60)return{key:"expiring",label:"Due in "+days+" day"+(days===1?"":"s"),days:days};
  return{key:"current",label:"Current",days:days};
}

function vaultFileSize(size){
  var n=Number(size||0);
  if(n<1024)return n+" B";
  if(n<1024*1024)return(n/1024).toFixed(3)+" KB";
  return(n/1024/1024).toFixed(3)+" MB";
}

function vaultReadFile(file){
  return new Promise(function(resolve,reject){
    if(!file){resolve(null);return;}
    if(file.size>15*1024*1024){
      reject(new Error("Attachments are limited to 15 MB in this local browser build."));
      return;
    }
    var reader=new FileReader();
    reader.onload=function(){
      resolve({
        fileName:file.name,
        fileType:file.type||"application/octet-stream",
        fileSize:file.size,
        fileData:String(reader.result||"")
      });
    };
    reader.onerror=function(){reject(reader.error||new Error("Unable to read attachment."));};
    reader.readAsDataURL(file);
  });
}

function vaultOpenFile(id,download){
  var item=state.documents.find(function(d){return d.id===id;});
  if(!item||!item.fileData){alert("No local attachment is stored for this record.");return;}
  try{
    var a=document.createElement("a");
    a.href=item.fileData;
    if(download)a.download=item.fileName||"FFE_document";
    else a.target="_blank";
    a.rel="noopener";
    document.body.appendChild(a);
    a.click();
    a.remove();
  }catch(error){
    alert("Unable to open attachment: "+(error.message||String(error)));
  }
}

function vaultSearchItems(query,category,status){
  query=(query||"").trim().toLowerCase();
  return state.documents.filter(function(d){
    var s=vaultRenewalStatus(d);
    var text=[
      d.title,d.category,d.provider,d.institution,d.accountEnding,d.referenceNumber,
      d.tags,d.summary,d.notes,d.fileName,d.privacyLevel
    ].join(" ").toLowerCase();
    return(!query||text.indexOf(query)>=0)&&
      (!category||category==="All"||d.category===category)&&
      (!status||status==="All"||s.key===status);
  });
}

function vaultSummary(){
  var result={total:state.documents.length,attachments:0,expiring:0,expired:0,categories:{}};
  state.documents.forEach(function(d){
    if(d.fileData)result.attachments++;
    var s=vaultRenewalStatus(d);
    if(s.key==="expiring")result.expiring++;
    if(s.key==="expired")result.expired++;
    var c=d.category||d.docType||"Other";
    result.categories[c]=(result.categories[c]||0)+1;
  });
  return result;
}

function vaultLinkedName(type,id){
  if(!id)return"—";
  var list=type==="institution"?state.institutions:type==="account"?state.accounts:state.trips;
  var item=(list||[]).find(function(x){return x.id===id;});
  return item?(item.name||item.location||"Linked record"):"Linked record unavailable";
}

function tripDays(start,end){
  if(!start||!end)return 1;
  var a=new Date(start),b=new Date(end);
  if(isNaN(a)||isNaN(b))return 1;
  return Math.max(1,Math.ceil((b-a)/86400000)+1);
}
function tripNights(start,end){return Math.max(0,tripDays(start,end)-1);}
function monthsUntil(date){
  if(!date)return 0;
  var d=new Date(date),n=new Date();
  if(isNaN(d))return 0;
  return Math.max(0,(d.getFullYear()-n.getFullYear())*12+(d.getMonth()-n.getMonth())+(d.getDate()>=n.getDate()?0:-1));
}
function calcTripScenario(t,mult){
  var days=tripDays(t.startDate,t.endDate),nights=tripNights(t.startDate,t.endDate);
  var travelers=Math.max(1,Number(t.travelers||1));
  var rooms=Math.max(1,Number(t.rooms||1));
  var hotel=Number(t.hotelNight||0)*mult*nights*rooms;
  var meals=(Number(t.breakfast||0)+Number(t.lunch||0)+Number(t.dinner||0)+Number(t.snacks||0))*mult*days*travelers;
  var transport=(Number(t.airfare||0)+Number(t.rentalCar||0)+Number(t.fuel||0)+Number(t.parking||0)+Number(t.tolls||0)+Number(t.localTransit||0))*mult;
  var activities=(Number(t.activities||0)+Number(t.tickets||0)+Number(t.shopping||0))*mult;
  var other=(Number(t.insurance||0)+Number(t.luggage||0)+Number(t.childcare||0)+Number(t.petCare||0)+Number(t.other||0))*mult;
  var subtotal=hotel+meals+transport+activities+other;
  var contingency=subtotal*(Number(t.contingencyPct||0)/100);
  var total=subtotal+contingency;
  return{days:days,nights:nights,hotel:hotel,meals:meals,transport:transport,activities:activities,other:other,contingency:contingency,total:total,perDay:total/days};
}
function tripStatus(t,total){
  var saved=Number(t.saved||0),remaining=Math.max(0,total-saved),months=monthsUntil(t.startDate);
  var required=months>0?remaining/months:remaining;
  var planned=Number(t.monthlySavings||0);
  var pct=total>0?saved/total*100:0;
  var status=remaining<=0?"Fully Funded":planned>=required?"On Track":months<=2?"At Risk":"Needs Adjustment";
  var cls=status==="Fully Funded"||status==="On Track"?"on-track":status==="At Risk"?"risk":"watch";
  return{saved:saved,remaining:remaining,months:months,requiredMonthly:required,plannedMonthly:planned,pct:clampNcc(pct,0,100),status:status,cls:cls};
}
function travelSummary(){
  var total=0,saved=0,active=0;
  (state.trips||[]).forEach(function(t){
    var c=calcTripScenario(t,1);
    total+=c.total;saved+=Number(t.saved||0);
    if(!t.endDate||new Date(t.endDate)>=new Date())active++;
  });
  return{total:total,saved:saved,gap:Math.max(0,total-saved),active:active};
}
function travelNodeScore(){
  var s=travelSummary();
  if(!s.active)return 65;
  if(s.total<=0)return 40;
  return clampNcc((s.saved/s.total)*100,0,100);
}

  return '<div class="scenario-card '+(cls||"")+'"><div class="head"><div><div class="title">'+name+'</div><div class="muted">'+c.days+' day(s) · '+c.nights+' night(s)</div></div><div class="money">'+money(c.total)+'</div></div>'+
  '<div class="cost-line"><span>Lodging</span><strong>'+money(c.hotel)+'</strong></div>'+
  '<div class="cost-line"><span>Meals</span><strong>'+money(c.meals)+'</strong></div>'+
  '<div class="cost-line"><span>Transportation</span><strong>'+money(c.transport)+'</strong></div>'+
  '<div class="cost-line"><span>Activities</span><strong>'+money(c.activities)+'</strong></div>'+
  '<div class="cost-line"><span>Other</span><strong>'+money(c.other)+'</strong></div>'+
  '<div class="cost-line"><span>Contingency</span><strong>'+money(c.contingency)+'</strong></div>'+
  '<div class="cost-line"><span>Average / Day</span><strong>'+money(c.perDay)+'</strong></div></div>';
}
function travelEvidence(t){

function renderTravelVisuals(){if(!state.trips.length)return '<div class="empty">Create a travel plan to see cost allocation.</div>';var c=calcTripScenario(state.trips[0],1),p=[["Lodging",c.hotel],["Meals",c.meals],["Transportation",c.transport],["Activities",c.activities],["Other",c.other],["Contingency",c.contingency]],mx=Math.max.apply(null,p.map(function(x){return x[1];}).concat([1]));return '<div class="travel-bars">'+p.map(function(x){return '<div class="travel-bar"><strong>'+x[0]+'</strong><div class="travel-track"><div class="travel-fill" style="width:'+(x[1]/mx*100)+'%"></div></div><span class="money">'+money(x[1])+'</span></div>';}).join("")+'</div>';}

function devLoadPreferences(){
  try{
    FFE_DEV.safeMode=localStorage.getItem("FFE_SAFE_MODE")==="1"||
      new URLSearchParams(location.search).get("safe")==="1";
    var saved=JSON.parse(localStorage.getItem("FFE_FEATURE_FLAGS")||"{}");
    Object.keys(FFE_DEV.flags).forEach(function(k){
      if(saved[k]!==undefined)FFE_DEV.flags[k]=!!saved[k];
    });
  }catch(e){
    FFE_DEV.warnings.push({at:new Date().toISOString(),message:"Developer preferences unavailable: "+(e.message||String(e))});
  }
}
devLoadPreferences();

function devRecordError(error,source){
  var item={
    at:new Date().toISOString(),
    source:source||"runtime",
    message:error&&error.message?error.message:String(error),
    stack:error&&error.stack?String(error.stack):""
  };
  FFE_DEV.errors.unshift(item);
  FFE_DEV.errors=FFE_DEV.errors.slice(0,100);
  try{localStorage.setItem("FFE_LAST_ERRORS",JSON.stringify(FFE_DEV.errors.slice(0,25)));}catch(ignore){}
  return item;
}

window.addEventListener("error",function(e){
  devRecordError(e.error||e.message,"window.error");
});
window.addEventListener("unhandledrejection",function(e){
  devRecordError(e.reason||"Unhandled promise rejection","unhandledrejection");
});

function devFlagEnabled(name){
  return !FFE_DEV.safeMode&&FFE_DEV.flags[name]!==false;
}
function devSetFlag(name,enabled){
  FFE_DEV.flags[name]=!!enabled;
  try{localStorage.setItem("FFE_FEATURE_FLAGS",JSON.stringify(FFE_DEV.flags));}catch(ignore){}
  renderAll();
}
function devSetSafeMode(enabled){
  FFE_DEV.safeMode=!!enabled;
  try{localStorage.setItem("FFE_SAFE_MODE",enabled?"1":"0");}catch(ignore){}
  renderAll();
}
function devClearErrors(){
  FFE_DEV.errors=[];
  try{localStorage.removeItem("FFE_LAST_ERRORS");}catch(ignore){}
  renderAll();
}

function devSelfCheck(){
  var tests=[
    ["Database API",typeof openDB==="function"&&typeof load==="function"&&typeof put==="function"],
    ["Core rendering",typeof renderHome==="function"&&typeof renderMoney==="function"&&typeof renderMore==="function"],
    ["Production tools",typeof renderProductionTools==="function"],
    ["Backup engine",typeof exportFFEBackup==="function"&&typeof restoreFFEBackupFromFile==="function"],
    ["Encrypted backup",typeof exportEncryptedFFEBackup==="function"&&typeof restoreEncryptedFFEBackup==="function"],
    ["Travel engine",typeof renderTravel==="function"&&typeof calcTripScenario==="function"],
    ["Visual analytics",typeof renderAnalytics==="function"],
    ["Advisor",typeof renderAdvisor==="function"],
    ["Data freshness",typeof freshnessSummary==="function"],
    ["Evidence panels",typeof openNccEvidence==="function"&&typeof closeNccEvidence==="function"]
  ];
  var results=tests.map(function(t){return{name:t[0],ok:!!t[1]};});
  var missing=results.filter(function(r){return!r.ok;});
  FFE_DEV.selfCheck={
    at:new Date().toISOString(),
    ok:missing.length===0,
    results:results,
    missing:missing.map(function(r){return r.name;})
  };
  return FFE_DEV.selfCheck;
}

function safeRenderModule(name,renderer,fallbackText){
  var started=(performance&&performance.now)?performance.now():Date.now();
  try{
    if(typeof renderer!=="function")throw new Error("Renderer is missing.");
    var output=renderer();
    FFE_DEV.moduleStatus[name]={
      ok:true,
      ms:Math.max(0,((performance&&performance.now)?performance.now():Date.now())-started),
      error:""
    };
    return output;
  }catch(error){
    devRecordError(error,"module:"+name);
    FFE_DEV.moduleStatus[name]={
      ok:false,
      ms:Math.max(0,((performance&&performance.now)?performance.now():Date.now())-started),
      error:error.message||String(error)
    };
    return '<div class="item recovery-card"><div class="title">'+esc(name)+' temporarily unavailable</div>'+
      '<div class="muted">'+esc(fallbackText||"This module was disabled so the rest of FFE can continue running.")+'</div>'+
      '<details style="margin-top:8px"><summary>Technical detail</summary><pre style="white-space:pre-wrap;color:var(--rose)">'+esc(error.message||String(error))+'</pre></details></div>';
  }
}

function devRecoveryView(name){
  return '<div class="item safe-mode-banner"><div class="title">Safe Mode</div>'+
    '<div class="muted">'+esc(name)+' is disabled while Safe Mode is active. Re-enable it from More → Developer Dashboard.</div></div>';
}

function renderDeveloperDashboard(){
  var check=devSelfCheck();
  var startup=FFE_DEV.renderedAt===null?0:Math.max(0,FFE_DEV.renderedAt-FFE_DEV.startedAt);
  var priorErrors=[];
  try{priorErrors=JSON.parse(localStorage.getItem("FFE_LAST_ERRORS")||"[]");}catch(ignore){}
  var logs=FFE_DEV.errors.length?FFE_DEV.errors:priorErrors;
  return '<details class="card" style="margin-top:14px"><summary>Developer Dashboard</summary>'+
    '<div class="dev-dashboard" style="margin-top:14px">'+
      '<div class="dev-grid">'+
        '<div class="card"><div class="label">Startup Check</div><div class="value '+(check.ok?"startup-pass":"startup-fail")+'">'+(check.ok?"PASS":"FAIL")+'</div></div>'+
        '<div class="card"><div class="label">Startup Time</div><div class="value">'+startup.toFixed(3)+' ms</div></div>'+
        '<div class="card"><div class="label">Records</div><div class="value">'+devRecordCount()+'</div></div>'+
        '<div class="card"><div class="label">Errors</div><div class="value">'+FFE_DEV.errors.length+'</div></div>'+
      '</div>'+
      (FFE_DEV.safeMode?'<div class="item safe-mode-banner"><div class="title">Safe Mode is active</div><div class="muted">Travel, Analytics, Advisor, and selected visual modules are disabled.</div></div>':"")+
      '<div class="section"><div><h2>Module Health</h2></div></div><div class="dev-grid">'+devModuleCards()+'</div>'+
      '<div class="section"><div><h2>Feature Flags</h2></div></div>'+
      '<div class="item">'+Object.keys(FFE_DEV.flags).map(function(k){return '<label class="flag-row"><span>'+esc(k)+'</span><input class="flag-switch" type="checkbox" '+(FFE_DEV.flags[k]?"checked":"")+' onchange="devSetFlag(\''+k+'\',this.checked)"></label>';}).join("")+'</div>'+
      '<div class="section"><div><h2>Recovery</h2></div></div>'+
      '<div class="actions" style="justify-content:flex-start">'+
        '<button class="btn amber" onclick="devSetSafeMode(!FFE_DEV.safeMode)">'+(FFE_DEV.safeMode?"Exit Safe Mode":"Enter Safe Mode")+'</button>'+
        '<button class="btn secondary" onclick="exportDeveloperReport()">Export Developer Report</button>'+
        '<button class="btn secondary" onclick="devClearErrors()">Clear Error Log</button>'+
      '</div>'+
      '<div class="section"><div><h2>Error Log</h2></div></div>'+
      '<div class="dev-log">'+(logs.length?logs.slice(0,25).map(function(e){return '<div class="dev-log-row">'+esc((e.at||"")+" ["+(e.source||"runtime")+"]\n"+(e.message||e))+'</div>';}).join(""):'<div class="empty">No recorded runtime errors.</div>')+'</div>'+
    '</div></details>';
}

function renderProductionTools(){
  var validation=typeof validateFFEData==="function"
    ? validateFFEData()
    : {issues:[],warnings:[],ok:true};

  var status=!validation.ok ? "Fail" : (validation.warnings.length ? "Watch" : "Pass");
  var statusClass=!validation.ok ? "health-fail" : (validation.warnings.length ? "health-watch" : "health-pass");

  return '<div class="section"><div><h2>Security & System Health</h2><p>Backup, privacy, validation, and diagnostics.</p></div></div>'+
  '<div class="list">'+
    '<div class="item privacy-box"><div class="title">Privacy Model</div><div class="muted">GitHub hosts only the application code. Financial records remain in this browser unless you export or upload them yourself.</div></div>'+
    '<div class="item backup-box"><div class="title">Encrypted Backup</div><div class="muted">Protect your backup with a password you choose.</div><div class="actions" style="justify-content:flex-start"><button class="btn green" onclick="exportEncryptedFFEBackup()">Export Encrypted Backup</button></div></div>'+
    '<div class="item restore-box"><div class="title">Restore Encrypted Backup</div><label>Encrypted FFE file<input type="file" id="restoreEncryptedFile" accept=".json,.ffe.json,application/json"></label></div>'+
    '<div class="item"><div class="title">Data Health</div><div class="health-grid">'+
      '<div class="card"><div class="label">Status</div><div class="value '+statusClass+'">'+status+'</div></div>'+
      '<div class="card"><div class="label">Issues</div><div class="value">'+validation.issues.length+'</div></div>'+
      '<div class="card"><div class="label">Warnings</div><div class="value">'+validation.warnings.length+'</div></div>'+
      '<div class="card"><div class="label">Records</div><div class="value">'+
        ((state.accounts||[]).length+
         (state.transactions||[]).length+
         (state.bills||[]).length+
         (state.documents||[]).length+
         (state.trips||[]).length+
         (state.institutions||[]).length+
         (state.events||[]).length)+
      '</div></div>'+
    '</div></div>'+
    '<div class="item"><div class="title">Diagnostics</div><div class="muted">Exports system metadata without transaction details.</div><div class="actions" style="justify-content:flex-start"><button class="btn secondary" onclick="exportFFEDiagnostics()">Export Diagnostics</button></div></div>'+
  '</div>';
}

function renderMore(){return renderProductionTools() + '<div class="section"><div><h2>More</h2><p>Search, rules, settings, and diagnostics.</p></div></div><div class="card"><label>Search<input id="searchBox" placeholder="Amazon, Best Buy, rent..."></label></div><div class="list" id="searchResults"><div class="empty">Type to search.</div></div><div class="section"><div><h2>Settings</h2></div></div><div class="card"><h2>FFE 5.0</h2><p class="muted">FFE 6.4 introduces a dedicated Financial Knowledge Center tab with category dashboards, renewal alerts, relationship summaries, direct search, recent activity, and access to the full local Knowledge Vault.</p></div>'+renderDeveloperDashboard();}

function bindForms(){var f;f=$("accountForm"); if(f)f.onsubmit=async function(e){e.preventDefault();var d=new FormData(f);var accountObj=syncMetaFromForm(d,{id:uid(),name:d.get("name"),type:d.get("type"),balance:Number(d.get("balance")||0),creditLimit:Number(d.get("creditLimit")||0),apr:Number(d.get("apr")||0),minimum:Number(d.get("minimum")||0),due:d.get("due")});await saveItem("accounts",accountObj);renderAll();toast("Saved");};f=$("txnForm"); if(f)f.onsubmit=async function(e){e.preventDefault();var d=new FormData(f);await saveItem("transactions",{id:uid(),date:d.get("date"),type:d.get("type"),name:d.get("name"),amount:Number(d.get("amount")||0),category:d.get("category")});renderAll();toast("Saved");};f=$("billForm"); if(f)f.onsubmit=async function(e){e.preventDefault();var d=new FormData(f);var billObj=syncMetaFromForm(d,{id:uid(),name:d.get("name"),amount:Number(d.get("amount")||0),due:d.get("due"),category:d.get("category"),frequency:d.get("frequency")});await saveItem("bills",billObj);renderAll();toast("Saved");};f=$("vaultForm");if(f)f.onsubmit=async function(e){
  e.preventDefault();
  var d=new FormData(f);
  var file=f.querySelector('input[name="attachment"]').files[0];
  try{
    var attachment=await vaultReadFile(file);
    var record={
      id:uid(),
      title:d.get("title"),
      category:d.get("category"),
      docType:d.get("category"),
      provider:d.get("provider"),
      institution:d.get("provider"),
      referenceNumber:d.get("referenceNumber"),
      documentDate:d.get("documentDate"),
      renewalDate:d.get("renewalDate"),
      expirationDate:d.get("expirationDate"),
      amount:Number(d.get("amount")||0),
      institutionId:d.get("institutionId"),
      accountId:d.get("accountId"),
      tripId:d.get("tripId"),
      privacyLevel:d.get("privacyLevel"),
      confidence:d.get("confidence"),
      source:d.get("source"),
      tags:d.get("tags"),
      summary:d.get("summary"),
      notes:d.get("notes"),
      importedAt:new Date().toISOString(),
      updatedAt:new Date().toISOString()
    };
    if(attachment)Object.assign(record,attachment);
    normalizeSyncMeta(record);
    record.syncMeta.lastManualEditAt=new Date().toISOString();
    record.syncMeta.syncStatus="manual";
    record.syncMeta.syncSource="knowledge-vault";
    addSyncEvent(record,"create","Knowledge record created.","knowledge-vault");
    await put("documents",record);
    await load();
    renderAll();
    showMoneyPanel("vault");
    toast("Knowledge record saved");
  }catch(error){
    alert("Unable to save knowledge record: "+(error.message||String(error)));
  }
};
f=$("ruleForm"); if(f)f.onsubmit=async function(e){e.preventDefault();var d=new FormData(f);await saveItem("rules",{id:uid(),contains:d.get("contains"),category:d.get("category")});renderAll();toast("Rule saved");};
  f=$("tripForm"); if(f)f.onsubmit=async function(e){
    e.preventDefault();var d=new FormData(f);
    var trip={id:uid(),name:d.get("name"),type:d.get("type"),location:d.get("location"),travelers:Number(d.get("travelers")||1),startDate:d.get("startDate"),endDate:d.get("endDate"),rooms:Number(d.get("rooms")||1),hotelLevel:d.get("hotelLevel"),hotelNight:Number(d.get("hotelNight")||0),breakfast:Number(d.get("breakfast")||0),lunch:Number(d.get("lunch")||0),dinner:Number(d.get("dinner")||0),snacks:Number(d.get("snacks")||0),airfare:Number(d.get("airfare")||0),rentalCar:Number(d.get("rentalCar")||0),fuel:Number(d.get("fuel")||0),parking:Number(d.get("parking")||0),tolls:Number(d.get("tolls")||0),localTransit:Number(d.get("localTransit")||0),activities:Number(d.get("activities")||0),tickets:Number(d.get("tickets")||0),shopping:Number(d.get("shopping")||0),insurance:Number(d.get("insurance")||0),luggage:Number(d.get("luggage")||0),childcare:Number(d.get("childcare")||0),petCare:Number(d.get("petCare")||0),other:Number(d.get("other")||0),contingencyPct:Number(d.get("contingencyPct")||0),saved:Number(d.get("saved")||0),monthlySavings:Number(d.get("monthlySavings")||0),costSource:d.get("costSource"),researchedDate:d.get("researchedDate"),confidence:d.get("confidence"),notes:d.get("notes"),updatedAt:new Date().toISOString()};
    await saveItem("trips",trip);renderAll();toast("Travel plan saved");
  };

  
  f=$("institutionForm");if(f)f.onsubmit=async function(e){e.preventDefault();var d=new FormData(f);await saveItem("institutions",{id:uid(),name:d.get("name"),type:d.get("type"),brandColor:d.get("brandColor"),website:d.get("website"),notes:d.get("notes"),updatedAt:new Date().toISOString()});renderAll();toast("Institution saved");};
  f=$("eventForm");if(f)f.onsubmit=async function(e){e.preventDefault();var d=new FormData(f);await saveItem("events",{id:uid(),at:d.get("at")?new Date(d.get("at")).toISOString():new Date().toISOString(),type:d.get("type"),title:d.get("title"),detail:d.get("detail"),amount:Number(d.get("amount")||0)});renderAll();toast("Event added");};

  
  
  var ks=$("knowledgeSearch");if(ks)ks.oninput=knowledgeApplyFilters;
  var kc=$("knowledgeCategory");if(kc)kc.onchange=knowledgeApplyFilters;
  var kst=$("knowledgeStatus");if(kst)kst.onchange=knowledgeApplyFilters;

  var vs=$("vaultSearch");if(vs)vs.oninput=vaultApplyFilters;
  var vcf=$("vaultCategoryFilter");if(vcf)vcf.onchange=vaultApplyFilters;
  var vsf=$("vaultStatusFilter");if(vsf)vsf.onchange=vaultApplyFilters;

  var cf=$("csvFile"); if(cf)cf.onchange=async function(e){var file=e.target.files[0]; if(!file)return; rawRows=parseCSV(await file.text()); headers=rawRows.length?Object.keys(rawRows[0]):[];["mapDate","mapName","mapAmount","mapCategory"].forEach(fillSelect);autoMap();};var am=$("autoMap"); if(am)am.onclick=autoMap;var ai=$("approveImport"); if(ai)ai.onclick=approveImport;var rb=$("restoreBackupFile"); if(rb)rb.onchange=function(e){var file=e.target.files[0];restoreFFEBackupFromFile(file);};var erb=$("restoreEncryptedFile");if(erb)erb.onchange=function(e){restoreEncryptedFFEBackup(e.target.files[0]);};
  var sb=$("searchBox"); if(sb)sb.oninput=function(){var q=sb.value.toLowerCase(); var rows=[]; function add(type,text){if(String(text).toLowerCase().indexOf(q)>=0)rows.push({type:type,text:text});} if(q){state.accounts.forEach(function(a){add("Account",a.name+" "+a.type);});state.transactions.forEach(function(t){add("Transaction",t.name+" "+t.category);});state.documents.forEach(function(d){add("Knowledge Vault",(d.title||"")+" "+(d.category||d.docType||"")+" "+(d.provider||d.institution||"")+" "+(d.referenceNumber||d.accountEnding||"")+" "+(d.tags||"")+" "+(d.summary||""));});state.bills.forEach(function(b){add("Bill",b.name+" "+b.category);});} $("searchResults").innerHTML=rows.length?rows.map(function(r){return '<div class="item"><div class="title">'+esc(r.type)+'</div><div class="muted">'+esc(r.text)+'</div></div>';}).join(""):'<div class="empty">No matches.</div>';};}
function renderAll(){
  var check=devSelfCheck();
  $("app").innerHTML=appShell()+
    '<div id="nccEvidencePanel" class="evidence-panel" onclick="if(event.target===this)closeNccEvidence()"><div id="nccEvidenceSheet" class="evidence-sheet"></div></div>';

  $("home").innerHTML=safeRenderModule("Home",renderHome,"The command center could not render.");
  $("money").innerHTML=safeRenderModule("Money",renderMoney,"Financial workspaces could not render.");
  $("vault").innerHTML=safeRenderModule("Vault",renderKnowledgeCenter,"The Financial Knowledge Center could not render.");

  $("travel").innerHTML=devFlagEnabled("travel")
    ? safeRenderModule("Travel",renderTravel,"Travel planning could not render.")
    : devRecoveryView("Travel");

  $("import").innerHTML=safeRenderModule("Import",renderImport,"Import tools could not render.");

  $("analytics").innerHTML=devFlagEnabled("analytics")
    ? safeRenderModule("Analytics",renderAnalytics,"Analytics could not render.")
    : devRecoveryView("Analytics");

  $("advisor").innerHTML=devFlagEnabled("advisor")
    ? safeRenderModule("Advisor",renderAdvisor,"Advisor tools could not render.")
    : devRecoveryView("Advisor");

  $("more").innerHTML=safeRenderModule("More",renderMore,"Settings and diagnostics could not render.");

  Array.prototype.forEach.call(document.querySelectorAll(".tab"),function(b){
    b.onclick=function(){show(b.getAttribute("data-view"));};
  });

  try{bindForms();}catch(error){devRecordError(error,"bindForms");}

  FFE_DEV.renderedAt=(performance&&performance.now)?performance.now():Date.now();
  show(location.hash.replace("#","")||"home")+renderDesignSystemReference();
}

(async function(){
  try{
    var preflight=devSelfCheck();
    if(!preflight.ok){
      FFE_DEV.warnings.push({
        at:new Date().toISOString(),
        message:"Preflight missing: "+preflight.missing.join(", ")
      });
    }
    await openDB();
    await load();
    renderAll();
  }catch(error){
    devRecordError(error,"startup");
    try{
      $("app").innerHTML='<div class="app-shell">'+
        '<div class="card recovery-card"><h2>FFE Recovery Mode</h2>'+
        '<p class="muted">The application encountered a startup problem, but recovery tools are available.</p>'+
        '<pre style="white-space:pre-wrap;color:var(--rose)">'+esc(error.message||String(error))+'</pre>'+
        '<div class="actions" style="justify-content:flex-start">'+
          '<button class="btn amber" onclick="localStorage.setItem(\'FFE_SAFE_MODE\',\'1\');location.reload()">Restart in Safe Mode</button>'+
          '<button class="btn secondary" onclick="location.reload()">Try Again</button>'+
        '</div></div></div>';
    }catch(fatal){
      document.body.innerHTML='<pre style="padding:20px;color:#fb7185;background:#08101d;white-space:pre-wrap">FFE fatal startup error:\n'+String(error)+'\n\nRecovery renderer error:\n'+String(fatal)+'</pre>';
    }
  }
})();
})();
