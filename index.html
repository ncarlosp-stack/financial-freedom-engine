<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b0f19">
<title>Financial Freedom Engine 3.2</title>
<style>
:root{--bg:#0b0f19;--card:#131a2c;--card2:#1e2640;--border:#2e3a5f;--text:#f8fafc;--muted:#94a3b8;--blue:#38bdf8;--green:#34d399;--amber:#fbbf24;--rose:#fb7185;--safe:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 0 0,rgba(56,189,248,.16),transparent 36%),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding-bottom:calc(84px + var(--safe))}
button,input,select,textarea{font:inherit}button{cursor:pointer}.app-shell{max-width:1240px;margin:auto;padding:18px 14px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.brand{display:flex;gap:12px;align-items:center}.logo{width:46px;height:46px;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--green));color:#06111c;font-weight:950;display:grid;place-items:center}.pill{border:1px solid var(--border);border-radius:999px;padding:8px 10px;color:var(--muted);font-size:12px;font-weight:800}
h1{font-size:18px;margin:0}.brand p{margin:3px 0 0;color:var(--muted);font-size:12px}.tabs{position:fixed;left:0;right:0;bottom:0;z-index:20;display:grid;grid-template-columns:repeat(5,1fr);gap:5px;padding:8px 8px calc(8px + var(--safe));background:rgba(11,15,25,.94);backdrop-filter:blur(14px);border-top:1px solid var(--border)}.tab{display:grid;place-items:center;gap:2px;background:transparent;color:var(--muted);border:1px solid transparent;border-radius:14px;padding:7px 2px;font-weight:900}.tab span{font-size:10px}.tab.active{background:var(--card2);border-color:var(--border);color:var(--text)}
.view{display:none}.view.active{display:block}.card,.item,.hero{background:rgba(19,26,44,.96);border:1px solid var(--border);border-radius:18px;box-shadow:0 14px 36px #0005}.card{padding:14px}.hero{padding:16px;margin-bottom:12px;background:linear-gradient(135deg,rgba(56,189,248,.16),rgba(52,211,153,.07))}.hero h2{font-size:23px;margin:0 0 4px}.hero p,.muted{margin:0;color:var(--muted);font-size:12px}.grid{display:grid;gap:12px}.list{display:grid;gap:10px}.item{padding:12px;display:grid;gap:8px}.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.label{font-size:11px;color:var(--muted);font-weight:950;text-transform:uppercase;letter-spacing:.05em}.value{font-size:22px;font-weight:950;margin-top:5px}.big{font-size:36px;font-weight:950;letter-spacing:-.04em}.section{display:flex;justify-content:space-between;align-items:end;margin:18px 0 8px;gap:10px}.section h2{font-size:18px;margin:0}.head{display:flex;justify-content:space-between;align-items:start;gap:10px}.title{font-weight:950}.money{font-weight:950;white-space:nowrap;font-variant-numeric:tabular-nums}.badge{border-radius:999px;padding:4px 8px;font-size:11px;font-weight:950;display:inline-flex}.blue{background:#38bdf824;color:var(--blue)}.green{background:#34d39924;color:var(--green)}.amber{background:#fbbf2424;color:var(--amber)}.rose{background:#fb718524;color:var(--rose)}.empty{border:1px dashed var(--border);border-radius:14px;color:var(--muted);text-align:center;padding:18px}.progress,.bar{height:10px;background:#0a1020;border:1px solid var(--border);border-radius:999px;overflow:hidden}.progress>div,.bar>div{height:100%;background:linear-gradient(90deg,var(--blue),var(--green))}
form{display:grid;gap:10px}label{display:grid;gap:5px;color:var(--muted);font-size:12px;font-weight:950}input,select,textarea{width:100%;border:1px solid var(--border);border-radius:12px;background:#0a1020;color:var(--text);padding:11px 12px}textarea{min-height:80px}.formgrid{display:grid;gap:10px}.actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}.btn{border:1px solid transparent;border-radius:12px;padding:10px 12px;font-weight:950;background:var(--blue);color:#06111c}.btn.secondary{background:transparent;color:var(--text);border-color:var(--border)}.btn.green{background:var(--green)}.btn.rose{background:var(--rose);color:white}.hidden{display:none!important}.toast{position:fixed;left:12px;right:12px;bottom:calc(92px + var(--safe));background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:12px;box-shadow:0 16px 40px #0008;display:none;z-index:30}.toast.show{display:block}
@media(min-width:760px){body{padding-bottom:0}.app-shell{padding:24px}.tabs{position:sticky;top:0;bottom:auto;border:1px solid var(--border);border-radius:18px;margin-bottom:16px;grid-template-columns:repeat(12,auto);justify-content:start}.tab{grid-auto-flow:column;padding:10px 12px}.tab span{font-size:12px}.kpis{grid-template-columns:repeat(4,1fr)}.cols{grid-template-columns:1.05fr .95fr;align-items:start}h1{font-size:22px}.formgrid{grid-template-columns:repeat(2,1fr)}}

.timeline{display:grid;gap:10px}
.timeline-item{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start}
.timeline-dot{width:12px;height:12px;border-radius:999px;background:var(--blue);box-shadow:0 0 0 4px rgba(56,189,248,.14);margin-top:5px}
.search-result{border-left:4px solid var(--blue)}
.rule-grid{display:grid;gap:10px}
@media(min-width:760px){.rule-grid{grid-template-columns:repeat(2,1fr)}}

</style>
</head>
<body>
<div id="app"></div><div id="toast" class="toast"></div>
<script>
const $=s=>document.querySelector(s);
const money=v=>Number(v||0).toLocaleString(undefined,{style:"currency",currency:"USD",minimumFractionDigits:3,maximumFractionDigits:3});
const uid=()=>crypto.randomUUID?crypto.randomUUID():"id_"+Date.now()+"_"+Math.random().toString(16).slice(2);
const today=()=>new Date().toISOString().slice(0,10);
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2400)}

const DB_NAME="FFE_DB", DB_VERSION=7;
const STORES=["accounts","transactions","bills","payroll","goals","knowledge","inbox","budgets","settings","documents","promos","rules"];
const state={accounts:[],transactions:[],bills:[],payroll:[],goals:[],knowledge:[],inbox:[],budgets:[],settings:[],documents:[],promos:[],rules:[]};
let db;
function openDB(){return new Promise((res,rej)=>{let r=indexedDB.open(DB_NAME,DB_VERSION);r.onupgradeneeded=e=>{let d=e.target.result;STORES.forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:"id"})})};r.onsuccess=()=>{db=r.result;res(db)};r.onerror=()=>rej(r.error)})}
const store=(s,m="readonly")=>db.transaction(s,m).objectStore(s);
const all=s=>new Promise((res,rej)=>{let r=store(s).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error)});
const put=(s,o)=>new Promise((res,rej)=>{let r=store(s,"readwrite").put(o);r.onsuccess=()=>res(o);r.onerror=()=>rej(r.error)});
const del=(s,id)=>new Promise((res,rej)=>{let r=store(s,"readwrite").delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error)});
async function load(){for(let s of Object.keys(state))state[s]=await all(s);if(!state.settings.find(x=>x.id==="seeded")){await put("accounts",{id:uid(),name:"Checking Account",type:"Checking",balance:0,notes:"Starter account"});await put("bills",{id:uid(),name:"Rent",amount:1313.5,due:"1",category:"Housing",frequency:"Monthly"});await put("settings",{id:"seeded",value:true});await put("settings",{id:"version",value:"3.2-production"});for(let s of Object.keys(state))state[s]=await all(s)}}
async function saveItem(s,o){o.updatedAt=new Date().toISOString();await put(s,o);await load()}
async function deleteItem(s,id){await del(s,id);await load()}
function cashAmount(){return state.accounts.filter(a=>["Checking","Savings","Cash"].includes(a.type)).reduce((s,a)=>s+Number(a.balance||0),0)}
function debtAmount(){return state.accounts.filter(a=>["Credit Card","Loan"].includes(a.type)).reduce((s,a)=>s+Number(a.balance||0),0)}
function assetsAmount(){return state.accounts.filter(a=>["Checking","Savings","Cash","Investment"].includes(a.type)).reduce((s,a)=>s+Number(a.balance||0),0)}
function monthSpendAmount(){let ym=new Date().toISOString().slice(0,7);return state.transactions.filter(t=>String(t.date||"").slice(0,7)===ym&&t.type==="Expense").reduce((s,t)=>s+Number(t.amount||0),0)}
function projectDays(days){let start=cashAmount(),income=0,bills=0,now=new Date(),end=new Date();end.setDate(now.getDate()+days);state.payroll.forEach(p=>{let d=new Date(p.date+"T00:00:00");if(d>=now&&d<=end)income+=Number(p.net||0)});state.bills.forEach(b=>{if(b.frequency==="Monthly"){let day=Math.max(1,Math.min(31,Number(b.due||1)));for(let m=0;m<4;m++){let d=new Date(now.getFullYear(),now.getMonth()+m,day);if(d>=now&&d<=end)bills+=Number(b.amount||0)}}});return{start,income,bills,end:start+income-bills}}
function renderDashboard(){let ca=cashAmount(),de=debtAmount(),as=assetsAmount(),sp=monthSpendAmount(),p30=projectDays(30),score=Math.min(100,30+(ca>0?20:0)+(de===0?25:10)+(state.transactions.length?10:0)+(state.documents.length?10:0));return `<div class="hero"><h2>Good day, Carlos</h2><p>Financial Command Center · FFE 3.1 Modular Production</p></div><div class="grid cols"><div class="card"><div class="label">Cash Available</div><div class="big">${money(ca)}</div><div class="kpis" style="margin-top:12px"><div class="card"><div class="label">30 Day</div><div class="value">${money(p30.end)}</div></div><div class="card"><div class="label">Net Worth</div><div class="value">${money(as-de)}</div></div></div></div><div class="card"><div class="label">Financial Freedom Score</div><div class="big">${score.toFixed(3)}</div><div class="progress"><div style="width:${score}%"></div></div></div></div><div class="section"><div><h2>Daily Brief</h2><p>Generated from saved local records.</p></div></div><div class="list"><div class="item"><div class="title">PDF Vault</div><div class="muted">${state.documents.length} document(s) stored.</div></div><div class="item"><div class="title">Spending</div><div class="muted">${money(sp)} spent this month.</div></div></div>`}
function bindDeletes(el){el.querySelectorAll("[data-del]").forEach(b=>b.onclick=async()=>{let [s,id]=b.dataset.del.split(":");await deleteItem(s,id);renderAll();toast("Deleted")})}
function renderAccounts(){return `<div class="section"><div><h2>Accounts</h2><p>Checking, savings, cards, loans, and investments.</p></div></div><div class="grid cols"><div class="card"><form id="accountForm"><div class="formgrid"><label>Name<input name="name" required></label><label>Type<select name="type"><option>Checking</option><option>Savings</option><option>Cash</option><option>Credit Card</option><option>Loan</option><option>Investment</option></select></label><label>Balance<input name="balance" type="number" step="0.001"></label><label>Credit Limit<input name="creditLimit" type="number" step="0.001"></label></div><button class="btn green">Save Account</button></form></div><div class="list">${state.accounts.map(a=>`<div class="item"><div class="head"><div><div class="title">${esc(a.name)}</div><div class="muted">${esc(a.type)}</div></div><div class="money">${money(a.balance)}</div></div><button class="btn rose" data-del="accounts:${a.id}">Delete</button></div>`).join("")||'<div class="empty">No accounts.</div>'}</div></div>`}
function bindAccounts(){let f=document.getElementById("accountForm");if(f)f.onsubmit=async e=>{e.preventDefault();let d=new FormData(f);await saveItem("accounts",{id:uid(),name:d.get("name"),type:d.get("type"),balance:Number(d.get("balance")||0),creditLimit:Number(d.get("creditLimit")||0)});renderAll();toast("Saved")};bindDeletes(document.getElementById("accounts"))}
function renderTransactions(){return `<div class="section"><div><h2>Transactions</h2><p>Income, expenses, and transfers.</p></div></div><div class="grid cols"><div class="card"><form id="txnForm"><div class="formgrid"><label>Date<input name="date" type="date" value="${today()}"></label><label>Type<select name="type"><option>Expense</option><option>Income</option></select></label><label>Name<input name="name" required></label><label>Amount<input name="amount" type="number" step="0.001"></label><label>Category<input name="category" value="Other"></label></div><button class="btn green">Save Transaction</button></form></div><div class="list">${state.transactions.slice().reverse().map(t=>`<div class="item"><div class="head"><div><div class="title">${esc(t.name)}</div><div class="muted">${esc(t.date)} · ${esc(t.category)}</div></div><div class="money">${money(t.amount)}</div></div><button class="btn rose" data-del="transactions:${t.id}">Delete</button></div>`).join("")||'<div class="empty">No transactions.</div>'}</div></div>`}
function bindTransactions(){let f=document.getElementById("txnForm");if(f)f.onsubmit=async e=>{e.preventDefault();let d=new FormData(f);await saveItem("transactions",{id:uid(),date:d.get("date"),type:d.get("type"),name:d.get("name"),amount:Number(d.get("amount")||0),category:d.get("category")});renderAll();toast("Saved")};bindDeletes(document.getElementById("transactions"))}
function renderSimple(store,title){return `<div class="section"><div><h2>${title}</h2></div></div><div class="list">${state[store].map(x=>`<div class="item"><div class="title">${esc(x.name||x.employer||x.category||x.title)}</div><div class="muted">${money(x.amount||x.net||x.target||0)}</div></div>`).join("")||'<div class="empty">No records yet.</div>'}</div>`}
function renderVault(){return `<div class="section"><div><h2>PDF Engine + Document Vault</h2><p>FFE 3.1 modular document workspace.</p></div></div><div class="grid cols"><div class="card"><h2>Manual Statement Review</h2><p class="muted">Use this reliable fallback when automatic PDF extraction is limited.</p><form id="manualDocForm"><div class="formgrid"><label>Institution<input name="institution" value="Best Buy / Citi"></label><label>Account Ending<input name="accountEnding"></label><label>New Balance<input name="newBalance" type="number" step="0.001"></label><label>Minimum Payment<input name="minimumPayment" type="number" step="0.001"></label><label>Credit Limit<input name="creditLimit" type="number" step="0.001"></label><label>Payment Due Date<input name="paymentDueDate"></label></div><button class="btn green">Save Statement</button></form></div><div class="card"><h2>Documents</h2><div class="list">${state.documents.slice().reverse().map(d=>`<div class="item"><div class="title">${esc(d.institution)} ${d.accountEnding?("••••"+esc(d.accountEnding)):""}</div><div class="muted">${esc(d.paymentDueDate||"")} · ${money(d.newBalance)}</div></div>`).join("")||'<div class="empty">No documents saved.</div>'}</div></div></div>`}
function bindVault(){let f=document.getElementById("manualDocForm");if(f)f.onsubmit=async e=>{e.preventDefault();let d=new FormData(f);let doc={id:uid(),fileName:"Manual Statement",institution:d.get("institution"),docType:"Credit Card Statement",accountEnding:d.get("accountEnding"),newBalance:Number(d.get("newBalance")||0),minimumPayment:Number(d.get("minimumPayment")||0),creditLimit:Number(d.get("creditLimit")||0),paymentDueDate:d.get("paymentDueDate"),importedAt:new Date().toISOString(),engine:"Manual Review"};await put("documents",doc);let name=`${doc.institution} ${doc.accountEnding?("••••"+doc.accountEnding):""}`;let ex=state.accounts.find(a=>a.name===name);await put("accounts",{id:ex?.id||uid(),name,type:"Credit Card",balance:doc.newBalance,minimum:doc.minimumPayment,creditLimit:doc.creditLimit,due:doc.paymentDueDate,notes:"Updated from manual statement"});await load();renderAll();toast("Statement saved")}}
function renderReports(){let by={};state.transactions.filter(t=>t.type==="Expense").forEach(t=>by[t.category]=(by[t.category]||0)+Number(t.amount||0));let max=Math.max(...Object.values(by),1);return `<div class="section"><div><h2>Reports</h2><p>Category spending.</p></div></div><div class="card"><div class="grid">${Object.keys(by).length?Object.entries(by).map(([k,v])=>`<div><div class="head"><span>${esc(k)}</span><strong>${money(v)}</strong></div><div class="bar"><div style="width:${Math.min(100,v/max*100)}%"></div></div></div>`).join(""):'<div class="empty">No expense transactions yet.</div>'}</div></div>`}
function renderAdvisor(){let p=projectDays(30),ca=cashAmount(),de=debtAmount();return `<div class="section"><div><h2>AI Advisor</h2><p>Rules-based local recommendations.</p></div></div><div class="list"><div class="item"><div class="title">30-Day Forecast</div><div class="muted">Projected cash: ${money(p.end)}</div></div><div class="item"><div class="title">Debt Snapshot</div><div class="muted">Recorded debt: ${money(de)}</div></div><div class="item"><div class="title">Document Knowledge</div><div class="muted">${state.documents.length} document(s) available.</div></div></div>`}

function eventDateValue(x){let d=x.date||x.paymentDueDate||x.due||x.importedAt||x.updatedAt||"";let parsed=new Date(d);return isNaN(parsed)?new Date(0):parsed}
function renderTimeline(){let events=[];state.transactions.forEach(t=>events.push({kind:"Transaction",title:t.name,detail:`${t.type||""} · ${t.category||""}`,amount:t.amount,date:t.date}));state.bills.forEach(b=>events.push({kind:"Bill",title:b.name,detail:`Due day ${b.due||"—"} · ${b.category||""}`,amount:b.amount,date:b.due}));state.payroll.forEach(p=>events.push({kind:"Payroll",title:p.employer,detail:"Paycheck",amount:p.net,date:p.date}));state.documents.forEach(d=>events.push({kind:"Document",title:d.institution||d.fileName,detail:`${d.docType||"Statement"} · ${d.accountEnding||""}`,amount:d.newBalance,date:d.importedAt}));state.goals.forEach(g=>events.push({kind:"Goal",title:g.name,detail:`Target ${money(g.target)}`,amount:g.current,date:g.date}));events.sort((a,b)=>eventDateValue(b)-eventDateValue(a));return `<div class="section"><div><h2>Financial Timeline</h2><p>Documents, transactions, bills, payroll, and goals in one chronological view.</p></div></div><div class="timeline">${events.length?events.slice(0,100).map(e=>`<div class="item timeline-item"><span class="timeline-dot"></span><div><div class="title">${esc(e.title||"Untitled")}</div><div class="muted">${esc(e.kind)} · ${esc(e.detail||"")} · ${esc(e.date||"")}</div></div><div class="money">${money(e.amount||0)}</div></div>`).join(""):'<div class="empty">No timeline events yet.</div>'}</div>`}
function searchAll(q){q=String(q||"").toLowerCase();if(!q)return[];let out=[];const add=(type,item,text)=>{if(String(text).toLowerCase().includes(q))out.push({type,item,text})};state.accounts.forEach(a=>add("Account",a,`${a.name} ${a.type} ${a.notes||""}`));state.transactions.forEach(t=>add("Transaction",t,`${t.name} ${t.category} ${t.account} ${t.notes||""}`));state.bills.forEach(b=>add("Bill",b,`${b.name} ${b.category} ${b.notes||""}`));state.payroll.forEach(p=>add("Payroll",p,`${p.employer} ${p.notes||""}`));state.documents.forEach(d=>add("Document",d,`${d.fileName} ${d.institution} ${d.docType} ${d.accountEnding}`));state.goals.forEach(g=>add("Goal",g,`${g.name} ${g.notes||""}`));return out}
function renderSearch(){return `<div class="section"><div><h2>Smart Search</h2><p>Search across accounts, transactions, documents, bills, payroll, and goals.</p></div></div><div class="card"><label>Search<input id="globalSearchInput" placeholder="Amazon, Best Buy, rent, Discover, payroll..."></label></div><div class="section"><div><h2>Results</h2></div></div><div class="list" id="globalSearchResults"><div class="empty">Type to search your local FFE data.</div></div>`}
function bindSearch(){let input=document.getElementById("globalSearchInput"),results=document.getElementById("globalSearchResults");if(!input||!results)return;input.oninput=()=>{let rows=searchAll(input.value);results.innerHTML=rows.length?rows.slice(0,100).map(r=>`<div class="item search-result"><div class="title">${esc(r.type)}</div><div class="muted">${esc(r.text).slice(0,180)}</div></div>`).join(""):'<div class="empty">No matching records.</div>'}}
function suggestedCategory(name){let s=String(name||"").toLowerCase();for(let r of (state.rules||[])){if(s.includes(String(r.contains||"").toLowerCase()))return r.category}if(/shell|chevron|exxon|mobil|valero/.test(s))return"Fuel";if(/costco|kroger|heb|walmart|grocery/.test(s))return"Food";if(/amazon|target|best buy/.test(s))return"Shopping";if(/netflix|spotify|hulu|disney/.test(s))return"Entertainment";if(/rent|apartment|mortgage/.test(s))return"Housing";return"Other"}
function applyRulesToExisting(){state.transactions.forEach(t=>{t.category=suggestedCategory(t.name);put("transactions",t)});setTimeout(async()=>{await load();renderAll();toast("Rules applied")},500)}
function renderRules(){return `<div class="section"><div><h2>Rules Engine</h2><p>Create local categorization rules for future imports and existing transactions.</p></div></div><div class="grid cols"><div class="card"><form id="ruleForm"><div class="formgrid"><label>If merchant contains<input name="contains" placeholder="Shell"></label><label>Category<input name="category" placeholder="Fuel"></label></div><button class="btn green">Save Rule</button></form><div class="actions" style="justify-content:flex-start;margin-top:12px"><button class="btn secondary" onclick="applyRulesToExisting()">Apply Rules to Existing Transactions</button></div></div><div class="list">${(state.rules||[]).map(r=>`<div class="item"><div class="title">If contains "${esc(r.contains)}"</div><div class="muted">Category → ${esc(r.category)}</div></div>`).join("")||'<div class="empty">No rules yet.</div>'}</div></div>`}
function bindRules(){let f=document.getElementById("ruleForm");if(!f)return;f.onsubmit=async e=>{e.preventDefault();let d=new FormData(f);await put("rules",{id:uid(),contains:d.get("contains"),category:d.get("category"),createdAt:new Date().toISOString()});await load();renderAll();toast("Rule saved")}}

const views=["dashboard","accounts","transactions","bills","payroll","budget","debt","goals","vault","timeline","search","rules","reports","advisor","settings"];
const labels={dashboard:"🏠 Home",accounts:"🏦 Accounts",transactions:"💳 Txns",bills:"🧾 Bills",payroll:"💵 Payroll",budget:"📊 Budget",debt:"📉 Debt",goals:"🎯 Goals",vault:"📄 Vault",reports:"📈 Reports",advisor:"🤖 Advisor",timeline:"📅 Timeline",search:"🔍 Search",rules:"⚙️ Rules",settings:"⚙️ Settings"};
function show(v){document.querySelectorAll(".view").forEach(x=>x.classList.toggle("active",x.id===v));document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x.dataset.view===v));location.hash=v}
function renderAll(){document.getElementById("app").innerHTML=`<div class="app-shell"><header class="topbar"><div class="brand"><div class="logo">FFE</div><div><h1>Financial Freedom Engine</h1><p>3.2 · Timeline + Search + Rules</p></div></div><div class="pill">IndexedDB</div></header><nav class="tabs">${views.map(v=>`<button class="tab" data-view="${v}">${labels[v].split(" ")[0]}<span>${labels[v].split(" ").slice(1).join(" ")}</span></button>`).join("")}</nav><main>${views.map(v=>`<section id="${v}" class="view"></section>`).join("")}</main></div>`;
dashboard.innerHTML=renderDashboard();accounts.innerHTML=renderAccounts();transactions.innerHTML=renderTransactions();bills.innerHTML=renderSimple("bills","Bills");payroll.innerHTML=renderSimple("payroll","Payroll");budget.innerHTML=renderSimple("budgets","Budget");debt.innerHTML=renderSimple("accounts","Debt / Cards");goals.innerHTML=renderSimple("goals","Goals");vault.innerHTML=renderVault();timeline.innerHTML=renderTimeline();search.innerHTML=renderSearch();rules.innerHTML=renderRules();reports.innerHTML=renderReports();advisor.innerHTML=renderAdvisor();settings.innerHTML=`<div class="section"><div><h2>Settings</h2></div></div><div class="card"><h2>FFE 3.1</h2><p class="muted">FFE 3.2 adds Financial Timeline, Smart Search, and a local Rules Engine while keeping the single-file GitHub Pages workflow.</p></div>`;
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>show(b.dataset.view));bindAccounts();bindTransactions();bindVault();bindSearch();bindRules();show(location.hash.replace("#")||"dashboard")}
(async()=>{try{await openDB();await load();renderAll()}catch(e){alert("FFE could not start IndexedDB.")}})();
</script>
</body></html>
