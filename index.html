<script>
(function(){
"use strict";
function $(id){return document.getElementById(id);}
function uid(){return "id_"+Date.now()+"_"+Math.random().toString(16).slice(2);}
function today(){return new Date().toISOString().slice(0,10);}
function money(v){return Number(v||0).toLocaleString(undefined,{style:"currency",currency:"USD",minimumFractionDigits:3,maximumFractionDigits:3});}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c];});}
function toast(m){var t=$("toast"); if(!t)return; t.textContent=m; t.className="toast show"; setTimeout(function(){t.className="toast";},2200);}
var state={accounts:[],transactions:[],bills:[],payroll:[],goals:[],budgets:[],documents:[],rules:[],settings:[],trips:[]};
var db=null, DB_NAME="FFE_DB_SAFE", DB_VERSION=3;
var STORES=["accounts","transactions","bills","payroll","goals","budgets","documents","rules","settings","trips"];
function openDB(){return new Promise(function(resolve,reject){var req=indexedDB.open(DB_NAME,DB_VERSION);req.onupgradeneeded=function(e){var d=e.target.result;STORES.forEach(function(s){if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:"id"});});};req.onsuccess=function(){db=req.result;resolve(db);};req.onerror=function(){reject(req.error||new Error("IndexedDB error"));};});}
function store(name,mode){return db.transaction(name,mode||"readonly").objectStore(name);}
function all(name){return new Promise(function(resolve,reject){var r=store(name).getAll();r.onsuccess=function(){resolve(r.result||[]);};r.onerror=function(){reject(r.error);};});}
function put(name,obj){return new Promise(function(resolve,reject){var r=store(name,"readwrite").put(obj);r.onsuccess=function(){resolve(obj);};r.onerror=function(){reject(r.error);};});}
function del(name,id){return new Promise(function(resolve,reject){var r=store(name,"readwrite").delete(id);r.onsuccess=function(){resolve();};r.onerror=function(){reject(r.error);};});}
async function load(){for(var i=0;i<STORES.length;i++){state[STORES[i]]=await all(STORES[i]);}if(!state.settings.some(function(x){return x.id==="seeded";})){await put("accounts",{id:uid(),name:"Checking Account",type:"Checking",balance:0,creditLimit:0,apr:0,minimum:0,due:"",notes:"Starter account"});await put("bills",{id:uid(),name:"Rent",amount:1313.5,due:"1",category:"Housing",frequency:"Monthly"});await put("settings",{id:"seeded",value:true});await put("settings",{id:"version",value:"4.0.1-stable"});for(var j=0;j<STORES.length;j++){state[STORES[j]]=await all(STORES[j]);}}}
async function saveItem(storeName,obj){obj.updatedAt=new Date().toISOString();await put(storeName,obj);await load();}
async function deleteItem(storeName,id){await del(storeName,id);await load();renderAll();toast("Deleted");}
window.deleteItem=deleteItem;

function cashAmount(){return state.accounts.filter(function(a){return ["Checking","Savings","Cash"].indexOf(a.type)>=0;}).reduce(function(s,a){return s+Number(a.balance||0);},0);}
function debtAmount(){return state.accounts.filter(function(a){return ["Credit Card","Loan"].indexOf(a.type)>=0;}).reduce(function(s,a){return s+Number(a.balance||0);},0);}
function assetsAmount(){return state.accounts.filter(function(a){return ["Checking","Savings","Cash","Investment"].indexOf(a.type)>=0;}).reduce(function(s,a){return s+Number(a.balance||0);},0);}
function monthSpendAmount(){var ym=new Date().toISOString().slice(0,7);return state.transactions.filter(function(t){return String(t.date||"").slice(0,7)===ym && t.type==="Expense";}).reduce(function(s,t){return s+Number(t.amount||0);},0);}
function utilization(a){var lim=Number(a.creditLimit||0);return lim>0?Number(a.balance||0)/lim*100:0;}
function suggestedCategory(name){var s=String(name||"").toLowerCase();for(var i=0;i<state.rules.length;i++){var r=state.rules[i]; if(s.indexOf(String(r.contains||"").toLowerCase())>=0)return r.category;}if(/shell|chevron|exxon|mobil|valero/.test(s))return"Fuel";if(/costco|kroger|heb|walmart|grocery/.test(s))return"Food";if(/amazon|target|best buy/.test(s))return"Shopping";if(/netflix|spotify|hulu|disney/.test(s))return"Entertainment";if(/rent|apartment|mortgage/.test(s))return"Housing";return"Other";}

var views=["home","money","travel","import","analytics","advisor","more"];
var labels={home:"🏠 Home",money:"💳 Money",travel:"✈️ Travel",import:"📥 Import",analytics:"📊 Analytics",advisor:"🤖 Advisor",more:"⋯ More"};
function appShell(){return '<div class="app-shell"><header class="topbar"><div class="brand"><div class="logo">FFE</div><div><h1>Financial Freedom Engine</h1><p>Intelligence · NCC v1.3R</p></div></div><div class="pill">IndexedDB</div></header><nav class="tabs">'+views.map(function(v){var parts=labels[v].split(" ");return '<button class="tab" data-view="'+v+'">'+parts[0]+'<span>'+parts.slice(1).join(" ")+'</span></button>';}).join("")+'</nav><main>'+views.map(function(v){return '<section id="'+v+'" class="view"></section>';}).join("")+'</main></div>';}
function show(v){views.forEach(function(x){var el=$(x); if(el)el.className="view"+(x===v?" active":"");});Array.prototype.forEach.call(document.querySelectorAll(".tab"),function(b){b.className="tab"+(b.getAttribute("data-view")===v?" active":"");});location.hash=v;}
function go(section){show(section);}
window.go=go;


function clampNcc(v,min,max){return Math.max(min,Math.min(max,v))}

function nowIso(){return new Date().toISOString();}
function normalizeSyncMeta(obj){
  if(!obj.syncMeta)obj.syncMeta={};
  var m=obj.syncMeta;
  if(m.lastSyncedAt===undefined)m.lastSyncedAt=null;
  if(m.sourceUpdatedAt===undefined)m.sourceUpdatedAt=null;
  if(m.lastImportedAt===undefined)m.lastImportedAt=null;
  if(m.lastManualEditAt===undefined)m.lastManualEditAt=obj.updatedAt||null;
  if(m.nextExpectedUpdateAt===undefined)m.nextExpectedUpdateAt=null;
  if(m.syncStatus===undefined)m.syncStatus="manual";
  if(m.syncSource===undefined)m.syncSource="manual";
  if(m.syncError===undefined)m.syncError="";
  if(!Array.isArray(m.syncHistory))m.syncHistory=[];
  return obj;
}
function syncAgeDays(value){
  if(!value)return null;
  var d=new Date(value);
  if(isNaN(d))return null;
  return (Date.now()-d.getTime())/86400000;
}
function freshnessStatus(obj){
  normalizeSyncMeta(obj);
  var m=obj.syncMeta;
  if(m.syncStatus==="error")return{key:"error",label:"Sync Error",cls:"freshness-error"};
  if(m.syncStatus==="disconnected")return{key:"disconnected",label:"Disconnected",cls:"freshness-disconnected"};
  if(m.syncStatus==="manual")return{key:"manual",label:"Manual Only",cls:"freshness-manual"};
  var age=syncAgeDays(m.lastSyncedAt||m.sourceUpdatedAt||m.lastImportedAt||m.lastManualEditAt);
  if(age===null||age>7)return{key:"stale",label:"Stale",cls:"freshness-stale"};
  if(age>2)return{key:"due",label:"Due Soon",cls:"freshness-due"};
  return{key:"current",label:"Current",cls:"freshness-current"};
}
function freshnessSummary(){
  var records=[].concat(state.accounts||[],state.bills||[],state.documents||[],state.goals||[],state.payroll||[]);
  var counts={current:0,due:0,stale:0,error:0,manual:0,disconnected:0};
  records.forEach(function(r){var s=freshnessStatus(r);counts[s.key]=(counts[s.key]||0)+1;});
  var total=records.length;
  var confidence=total?((counts.current*100+counts.due*70+counts.manual*55+counts.stale*20)/total):35;
  return{counts:counts,total:total,confidence:clampNcc(confidence,0,100),records:records};
}
function formatSyncDate(v){
  if(!v)return"—";
  var d=new Date(v);
  return isNaN(d)?String(v):d.toLocaleString();
}
function addSyncEvent(obj,type,message,source){
  normalizeSyncMeta(obj);
  obj.syncMeta.syncHistory.unshift({id:uid(),at:nowIso(),type:type,message:message,source:source||"manual"});
  obj.syncMeta.syncHistory=obj.syncMeta.syncHistory.slice(0,50);
}
function syncMetaFromForm(d,obj){
  normalizeSyncMeta(obj);
  function toIso(v){if(!v)return null;var x=new Date(v);return isNaN(x)?null:x.toISOString();}
  obj.syncMeta.lastSyncedAt=toIso(d.get("lastSyncedAt"));
  obj.syncMeta.sourceUpdatedAt=toIso(d.get("sourceUpdatedAt"));
  obj.syncMeta.nextExpectedUpdateAt=toIso(d.get("nextExpectedUpdateAt"));
  obj.syncMeta.syncStatus=d.get("syncStatus")||"manual";
  obj.syncMeta.syncSource=d.get("syncSource")||"manual";
  obj.syncMeta.syncError=d.get("syncError")||"";
  obj.syncMeta.lastManualEditAt=nowIso();
  addSyncEvent(obj,obj.syncMeta.syncStatus==="error"?"error":"update","Record saved or updated.",obj.syncMeta.syncSource);
  return obj;
}

function nccMetrics(){
  var cash=cashAmount();
  var debt=debtAmount();
  var assets=assetsAmount();
  var monthSpend=monthSpendAmount();
  var income=state.transactions.filter(function(t){return t.type==="Income";}).reduce(function(s,t){return s+Number(t.amount||0);},0);
  var cards=state.accounts.filter(function(a){return a.type==="Credit Card";});
  var cardBalance=cards.reduce(function(s,a){return s+Number(a.balance||0);},0);
  var cardLimit=cards.reduce(function(s,a){return s+Number(a.creditLimit||0);},0);
  var utilization=cardLimit>0?cardBalance/cardLimit*100:0;
  var totalBills=state.bills.reduce(function(s,b){return s+Number(b.amount||0);},0);
  var goalsTotal=state.goals.reduce(function(s,g){return s+Number(g.target||0);},0);
  var goalsCurrent=state.goals.reduce(function(s,g){return s+Number(g.current||0);},0);
  var goalProgress=goalsTotal>0?goalsCurrent/goalsTotal*100:0;
  var cashScore=clampNcc(cash>0?55+Math.min(45,cash/5000*45):15,0,100);
  var creditScore=clampNcc(cardLimit===0?55:100-utilization,0,100);
  var debtScore=clampNcc(assets>0?100-(debt/assets*100):debt>0?25:80,0,100);
  var billsScore=clampNcc(totalBills>0&&cash>0?100-(totalBills/cash*35):totalBills===0?65:25,0,100);
  var incomeScore=clampNcc(income>monthSpend&&income>0?85:income>0?60:35,0,100);
  var goalsScore=clampNcc(goalsTotal>0?goalProgress:50,0,100);
  var docsScore=clampNcc(state.documents.length*14,15,100);
  var completenessFields=0,totalFields=7;
  if(state.accounts.length)completenessFields++;
  if(state.transactions.length)completenessFields++;
  if(state.bills.length)completenessFields++;
  if(state.documents.length)completenessFields++;
  if(state.rules.length)completenessFields++;
  if(cards.every(function(a){return Number(a.creditLimit||0)>0})&&cards.length)completenessFields++;
  if(income>0)completenessFields++;
  var completeness=completenessFields/totalFields*100;
  var freshness=freshnessSummary();
  var health=(cashScore*.19+creditScore*.16+debtScore*.15+billsScore*.12+incomeScore*.13+goalsScore*.07+docsScore*.05+completeness*.06+freshness.confidence*.07);
  return {
    cash:cash,debt:debt,assets:assets,netWorth:assets-debt,monthSpend:monthSpend,income:income,
    utilization:utilization,totalBills:totalBills,goalProgress:goalProgress,completeness:completeness,
    health:clampNcc(health,0,100),freshness:freshness,
    scores:{cash:cashScore,credit:creditScore,debt:debtScore,bills:billsScore,income:incomeScore,goals:goalsScore,documents:docsScore}
  };
}
function nccState(score){
  if(score>=75)return{label:"Healthy",cls:"healthy"};
  if(score>=50)return{label:"Watch",cls:"watch"};
  return{label:"Action Needed",cls:"critical"};
}

    bills:{title:"Bill Coverage",value:money(m.totalBills),score:m.scores.bills,formula:"100 − (monthly bills ÷ cash × 35), constrained from 0 to 100",sources:["Bills","Cash-type accounts"],path:["Bills","Cash coverage","Bill score"]},

  '<div class="section"><div><h2>Evidence Path</h2></div></div><div class="evidence-path">'+e.path.map(function(x,i){return '<span class="evidence-step">'+esc(x)+'</span>'+(i<e.path.length-1?'<span class="arrow">→</span>':'');}).join("")+'</div>'+
  '<div class="section"><div><h2>Formula</h2></div></div><div class="item"><div class="muted">'+esc(e.formula)+'</div></div>'+
  '<div class="section"><div><h2>Source Records</h2></div></div><div class="list">'+e.sources.map(function(x){return '<div class="item"><div class="title">'+esc(x)+'</div><div class="muted">Read from local IndexedDB records.</div></div>';}).join("")+'</div>';
}

function nccBrief(m){
  var items=[];

  else items.push({level:"healthy",title:"Credit utilization",text:"Overall utilization is "+m.utilization.toFixed(3)+"%."});
  if(m.totalBills>m.cash&&m.totalBills>0)items.push({level:"critical",title:"Bill coverage risk",text:"Recorded bills exceed available cash."});
  else items.push({level:"healthy",title:"Bill coverage",text:money(m.cash)+" cash against "+money(m.totalBills)+" recorded bills."});
  if(m.completeness<60)items.push({level:"watch",title:"Data completeness",text:"Add more records to improve confidence. Current completeness: "+m.completeness.toFixed(3)+"%."});
  if(!state.transactions.length)items.push({level:"watch",title:"Import transactions",text:"Transaction data is needed for stronger spending and cash-flow signals."});
  if(!items.length)items.push({level:"healthy",title:"Systems nominal",text:"No immediate deterministic alerts were found."});
  return items;
}

function tripDays(start,end){
  if(!start||!end)return 1;
  var a=new Date(start),b=new Date(end);
  if(isNaN(a)||isNaN(b))return 1;
  return Math.max(1,Math.ceil((b-a)/86400000)+1);
}
function tripNights(start,end){return Math.max(0,tripDays(start,end)-1);}
function monthsUntil(date){
  if(!date)return 0;
  var d=new Date(date),n=new Date();
  if(isNaN(d))return 0;
  return Math.max(0,(d.getFullYear()-n.getFullYear())*12+(d.getMonth()-n.getMonth())+(d.getDate()>=n.getDate()?0:-1));
}
function calcTripScenario(t,mult){
  var days=tripDays(t.startDate,t.endDate),nights=tripNights(t.startDate,t.endDate);
  var travelers=Math.max(1,Number(t.travelers||1));
  var rooms=Math.max(1,Number(t.rooms||1));
  var hotel=Number(t.hotelNight||0)*mult*nights*rooms;
  var meals=(Number(t.breakfast||0)+Number(t.lunch||0)+Number(t.dinner||0)+Number(t.snacks||0))*mult*days*travelers;
  var transport=(Number(t.airfare||0)+Number(t.rentalCar||0)+Number(t.fuel||0)+Number(t.parking||0)+Number(t.tolls||0)+Number(t.localTransit||0))*mult;
  var activities=(Number(t.activities||0)+Number(t.tickets||0)+Number(t.shopping||0))*mult;
  var other=(Number(t.insurance||0)+Number(t.luggage||0)+Number(t.childcare||0)+Number(t.petCare||0)+Number(t.other||0))*mult;
  var subtotal=hotel+meals+transport+activities+other;
  var contingency=subtotal*(Number(t.contingencyPct||0)/100);
  var total=subtotal+contingency;
  return{days:days,nights:nights,hotel:hotel,meals:meals,transport:transport,activities:activities,other:other,contingency:contingency,total:total,perDay:total/days};
}
function tripStatus(t,total){
  var saved=Number(t.saved||0),remaining=Math.max(0,total-saved),months=monthsUntil(t.startDate);
  var required=months>0?remaining/months:remaining;
  var planned=Number(t.monthlySavings||0);
  var pct=total>0?saved/total*100:0;
  var status=remaining<=0?"Fully Funded":planned>=required?"On Track":months<=2?"At Risk":"Needs Adjustment";
  var cls=status==="Fully Funded"||status==="On Track"?"on-track":status==="At Risk"?"risk":"watch";
  return{saved:saved,remaining:remaining,months:months,requiredMonthly:required,plannedMonthly:planned,pct:clampNcc(pct,0,100),status:status,cls:cls};
}
function travelSummary(){
  var total=0,saved=0,active=0;
  (state.trips||[]).forEach(function(t){
    var c=calcTripScenario(t,1);
    total+=c.total;saved+=Number(t.saved||0);
    if(!t.endDate||new Date(t.endDate)>=new Date())active++;
  });
  return{total:total,saved:saved,gap:Math.max(0,total-saved),active:active};
}
function travelNodeScore(){
  var s=travelSummary();
  if(!s.active)return 65;
  if(s.total<=0)return 40;
  return clampNcc((s.saved/s.total)*100,0,100);
}

function downloadTextFile(filename, text, type){
  var blob=new Blob([text],{type:type||"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){URL.revokeObjectURL(url);a.remove();},250);
}

async function deriveFFEKey(password,salt){
  var enc=new TextEncoder();
  var base=await crypto.subtle.importKey("raw",enc.encode(password),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:salt,iterations:250000,hash:"SHA-256"},
    base,
    {name:"AES-GCM",length:256},
    false,
    ["encrypt","decrypt"]
  );
}
function bytesToB64(bytes){
  var s="";for(var i=0;i<bytes.length;i++)s+=String.fromCharCode(bytes[i]);return btoa(s);
}
function b64ToBytes(text){
  var s=atob(text),out=new Uint8Array(s.length);for(var i=0;i<s.length;i++)out[i]=s.charCodeAt(i);return out;
}
function getFFEBackupPayload(){

async function exportEncryptedFFEBackup(){
  if(!window.crypto||!crypto.subtle){alert("Encrypted backups are not supported in this browser.");return;}
  var password=prompt("Create a password for this encrypted backup.");
  if(!password)return;
  var confirmPassword=prompt("Enter the password again.");
  if(password!==confirmPassword){alert("Passwords do not match.");return;}
  try{
    var salt=crypto.getRandomValues(new Uint8Array(16));
    var iv=crypto.getRandomValues(new Uint8Array(12));
    var key=await deriveFFEKey(password,salt);
    var plain=new TextEncoder().encode(JSON.stringify(getFFEBackupPayload()));
    var cipher=new Uint8Array(await crypto.subtle.encrypt({name:"AES-GCM",iv:iv},key,plain));
    var wrapper={
      format:"FFE-ENCRYPTED-BACKUP",
      version:1,
      algorithm:"AES-GCM",
      kdf:"PBKDF2-SHA256",
      iterations:250000,
      salt:bytesToB64(salt),
      iv:bytesToB64(iv),
      payload:bytesToB64(cipher)
    };
    downloadTextFile("FFE_encrypted_backup_"+today()+".ffe.json",JSON.stringify(wrapper,null,2),"application/json");
    toast("Encrypted backup exported");
  }catch(e){alert("Encrypted export failed: "+(e.message||String(e)));}
}
async function restoreEncryptedFFEBackup(file){
  if(!file)return;
  var password=prompt("Enter the password for this encrypted backup.");
  if(!password)return;
  try{
    var wrapper=JSON.parse(await file.text());
    if(wrapper.format!=="FFE-ENCRYPTED-BACKUP")throw new Error("Not an encrypted FFE backup.");
    var salt=b64ToBytes(wrapper.salt),iv=b64ToBytes(wrapper.iv),cipher=b64ToBytes(wrapper.payload);
    var key=await deriveFFEKey(password,salt);
    var plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,cipher);
    var parsed=JSON.parse(new TextDecoder().decode(plain));
    var blob=new Blob([JSON.stringify(parsed)],{type:"application/json"});
    var tempFile=new File([blob],"decrypted-ffe-backup.json",{type:"application/json"});
    await restoreFFEBackupFromFile(tempFile);
  }catch(e){alert("Encrypted restore failed: "+(e.message||String(e)));}
}
function validateFFEData(){
  var issues=[],warnings=[];
  (state.accounts||[]).forEach(function(a){
    if(!a.id||!a.name)issues.push("Account missing ID or name.");
    if(!isFinite(Number(a.balance||0)))issues.push("Invalid account balance: "+(a.name||"Unknown"));
    if(a.type==="Credit Card"&&Number(a.creditLimit||0)<=0)warnings.push("Credit card missing limit: "+a.name);
  });
  (state.transactions||[]).forEach(function(t){
    if(!t.id||!t.name)issues.push("Transaction missing ID or name.");
    if(!t.date)warnings.push("Transaction missing date: "+(t.name||"Unknown"));
    if(!isFinite(Number(t.amount||0)))issues.push("Invalid transaction amount: "+(t.name||"Unknown"));
  });
  var keys={},dupes=0;
  (state.transactions||[]).forEach(function(t){
    var k=[t.date,t.name,Number(t.amount||0).toFixed(2),t.type].join("|").toLowerCase();
    if(keys[k])dupes++;else keys[k]=true;
  });
  if(dupes)warnings.push(dupes+" possible duplicate transaction(s).");
  return {issues:issues,warnings:warnings,ok:issues.length===0};
}

function exportFFEBackup(){
  var payload=getFFEBackupPayload();
  var name="FFE_backup_"+today()+".json";
  downloadTextFile(name,JSON.stringify(payload,null,2),"application/json");
  toast("Backup exported");
}
async function restoreFFEBackupFromFile(file){
  if(!file)return;
  try{
    var text=await file.text();
    var parsed=JSON.parse(text);
    var data=parsed.data||parsed;
    var allowed=["accounts","transactions","bills","payroll","goals","budgets","documents","rules","settings"];
    if(!confirm("Restore this FFE backup? This will replace matching local FFE records on this device."))return;
    for(var i=0;i<allowed.length;i++){
      var s=allowed[i];
      if(Array.isArray(data[s])){
        var old=await all(s);
        for(var j=0;j<old.length;j++)await del(s,old[j].id);
        for(var k=0;k<data[s].length;k++)await put(s,data[s][k]);
      }
    }
    await load();
    renderAll();
    toast("Backup restored");
  }catch(e){
    alert("Restore failed: "+(e.message||String(e)));
  }
}
async function clearFFEDeviceData(){
  if(!confirm("Delete all FFE data stored on this device? This cannot be undone unless you have a backup."))return;
  var stores=["accounts","transactions","bills","payroll","goals","budgets","documents","rules","settings"];
  for(var i=0;i<stores.length;i++){
    var old=await all(stores[i]);
    for(var j=0;j<old.length;j++)await del(stores[i],old[j].id);
  }
  await load();
  renderAll();
  toast("Device data cleared");
}
