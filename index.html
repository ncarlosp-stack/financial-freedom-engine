<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b0f19">
<title>Financial Freedom Engine X</title>
<style>
:root{--bg:#0b0f19;--card:#131a2c;--card2:#1e2640;--border:#2e3a5f;--text:#f8fafc;--muted:#94a3b8;--blue:#38bdf8;--green:#34d399;--amber:#fbbf24;--rose:#fb7185;--safe:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 0 0,rgba(56,189,248,.16),transparent 36%),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding-bottom:calc(92px + var(--safe))}
button,input,select,textarea{font:inherit}button{cursor:pointer}.app-shell{max-width:1100px;margin:auto;padding:18px 14px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.brand{display:flex;gap:12px;align-items:center}.logo{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--green));color:#06111c;font-weight:950;display:grid;place-items:center}h1{font-size:20px;margin:0}.brand p{margin:3px 0 0;color:var(--muted);font-size:13px}.pill{border:1px solid var(--border);border-radius:999px;padding:8px 10px;color:var(--muted);font-size:12px;font-weight:800}
.tabs{position:fixed;left:0;right:0;bottom:0;z-index:20;display:grid;grid-template-columns:repeat(6,1fr);gap:4px;padding:8px 8px calc(8px + var(--safe));background:rgba(11,15,25,.94);backdrop-filter:blur(14px);border-top:1px solid var(--border)}.tab{display:grid;place-items:center;gap:2px;background:transparent;color:var(--muted);border:1px solid transparent;border-radius:14px;padding:8px 2px;font-weight:900}.tab span{font-size:10px}.tab.active{background:var(--card2);border-color:var(--border);color:var(--text)}
.view{display:none}.view.active{display:block}.card,.item,.hero{background:rgba(19,26,44,.96);border:1px solid var(--border);border-radius:18px;box-shadow:0 14px 36px #0005}.card{padding:14px}.hero{padding:16px;margin-bottom:12px;background:linear-gradient(135deg,rgba(56,189,248,.16),rgba(52,211,153,.07))}.hero h2{font-size:28px;margin:0 0 6px}.hero p,.muted{margin:0;color:var(--muted);font-size:13px}.grid{display:grid;gap:12px}.list{display:grid;gap:10px}.item{padding:12px;display:grid;gap:8px}.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.label{font-size:11px;color:var(--muted);font-weight:950;text-transform:uppercase;letter-spacing:.05em}.value{font-size:24px;font-weight:950;margin-top:5px}.big{font-size:42px;font-weight:950;letter-spacing:-.04em}.section{display:flex;justify-content:space-between;align-items:end;margin:18px 0 8px;gap:10px}.section h2{font-size:20px;margin:0}.head{display:flex;justify-content:space-between;align-items:start;gap:10px}.title{font-weight:950}.money{font-weight:950;white-space:nowrap;font-variant-numeric:tabular-nums}.badge{border-radius:999px;padding:4px 8px;font-size:11px;font-weight:950;display:inline-flex}.blue{background:#38bdf824;color:var(--blue)}.green{background:#34d39924;color:var(--green)}.amber{background:#fbbf2424;color:var(--amber)}.rose{background:#fb718524;color:var(--rose)}.empty{border:1px dashed var(--border);border-radius:14px;color:var(--muted);text-align:center;padding:18px}.bar{height:10px;background:#0a1020;border:1px solid var(--border);border-radius:999px;overflow:hidden}.bar>div{height:100%;background:linear-gradient(90deg,var(--blue),var(--green))}
form{display:grid;gap:10px}label{display:grid;gap:5px;color:var(--muted);font-size:12px;font-weight:950}input,select,textarea{width:100%;border:1px solid var(--border);border-radius:12px;background:#0a1020;color:var(--text);padding:11px 12px}textarea{min-height:80px}.formgrid{display:grid;gap:10px}.actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}.btn{border:1px solid transparent;border-radius:12px;padding:10px 12px;font-weight:950;background:var(--blue);color:#06111c}.btn.secondary{background:transparent;color:var(--text);border-color:var(--border)}.btn.green{background:var(--green)}.btn.rose{background:var(--rose);color:white}.toast{position:fixed;left:12px;right:12px;bottom:calc(100px + var(--safe));background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:12px;box-shadow:0 16px 40px #0008;display:none;z-index:30}.toast.show{display:block}.quick-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.tile{padding:14px;border-radius:18px;background:rgba(30,38,64,.75);border:1px solid var(--border);text-align:left;color:var(--text);font-weight:950}.timeline-item{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start}.timeline-dot{width:12px;height:12px;border-radius:999px;background:var(--blue);box-shadow:0 0 0 4px rgba(56,189,248,.14);margin-top:5px}.import-preview-row{border-left:4px solid var(--blue)}.duplicate-row{border-left-color:var(--rose)}
@media(min-width:760px){body{padding-bottom:0}.app-shell{padding:24px}.tabs{position:sticky;top:0;bottom:auto;border:1px solid var(--border);border-radius:18px;margin-bottom:16px;grid-template-columns:repeat(6,auto);justify-content:start}.tab{grid-auto-flow:column;padding:10px 14px}.tab span{font-size:12px}.kpis{grid-template-columns:repeat(4,1fr)}.cols{grid-template-columns:1.05fr .95fr;align-items:start}.formgrid{grid-template-columns:repeat(2,1fr)}.quick-grid{grid-template-columns:repeat(4,1fr)}}

.backup-box{border-left:4px solid var(--green)}
.restore-box{border-left:4px solid var(--amber)}
.danger-box{border-left:4px solid var(--rose)}


.production-banner{border-left:4px solid var(--green);background:linear-gradient(135deg,rgba(52,211,153,.10),rgba(56,189,248,.07))}
.health-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.health-pass{color:var(--green);font-weight:950}.health-watch{color:var(--amber);font-weight:950}.health-fail{color:var(--rose);font-weight:950}
.privacy-box{border-left:4px solid var(--blue)}
@media(min-width:760px){.health-grid{grid-template-columns:repeat(4,1fr)}}

</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
(function(){
"use strict";
function $(id){return document.getElementById(id);}
function uid(){return "id_"+Date.now()+"_"+Math.random().toString(16).slice(2);}
function today(){return new Date().toISOString().slice(0,10);}
function money(v){return Number(v||0).toLocaleString(undefined,{style:"currency",currency:"USD",minimumFractionDigits:3,maximumFractionDigits:3});}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c];});}
function toast(m){var t=$("toast"); if(!t)return; t.textContent=m; t.className="toast show"; setTimeout(function(){t.className="toast";},2200);}
var state={accounts:[],transactions:[],bills:[],payroll:[],goals:[],budgets:[],documents:[],rules:[],settings:[]};
var db=null, DB_NAME="FFE_DB_SAFE", DB_VERSION=2;
var STORES=["accounts","transactions","bills","payroll","goals","budgets","documents","rules","settings"];
function openDB(){return new Promise(function(resolve,reject){var req=indexedDB.open(DB_NAME,DB_VERSION);req.onupgradeneeded=function(e){var d=e.target.result;STORES.forEach(function(s){if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:"id"});});};req.onsuccess=function(){db=req.result;resolve(db);};req.onerror=function(){reject(req.error||new Error("IndexedDB error"));};});}
function store(name,mode){return db.transaction(name,mode||"readonly").objectStore(name);}
function all(name){return new Promise(function(resolve,reject){var r=store(name).getAll();r.onsuccess=function(){resolve(r.result||[]);};r.onerror=function(){reject(r.error);};});}
function put(name,obj){return new Promise(function(resolve,reject){var r=store(name,"readwrite").put(obj);r.onsuccess=function(){resolve(obj);};r.onerror=function(){reject(r.error);};});}
function del(name,id){return new Promise(function(resolve,reject){var r=store(name,"readwrite").delete(id);r.onsuccess=function(){resolve();};r.onerror=function(){reject(r.error);};});}
async function load(){for(var i=0;i<STORES.length;i++){state[STORES[i]]=await all(STORES[i]);}if(!state.settings.some(function(x){return x.id==="seeded";})){await put("accounts",{id:uid(),name:"Checking Account",type:"Checking",balance:0,creditLimit:0,apr:0,minimum:0,due:"",notes:"Starter account"});await put("bills",{id:uid(),name:"Rent",amount:1313.5,due:"1",category:"Housing",frequency:"Monthly"});await put("settings",{id:"seeded",value:true});await put("settings",{id:"version",value:"4.0.1-stable"});for(var j=0;j<STORES.length;j++){state[STORES[j]]=await all(STORES[j]);}}}
async function saveItem(storeName,obj){obj.updatedAt=new Date().toISOString();await put(storeName,obj);await load();}
async function deleteItem(storeName,id){await del(storeName,id);await load();renderAll();toast("Deleted");}
window.deleteItem=deleteItem;

function cashAmount(){return state.accounts.filter(function(a){return ["Checking","Savings","Cash"].indexOf(a.type)>=0;}).reduce(function(s,a){return s+Number(a.balance||0);},0);}
function debtAmount(){return state.accounts.filter(function(a){return ["Credit Card","Loan"].indexOf(a.type)>=0;}).reduce(function(s,a){return s+Number(a.balance||0);},0);}
function assetsAmount(){return state.accounts.filter(function(a){return ["Checking","Savings","Cash","Investment"].indexOf(a.type)>=0;}).reduce(function(s,a){return s+Number(a.balance||0);},0);}
function monthSpendAmount(){var ym=new Date().toISOString().slice(0,7);return state.transactions.filter(function(t){return String(t.date||"").slice(0,7)===ym && t.type==="Expense";}).reduce(function(s,t){return s+Number(t.amount||0);},0);}
function utilization(a){var lim=Number(a.creditLimit||0);return lim>0?Number(a.balance||0)/lim*100:0;}
function suggestedCategory(name){var s=String(name||"").toLowerCase();for(var i=0;i<state.rules.length;i++){var r=state.rules[i]; if(s.indexOf(String(r.contains||"").toLowerCase())>=0)return r.category;}if(/shell|chevron|exxon|mobil|valero/.test(s))return"Fuel";if(/costco|kroger|heb|walmart|grocery/.test(s))return"Food";if(/amazon|target|best buy/.test(s))return"Shopping";if(/netflix|spotify|hulu|disney/.test(s))return"Entertainment";if(/rent|apartment|mortgage/.test(s))return"Housing";return"Other";}

var views=["home","money","import","analytics","advisor","more"];
var labels={home:"🏠 Home",money:"💳 Money",import:"📥 Import",analytics:"📊 Analytics",advisor:"🤖 Advisor",more:"⋯ More"};
function appShell(){return '<div class="app-shell"><header class="topbar"><div class="brand"><div class="logo">FFE</div><div><h1>Financial Freedom Engine</h1><p>X Platform · Phase 2</p></div></div><div class="pill">IndexedDB</div></header><nav class="tabs">'+views.map(function(v){var parts=labels[v].split(" ");return '<button class="tab" data-view="'+v+'">'+parts[0]+'<span>'+parts.slice(1).join(" ")+'</span></button>';}).join("")+'</nav><main>'+views.map(function(v){return '<section id="'+v+'" class="view"></section>';}).join("")+'</main></div>';}
function show(v){views.forEach(function(x){var el=$(x); if(el)el.className="view"+(x===v?" active":"");});Array.prototype.forEach.call(document.querySelectorAll(".tab"),function(b){b.className="tab"+(b.getAttribute("data-view")===v?" active":"");});location.hash=v;}
function go(section){show(section);}
window.go=go;

function renderHome(){var ca=cashAmount(),de=debtAmount(),net=assetsAmount()-de,sp=monthSpendAmount();var score=Math.min(100,30+(ca>0?20:0)+(de===0?25:10)+(state.transactions.length?10:0)+(state.documents.length?10:0));var bills=state.bills.slice(0,3);return '<div class="item production-banner"><div class="title">FFE X Phase 2 — Application Migration</div><div class="muted">Stable FFE 5.0 application running on the FFE X Phase 2 migration track.</div></div><div style="height:12px"></div><div class="hero"><h2>Good day, Carlos</h2><p>Your Financial Command Center.</p></div><div class="kpis"><div class="card"><div class="label">Cash</div><div class="value">'+money(ca)+'</div></div><div class="card"><div class="label">Net Worth</div><div class="value">'+money(net)+'</div></div><div class="card"><div class="label">Debt</div><div class="value">'+money(de)+'</div></div><div class="card"><div class="label">Month Spend</div><div class="value">'+money(sp)+'</div></div></div><div class="section"><div><h2>Financial Freedom Score</h2></div></div><div class="card"><div class="big">'+score.toFixed(3)+'</div><div class="bar"><div style="width:'+score+'%"></div></div></div><div class="section"><div><h2>Stable Foundation</h2><p>FFE 5.0 is based on the last confirmed working build.</p></div></div><div class="list"><div class="item"><div class="title">Data Engine</div><div class="muted">Accounts, transactions, bills, statements, rules, and settings.</div></div><div class="item"><div class="title">Import Engine</div><div class="muted">CSV import with preview, mapping, duplicate checks, and categorization.</div></div><div class="item"><div class="title">Mobile Command Center</div><div class="muted">Simplified Home, Money, Import, Analytics, Advisor, and More navigation.</div></div></div><div class="section"><div><h2>Quick Actions</h2></div></div><div class="quick-grid"><button class="tile" onclick="go(\'money\')">💳 Add Money Data</button><button class="tile" onclick="go(\'import\')">📥 Import CSV</button><button class="tile" onclick="go(\'analytics\')">📊 View Reports</button><button class="tile" onclick="go(\'advisor\')">🤖 Advisor</button></div><div class="section"><div><h2>Upcoming Bills</h2></div></div><div class="list">'+(bills.length?bills.map(function(b){return '<div class="item"><div class="head"><div><div class="title">'+esc(b.name)+'</div><div class="muted">Due '+esc(b.due)+' · '+esc(b.category)+'</div></div><div class="money">'+money(b.amount)+'</div></div></div>';}).join(""):'<div class="empty">No bills saved.</div>')+'</div>';}
function renderMoney(){return '<div class="section"><div><h2>Money Workspace</h2><p>Accounts, credit cards, transactions, bills, and statements.</p></div></div><div class="quick-grid"><button class="tile" onclick="showMoneyPanel(\'accounts\')">🏦 Accounts</button><button class="tile" onclick="showMoneyPanel(\'credit\')">💡 Credit</button><button class="tile" onclick="showMoneyPanel(\'transactions\')">💳 Transactions</button><button class="tile" onclick="showMoneyPanel(\'bills\')">🧾 Bills</button><button class="tile" onclick="showMoneyPanel(\'vault\')">📄 Vault</button><button class="tile" onclick="showMoneyPanel(\'rules\')">⚙️ Rules</button></div><div id="moneyPanel" style="margin-top:12px">'+panelAccounts()+'</div>';}
function showMoneyPanel(p){var el=$("moneyPanel"); if(!el)return; var map={accounts:panelAccounts,credit:panelCredit,transactions:panelTransactions,bills:panelBills,vault:panelVault,rules:panelRules};el.innerHTML=map[p]();bindForms();}
window.showMoneyPanel=showMoneyPanel;
function panelAccounts(){return '<div class="grid cols"><div class="card"><h2>Accounts</h2><form id="accountForm"><div class="formgrid"><label>Name<input name="name" required></label><label>Type<select name="type"><option>Checking</option><option>Savings</option><option>Cash</option><option>Credit Card</option><option>Loan</option><option>Investment</option></select></label><label>Balance<input name="balance" type="number" step="0.001"></label><label>Credit Limit<input name="creditLimit" type="number" step="0.001"></label><label>APR %<input name="apr" type="number" step="0.001"></label><label>Minimum Payment<input name="minimum" type="number" step="0.001"></label><label>Due Date / Day<input name="due"></label></div><button class="btn green">Save Account</button></form></div><div class="list">'+(state.accounts.length?state.accounts.map(function(a){return '<div class="item"><div class="head"><div><div class="title">'+esc(a.name)+'</div><div class="muted">'+esc(a.type)+'</div></div><div class="money">'+money(a.balance)+'</div></div><button class="btn rose" onclick="deleteItem(\'accounts\',\''+a.id+'\')">Delete</button></div>';}).join(""):'<div class="empty">No accounts.</div>')+'</div></div>';}
function panelCredit(){var cards=state.accounts.filter(function(a){return a.type==="Credit Card";});return '<div class="section"><div><h2>Credit Intelligence</h2></div></div><div class="list">'+(cards.length?cards.map(function(a){var u=utilization(a);return '<div class="item"><div class="head"><div><div class="title">'+esc(a.name)+'</div><div class="muted">APR '+Number(a.apr||0).toFixed(3)+'% · Due '+esc(a.due||"—")+'</div></div><span class="badge '+(u>=50?"amber":"green")+'">'+u.toFixed(3)+'%</span></div><div class="bar"><div style="width:'+Math.min(100,u)+'%"></div></div><div class="muted">Balance '+money(a.balance)+' · Limit '+money(a.creditLimit)+' · Minimum '+money(a.minimum)+'</div></div>';}).join(""):'<div class="empty">Add credit card accounts.</div>')+'</div>';}
function panelTransactions(){return '<div class="grid cols"><div class="card"><h2>Transactions</h2><form id="txnForm"><div class="formgrid"><label>Date<input name="date" type="date" value="'+today()+'"></label><label>Type<select name="type"><option>Expense</option><option>Income</option></select></label><label>Name<input name="name" required></label><label>Amount<input name="amount" type="number" step="0.001"></label><label>Category<input name="category" value="Other"></label></div><button class="btn green">Save Transaction</button></form></div><div class="list">'+(state.transactions.length?state.transactions.slice().reverse().map(function(t){return '<div class="item"><div class="head"><div><div class="title">'+esc(t.name)+'</div><div class="muted">'+esc(t.date)+' · '+esc(t.category)+' · '+esc(t.type)+'</div></div><div class="money">'+money(t.amount)+'</div></div><button class="btn rose" onclick="deleteItem(\'transactions\',\''+t.id+'\')">Delete</button></div>';}).join(""):'<div class="empty">No transactions.</div>')+'</div></div>';}
function panelBills(){return '<div class="grid cols"><div class="card"><h2>Bills</h2><form id="billForm"><div class="formgrid"><label>Name<input name="name" required></label><label>Amount<input name="amount" type="number" step="0.001"></label><label>Due Day<input name="due"></label><label>Category<input name="category"></label><label>Frequency<select name="frequency"><option>Monthly</option><option>Weekly</option><option>Yearly</option></select></label></div><button class="btn green">Save Bill</button></form></div><div class="list">'+(state.bills.length?state.bills.map(function(b){return '<div class="item"><div class="head"><div><div class="title">'+esc(b.name)+'</div><div class="muted">Due '+esc(b.due)+' · '+esc(b.category)+'</div></div><div class="money">'+money(b.amount)+'</div></div></div>';}).join(""):'<div class="empty">No bills.</div>')+'</div></div>';}
function panelVault(){return '<div class="grid cols"><div class="card"><h2>Manual Statement Review</h2><form id="docForm"><div class="formgrid"><label>Institution<input name="institution" value="Best Buy / Citi"></label><label>Account Ending<input name="accountEnding"></label><label>New Balance<input name="newBalance" type="number" step="0.001"></label><label>Minimum Payment<input name="minimumPayment" type="number" step="0.001"></label><label>Credit Limit<input name="creditLimit" type="number" step="0.001"></label><label>Payment Due Date<input name="paymentDueDate"></label></div><button class="btn green">Save Statement</button></form></div><div class="list">'+(state.documents.length?state.documents.slice().reverse().map(function(d){return '<div class="item"><div class="title">'+esc(d.institution)+' '+(d.accountEnding?'••••'+esc(d.accountEnding):'')+'</div><div class="muted">'+esc(d.paymentDueDate||"")+' · '+money(d.newBalance)+'</div></div>';}).join(""):'<div class="empty">No documents saved.</div>')+'</div></div>';}
function panelRules(){return '<div class="grid cols"><div class="card"><h2>Rules</h2><form id="ruleForm"><div class="formgrid"><label>If merchant contains<input name="contains"></label><label>Category<input name="category"></label></div><button class="btn green">Save Rule</button></form></div><div class="list">'+(state.rules.length?state.rules.map(function(r){return '<div class="item"><div class="title">If contains "'+esc(r.contains)+'"</div><div class="muted">Category → '+esc(r.category)+'</div></div>';}).join(""):'<div class="empty">No rules yet.</div>')+'</div></div>';}

var rawRows=[], previewRows=[], headers=[];
function parseCSV(text){var lines=text.trim().split(/\r?\n/); if(!lines.length)return[];var h=lines[0].split(",").map(function(x){return x.trim().replace(/^"|"$/g,"");});return lines.slice(1).map(function(line){var vals=line.split(",").map(function(x){return x.trim().replace(/^"|"$/g,"");}); var o={}; h.forEach(function(k,i){o[k]=vals[i]||"";}); return o;});}
function fillSelect(id){var el=$(id); if(!el)return; el.innerHTML='<option value="">-- none --</option>'+headers.map(function(h){return '<option>'+esc(h)+'</option>';}).join("");}
function autoMap(){function guess(list){var lower=headers.map(function(h){return h.toLowerCase();}); for(var i=0;i<list.length;i++){var idx=lower.findIndex(function(h){return h.indexOf(list[i])>=0;}); if(idx>=0)return headers[idx];} return "";}$("mapDate").value=guess(["date"]);$("mapName").value=guess(["description","merchant","name","payee"]);$("mapAmount").value=guess(["amount","debit","credit"]);$("mapCategory").value=guess(["category"]);buildPreview();}
function txKey(t){return [t.date,t.name,Number(t.amount).toFixed(2)].join("|").toLowerCase();}
function buildPreview(){var ex=new Set(state.transactions.map(txKey));previewRows=rawRows.map(function(r){var name=r[$("mapName").value]||"Imported";var amount=Math.abs(Number(String(r[$("mapAmount").value]||"0").replace(/[$,()]/g,""))||0);var tx={id:uid(),date:r[$("mapDate").value]||today(),type:"Expense",name:name,amount:amount,category:r[$("mapCategory").value]||suggestedCategory(name),notes:"CSV import"};return {tx:tx,duplicate:ex.has(txKey(tx))};});$("statRows").textContent=previewRows.length;$("statNew").textContent=previewRows.filter(function(x){return !x.duplicate;}).length;$("importPreview").innerHTML=previewRows.length?previewRows.map(function(r){return '<div class="item import-preview-row '+(r.duplicate?'duplicate-row':'')+'"><div class="head"><div><div class="title">'+esc(r.tx.name)+'</div><div class="muted">'+esc(r.tx.date)+' · '+esc(r.tx.category)+'</div></div><div class="money">'+money(r.tx.amount)+'</div></div><span class="badge '+(r.duplicate?'rose':'green')+'">'+(r.duplicate?'Duplicate':'New')+'</span></div>';}).join(""):'<div class="empty">No rows.</div>';}
async function approveImport(){var rows=previewRows.filter(function(x){return !x.duplicate;}).map(function(x){return x.tx;});for(var i=0;i<rows.length;i++){await put("transactions",rows[i]);}await load();renderAll();toast("Imported "+rows.length+" transactions");}

function downloadTextFile(filename, text, type){
  var blob=new Blob([text],{type:type||"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){URL.revokeObjectURL(url);a.remove();},250);
}

async function deriveFFEKey(password,salt){
  var enc=new TextEncoder();
  var base=await crypto.subtle.importKey("raw",enc.encode(password),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:salt,iterations:250000,hash:"SHA-256"},
    base,
    {name:"AES-GCM",length:256},
    false,
    ["encrypt","decrypt"]
  );
}
function bytesToB64(bytes){
  var s="";for(var i=0;i<bytes.length;i++)s+=String.fromCharCode(bytes[i]);return btoa(s);
}
function b64ToBytes(text){
  var s=atob(text),out=new Uint8Array(s.length);for(var i=0;i<s.length;i++)out[i]=s.charCodeAt(i);return out;
}
function getFFEBackupPayload(){
  return {
    app:"Financial Freedom Engine",

    exportedAt:new Date().toISOString(),
    warning:"Private financial data. Do not upload this backup to public GitHub.",
    data:{
      accounts:state.accounts||[],
      transactions:state.transactions||[],
      bills:state.bills||[],
      payroll:state.payroll||[],
      goals:state.goals||[],
      budgets:state.budgets||[],
      documents:state.documents||[],
      rules:state.rules||[],
      settings:state.settings||[]
    }
  };
}
async function exportEncryptedFFEBackup(){
  if(!window.crypto||!crypto.subtle){alert("Encrypted backups are not supported in this browser.");return;}
  var password=prompt("Create a password for this encrypted backup.");
  if(!password)return;
  var confirmPassword=prompt("Enter the password again.");
  if(password!==confirmPassword){alert("Passwords do not match.");return;}
  try{
    var salt=crypto.getRandomValues(new Uint8Array(16));
    var iv=crypto.getRandomValues(new Uint8Array(12));
    var key=await deriveFFEKey(password,salt);
    var plain=new TextEncoder().encode(JSON.stringify(getFFEBackupPayload()));
    var cipher=new Uint8Array(await crypto.subtle.encrypt({name:"AES-GCM",iv:iv},key,plain));
    var wrapper={
      format:"FFE-ENCRYPTED-BACKUP",
      version:1,
      algorithm:"AES-GCM",
      kdf:"PBKDF2-SHA256",
      iterations:250000,
      salt:bytesToB64(salt),
      iv:bytesToB64(iv),
      payload:bytesToB64(cipher)
    };
    downloadTextFile("FFE_encrypted_backup_"+today()+".ffe.json",JSON.stringify(wrapper,null,2),"application/json");
    toast("Encrypted backup exported");
  }catch(e){alert("Encrypted export failed: "+(e.message||String(e)));}
}
async function restoreEncryptedFFEBackup(file){
  if(!file)return;
  var password=prompt("Enter the password for this encrypted backup.");
  if(!password)return;
  try{
    var wrapper=JSON.parse(await file.text());
    if(wrapper.format!=="FFE-ENCRYPTED-BACKUP")throw new Error("Not an encrypted FFE backup.");
    var salt=b64ToBytes(wrapper.salt),iv=b64ToBytes(wrapper.iv),cipher=b64ToBytes(wrapper.payload);
    var key=await deriveFFEKey(password,salt);
    var plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,cipher);
    var parsed=JSON.parse(new TextDecoder().decode(plain));
    var blob=new Blob([JSON.stringify(parsed)],{type:"application/json"});
    var tempFile=new File([blob],"decrypted-ffe-backup.json",{type:"application/json"});
    await restoreFFEBackupFromFile(tempFile);
  }catch(e){alert("Encrypted restore failed: "+(e.message||String(e)));}
}
function validateFFEData(){
  var issues=[],warnings=[];
  (state.accounts||[]).forEach(function(a){
    if(!a.id||!a.name)issues.push("Account missing ID or name.");
    if(!isFinite(Number(a.balance||0)))issues.push("Invalid account balance: "+(a.name||"Unknown"));
    if(a.type==="Credit Card"&&Number(a.creditLimit||0)<=0)warnings.push("Credit card missing limit: "+a.name);
  });
  (state.transactions||[]).forEach(function(t){
    if(!t.id||!t.name)issues.push("Transaction missing ID or name.");
    if(!t.date)warnings.push("Transaction missing date: "+(t.name||"Unknown"));
    if(!isFinite(Number(t.amount||0)))issues.push("Invalid transaction amount: "+(t.name||"Unknown"));
  });
  var keys={},dupes=0;
  (state.transactions||[]).forEach(function(t){
    var k=[t.date,t.name,Number(t.amount||0).toFixed(2),t.type].join("|").toLowerCase();
    if(keys[k])dupes++;else keys[k]=true;
  });
  if(dupes)warnings.push(dupes+" possible duplicate transaction(s).");
  return {issues:issues,warnings:warnings,ok:issues.length===0};
}

function exportFFEBackup(){
  var payload=getFFEBackupPayload();
  var name="FFE_backup_"+today()+".json";
  downloadTextFile(name,JSON.stringify(payload,null,2),"application/json");
  toast("Backup exported");
}
async function restoreFFEBackupFromFile(file){
  if(!file)return;
  try{
    var text=await file.text();
    var parsed=JSON.parse(text);
    var data=parsed.data||parsed;
    var allowed=["accounts","transactions","bills","payroll","goals","budgets","documents","rules","settings"];
    if(!confirm("Restore this FFE backup? This will replace matching local FFE records on this device."))return;
    for(var i=0;i<allowed.length;i++){
      var s=allowed[i];
      if(Array.isArray(data[s])){
        var old=await all(s);
        for(var j=0;j<old.length;j++)await del(s,old[j].id);
        for(var k=0;k<data[s].length;k++)await put(s,data[s][k]);
      }
    }
    await load();
    renderAll();
    toast("Backup restored");
  }catch(e){
    alert("Restore failed: "+(e.message||String(e)));
  }
}
async function clearFFEDeviceData(){
  if(!confirm("Delete all FFE data stored on this device? This cannot be undone unless you have a backup."))return;
  var stores=["accounts","transactions","bills","payroll","goals","budgets","documents","rules","settings"];
  for(var i=0;i<stores.length;i++){
    var old=await all(stores[i]);
    for(var j=0;j<old.length;j++)await del(stores[i],old[j].id);
  }
  await load();
  renderAll();
  toast("Device data cleared");
}
